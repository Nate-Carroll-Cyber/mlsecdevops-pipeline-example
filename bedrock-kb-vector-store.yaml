AWSTemplateFormatVersion: "2010-09-09"
Description: >
  S3 data source bucket (hardened) + S3 Vector store for Amazon Bedrock
  Knowledge Base. Includes encrypted buckets, access logging, versioning,
  lifecycle rules, and the Bedrock KB service role.

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: Deployment environment suffix

  RetentionDays:
    Type: Number
    Default: 90
    Description: Days before non-current object versions are expired

  LogRetentionDays:
    Type: Number
    Default: 365
    Description: Days to retain access logs

Resources:

  # ──────────────────────────────────────────────
  # 1. Access Logs Bucket
  #    Receives server access logs from the data
  #    source bucket. Must exist first.
  # ──────────────────────────────────────────────
  DataSourceAccessLogsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub "bedrock-kb-datasource-logs-${Environment}-${AWS::AccountId}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldLogs
            Status: Enabled
            ExpirationInDays: !Ref LogRetentionDays

  DataSourceAccessLogsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref DataSourceAccessLogsBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: S3ServerAccessLogsPolicy
            Effect: Allow
            Principal:
              Service: logging.s3.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub "${DataSourceAccessLogsBucket.Arn}/datasource-logs/*"
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId

  # ──────────────────────────────────────────────
  # 2. S3 Data Source Bucket (hardened)
  # ──────────────────────────────────────────────
  DataSourceBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub "bedrock-kb-datasource-${Environment}-${AWS::AccountId}"

      # Encryption — SSE-S3 default; swap SSEAlgorithm to aws:kms
      # and add KMSMasterKeyID if customer-managed keys are required.
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
            BucketKeyEnabled: true

      # Block all public access — non-negotiable for a private data store
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

      # Disable ACLs; bucket owner always owns all objects
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced

      # Versioning — enables point-in-time recovery and protects
      # against accidental overwrites / deletes
      VersioningConfiguration:
        Status: Enabled

      # Access logging — all requests logged to the logs bucket
      LoggingConfiguration:
        DestinationBucketName: !Ref DataSourceAccessLogsBucket
        LogFilePrefix: datasource-logs/

      # Lifecycle — clean up old versions and incomplete uploads
      LifecycleConfiguration:
        Rules:
          - Id: ExpireNonCurrentVersions
            Status: Enabled
            NoncurrentVersionExpirationInDays: !Ref RetentionDays
            NoncurrentVersionTransitions:
              - TransitionInDays: 30
                StorageClass: STANDARD_IA
              - TransitionInDays: 60
                StorageClass: GLACIER_IR
          - Id: AbortIncompleteMultipartUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7

      # Notify Bedrock (or downstream processors) on new object uploads
      NotificationConfiguration:
        EventBridgeConfiguration:
          EventBridgeEnabled: true

      Tags:
        - Key: Purpose
          Value: BedrockKnowledgeBaseDataSource
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

  # Bucket policy — enforce TLS and deny non-Bedrock role access
  DataSourceBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref DataSourceBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:

          # Deny any request not using TLS
          - Sid: DenyNonTLS
            Effect: Deny
            Principal: "*"
            Action: s3:*
            Resource:
              - !GetAtt DataSourceBucket.Arn
              - !Sub "${DataSourceBucket.Arn}/*"
            Condition:
              Bool:
                aws:SecureTransport: false

          # Deny requests using pre-SigV4 signing
          - Sid: DenyNonSigV4
            Effect: Deny
            Principal: "*"
            Action: s3:*
            Resource:
              - !GetAtt DataSourceBucket.Arn
              - !Sub "${DataSourceBucket.Arn}/*"
            Condition:
              StringNotEquals:
                s3:signatureversion: "AWS4-HMAC-SHA256"

          # Allow Bedrock KB service role read access only
          - Sid: AllowBedrockRoleReadOnly
            Effect: Allow
            Principal:
              AWS: !GetAtt BedrockKBServiceRole.Arn
            Action:
              - s3:GetObject
              - s3:ListBucket
            Resource:
              - !GetAtt DataSourceBucket.Arn
              - !Sub "${DataSourceBucket.Arn}/*"

  # ──────────────────────────────────────────────
  # 3. S3 Vector Bucket
  # ──────────────────────────────────────────────
  BedrockVectorBucket:
    Type: AWS::S3Vectors::VectorBucket
    Properties:
      VectorBucketName: !Sub "bedrock-kb-vectors-${Environment}-${AWS::AccountId}"
      EncryptionConfiguration:
        SseSpecification:
          SseType: AES256

  # ──────────────────────────────────────────────
  # 4. Vector Index
  # ──────────────────────────────────────────────
  BedrockVectorIndex:
    Type: AWS::S3Vectors::Index
    DependsOn: BedrockVectorBucket
    Properties:
      VectorBucketName: !GetAtt BedrockVectorBucket.VectorBucketName
      IndexName: "titan-embed-v2-1024-index"
      IndexConfiguration:
        VectorDataType: float32
        Dimension: 1024
        DistanceMetric: euclidean
        MetadataConfiguration:
          NonFilterableMetadataKeys:
            - AMAZON_BEDROCK_TEXT
            - AMAZON_BEDROCK_TEXT_CHUNK
            - AMAZON_BEDROCK_METADATA

  # ──────────────────────────────────────────────
  # 5. IAM Service Role
  # ──────────────────────────────────────────────
  BedrockKBServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "AmazonBedrockKnowledgeBaseServiceRole-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: BedrockAssumeRole
            Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
              ArnLike:
                aws:SourceArn: !Sub "arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:knowledge-base/*"
      Policies:
        - PolicyName: BedrockInvokeEmbeddingModel
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: InvokeEmbeddingModel
                Effect: Allow
                Action: bedrock:InvokeModel
                Resource: !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/amazon.titan-embed-text-v2:0"

        - PolicyName: S3DataSourceRead
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ReadDataSourceBucket
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt DataSourceBucket.Arn
                  - !Sub "${DataSourceBucket.Arn}/*"

        - PolicyName: S3VectorsReadWrite
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: VectorStoreAccess
                Effect: Allow
                Action:
                  - s3vectors:PutVectors
                  - s3vectors:GetVectors
                  - s3vectors:QueryVectors
                  - s3vectors:DeleteVectors
                  - s3vectors:GetIndex
                  - s3vectors:ListIndexes
                Resource:
                  - !GetAtt BedrockVectorBucket.VectorBucketArn
                  - !Sub "${BedrockVectorBucket.VectorBucketArn}/index/titan-embed-v2-1024-index"

# ──────────────────────────────────────────────
# Outputs
# ──────────────────────────────────────────────
Outputs:
  DataSourceBucketName:
    Description: S3 data source bucket name
    Value: !Ref DataSourceBucket
    Export:
      Name: !Sub "${AWS::StackName}-DataSourceBucketName"

  DataSourceBucketArn:
    Description: S3 data source bucket ARN
    Value: !GetAtt DataSourceBucket.Arn
    Export:
      Name: !Sub "${AWS::StackName}-DataSourceBucketArn"

  AccessLogsBucketName:
    Description: Access logs bucket name
    Value: !Ref DataSourceAccessLogsBucket
    Export:
      Name: !Sub "${AWS::StackName}-AccessLogsBucketName"

  VectorBucketName:
    Description: S3 Vector bucket name
    Value: !GetAtt BedrockVectorBucket.VectorBucketName
    Export:
      Name: !Sub "${AWS::StackName}-VectorBucketName"

  VectorBucketArn:
    Description: S3 Vector bucket ARN
    Value: !GetAtt BedrockVectorBucket.VectorBucketArn
    Export:
      Name: !Sub "${AWS::StackName}-VectorBucketArn"

  VectorIndexName:
    Description: Vector index name
    Value: !GetAtt BedrockVectorIndex.IndexName
    Export:
      Name: !Sub "${AWS::StackName}-VectorIndexName"

  BedrockServiceRoleArn:
    Description: IAM role ARN for Bedrock Knowledge Base
    Value: !GetAtt BedrockKBServiceRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-ServiceRoleArn"
