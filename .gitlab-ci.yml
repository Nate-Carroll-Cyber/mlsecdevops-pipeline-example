# GitLab CI — AI/ML Security Pipeline
# Stages flow as a DAG: model integrity gates all evaluation stages.

variables:
  MODEL_DIR: "${CI_PROJECT_DIR}/models"
  SBOM_DIR: "${CI_PROJECT_DIR}/sbom"
  EVIDENCE_DIR: "${CI_PROJECT_DIR}/evidence"
  REPORTS_DIR: "${CI_PROJECT_DIR}/reports"
  GAIPS_MATERIALS_DIR: "${CI_PROJECT_DIR}/docs/gaips-materials"
  PIP_CACHE_DIR: "${CI_PROJECT_DIR}/.pip-cache"
  VENV_DIR: "${CI_PROJECT_DIR}/.venv"
  # Vetted package index — swap for your internal Artifactory/Nexus/GitLab PyPI URL
  PIP_INDEX_URL: "https://pypi.org/simple/"
  PIP_TRUSTED_HOST: "pypi.org files.pythonhosted.org"
  # Anaconda: strict channel priority forces all packages to come from conda-forge
  CONDA_CHANNEL: "conda-forge"
  # ── Vault namespace — REQUIRED for HCP Vault Dedicated / Vault Enterprise ─────
  # HCP Vault runs every mount under a root namespace ("admin", or a child like
  # "admin/gaips"). Self-managed OSS Vault has no namespaces — leave this blank.
  # Injected into the hvac clients (vault-secrets, tamper-verification). The KV
  # mount path and policy paths (secret/data/gaips/...) are unchanged; they simply
  # resolve INSIDE this namespace.
  VAULT_NAMESPACE: ""               # e.g. "admin" or "admin/gaips" on HCP Vault
  # Override in project CI/CD settings (or fetch from Vault via vault-secrets job):
  # MODEL_ENDPOINT, MODEL_SIGNING_IDENTITY, SIGSTORE_OIDC_ISSUER
  # AI BOM signing (ai-bom-sign) is cosign KEYLESS (Fulcio + Rekor, Fix #25) — it
  # uses the same GitLab OIDC id_token as model-sign/dataset-sign, so no signing
  # key variable is needed (the old CYCLONEDX_SIGNING_KEY/PUB are gone).
  # Data-drift baseline auto-commit (data-drift-baseline-commit): set GITLAB_PUSH_TOKEN
  # to a masked Project Access Token (scope: write_repository) to let the first run
  # commit evals/dataset-reference.jsonl back to the default branch. If unset, the
  # seeded reference is published as an artifact to sanitize + commit manually.
  # sign-evidence enforcement (teeth-last, per Fix #0/#23): the terminal evidence
  # seal is signed keyless via SIGSTORE_ID_TOKEN. When that token is unavailable
  # (GitLab < 15.7 / id_tokens off), the default ("false") emits the unsigned
  # manifest and exits 0 so development pipelines are not blocked. Set to "true"
  # in production to make a missing token a HARD FAILURE — the run then refuses to
  # ship an unsigned evidence seal.
  EVIDENCE_SIGNING_REQUIRED: "false"
  HF_MODEL_IDS: ""    # comma-separated HF repo IDs to gate, e.g. "org/model-a,org/model-b"
  HF_TOKEN: ""        # HuggingFace token for gated/private repos (mask in CI settings)
  HF_AUTHOR_ALLOWLIST: ""   # comma-separated allowed repo authors/orgs; blank = any author allowed
  HF_PINNED_SHAS: ""        # optional "org/model=<sha>,…" — fail if the live repo sha differs from the pin
  # Public model fixture downloaded into MODEL_DIR by default so the primary
  # digest/sign/scan jobs exercise real model bytes without committing weights.
  # Override to an empty value to skip the download.
  #
  # Canonical source of the model identity + these MODEL_FIXTURE_*/MARKLLM_*
  # values is evals/model-baseline.json, imported by the model-manifest job as a
  # dotenv report (which overrides these inline defaults for the fixture + MarkLLM
  # jobs, but is itself overridable by a Project/manual CI variable). The inline
  # values below are the fallback when the manifest is unavailable — keep them in
  # sync with model-baseline.json.
  MODEL_FIXTURE_URL: "https://huggingface.co/Qwen/Qwen2.5-1.5B-Instruct-GGUF/resolve/main/qwen2.5-1.5b-instruct-q2_k.gguf"
  MODEL_FIXTURE_PATH: "qwen2.5-1.5b-instruct-gguf/qwen2.5-1.5b-instruct-q2_k.gguf"
  MODEL_FIXTURE_SHA256: "5ede348e91ce1e7a330926ec5b202c27b864d065149dc463257fde1f98865b3a"
  # ── Pinned tool versions — update here to roll the whole pipeline ─────────────
  # Find current releases at each tool's GitHub releases page before bumping.
  COSIGN_VERSION: "v2.4.1"
  # Python signing/scanning toolchain — PINNED exact versions (no floors) so the
  # model-integrity jobs are reproducible. Update here to roll the whole pipeline.
  MODEL_SIGNING_VERSION: "1.1.1"      # `pip install model-signing==${MODEL_SIGNING_VERSION}`
  SIGSTORE_PY_VERSION: "4.3.0"        # `pip install sigstore==${SIGSTORE_PY_VERSION}`
  MODELAUDIT_VERSION: "0.2.47"        # `pip install modelaudit[all]==${MODELAUDIT_VERSION}` (was a >= floor)
  GITLEAKS_VERSION: "8.30.1"          # dataset-redact secret scan (no 'v' in tarball name)
  IMAGE_SEMGREP: "semgrep/semgrep:1.165.0"       # semgrep-sast runs IN this image (no unpinned pip install)
  IMAGE_MINICONDA: "continuumio/miniconda3:26.3.2"
  IMAGE_SYFT: "anchore/syft:v1.45.1-debug"
  IMAGE_GRYPE: "anchore/grype:v0.114.0-debug"
  IMAGE_TRIVY: "aquasec/trivy:0.71.1"   # pinned to an exact tag — keep in sync with the trivy-db schema
  IMAGE_CYCLONEDX: "cyclonedx/cyclonedx-cli:0.32.0"   # AI BOM schema validation / format conversion
  IMAGE_GITLEAKS: "ghcr.io/gitleaks/gitleaks:v8.30.1" # gitleaks-scan SAST job image (pinned; GHCR — gitleaks has no Docker Hub repo; keep in sync with GITLEAKS_VERSION)
  IMAGE_CLAMAV: "clamav/clamav:1.4"                   # clamav-scan job — pinned to an exact tag (patch-floating line)
  PROMPTFOO_VERSION: "0.121.15"
  # MarkLLM watermark stack — pinned to current, markllm-compatible versions and
  # shared by markllm-deps-audit and markllm-watermark-eval. transformers stays on
  # the 4.x line because markllm 0.1.5 predates the transformers 5.x major release.
  MARKLLM_VERSION: "0.1.5"
  TORCH_VERSION: "2.12.0"
  TRANSFORMERS_VERSION: "4.57.6"
  # Live MarkLLM eval model. Leave empty to derive it dynamically from
  # MODEL_FIXTURE_URL at job time (the HF GGUF repo is mapped to its
  # transformers repo, since AutoModelForCausalLM can't load GGUF). Set this
  # explicitly to override and point the eval at any transformers repo id.
  MARKLLM_MODEL_ID: ""
  MARKLLM_MODEL_REVISION: ""  # optional pinned HF revision (recommended for reproducibility)
  # ── Dataset download — Generic Package Registry ───────────────────────────────
  # Set these in GitLab Settings → CI/CD → Variables (or fetch from Vault).
  # Leave DATASET_FILENAME blank to skip the download/scan jobs entirely.
  DATASET_PACKAGE_NAME: ""          # package name in the Generic Package Registry
  DATASET_PACKAGE_VERSION: "latest" # package version tag
  DATASET_FILENAME: ""              # filename to download; blank = use committed fixture
  # Committed fixture used when DATASET_FILENAME is blank. Defaults to the approved
  # Lakera gandalf_ignore_instructions test split (see evals/dataset-baseline.json);
  # set to "ci-dataset.jsonl" to fall back to the minimal plumbing fixture.
  DATASET_FIXTURE_FILE: "gandalf-ignore-instructions-test.jsonl"
  # Integrity pin. Verified against the staged fixture (fixture mode) AND the
  # downloaded file (download mode). Sourced from evals/dataset-baseline.json.
  DATASET_EXPECTED_SHA256: "667e2f643fc1881925787056274cab8829e13dc528c781125b1663a9bdb05cd6"
  DATASET_ALLOW_UNVERIFIED: ""      # set "true" to allow a downloaded dataset with no DATASET_EXPECTED_SHA256 (NOT recommended)
  # The dataset chain (download→scan→redact→validate→GX→profile→sign) always has a
  # dataset to act on: a committed fixture is staged when DATASET_FILENAME is unset.
  # So "no dataset present" downstream means a BROKEN CHAIN, not an intended skip —
  # the gate jobs treat it as expected-but-missing and FAIL. Set this flag to "true"
  # ONLY to deliberately run the pipeline with the dataset chain disabled (skip green).
  DATASETS_DISABLED: ""             # "true" = intentionally disable the dataset chain (skip, exit 0)
  # ── Dependency-Track — continuous BOM analysis backend ────────────────────────
  # The pipeline already emits CycloneDX SBOMs + a CycloneDX 1.6 AI BOM; DT ingests
  # them and re-analyses against new CVEs + policy conditions over time. Set both
  # in CI/CD Variables (or fetch from Vault). Blank = dependency-track-upload skips
  # cleanly, so the pipeline runs unchanged until an instance is wired in.
  # DT_API_KEY MUST be a masked variable.
  DT_API_URL: ""                    # e.g. https://dtrack.example.com (no trailing /api)
  DT_API_KEY: ""                    # masked; needs BOM_UPLOAD + VIEW perms
  DT_FAIL_ON: "FAIL"                # violationState(s) that fail the gate (comma list)
  # ── DVC — data/model version lineage (optional) ───────────────────────────────
  # Set DVC_REMOTE_URL (s3://, gs://, azure://, ssh://…) to enable `dvc pull` in
  # dvc-verify. Without it, the job reports tracked-vs-workspace status only; with
  # no .dvc/ directory it skips entirely.
  DVC_REMOTE_URL: ""
  # ── Image signing — closes the verify-at-deploy loop on the IMAGE side ────────
  # The workload container is built+pushed by the app's own pipeline; image-sign
  # applies a Cosign KEYLESS signature to it so the Kyverno admission policy
  # (kyverno-verify-image-signatures.yaml) has a real signature to verify. The CI
  # OIDC identity is what Fulcio certifies, and it matches Kyverno's gitlab regex
  # branch. Blank = image-sign skips cleanly (until the image exists, the pipeline
  # runs unchanged). Use a DIGEST ref (repo@sha256:…) so the signed bytes can't
  # drift from the running tag; a tag ref also works (cosign resolves the digest).
  IMAGE_REF: ""                     # e.g. ghcr.io/example/gaips-rag-app@sha256:…
  # Registry auth for cosign to push the signature next to the image. Leave unset
  # for an anonymous-pull-but-token-push GitLab registry (uses CI_REGISTRY creds).
  IMAGE_REGISTRY_HOST: ""           # e.g. ghcr.io  (blank → try ${CI_REGISTRY})
  IMAGE_REGISTRY_USER: ""           # blank → ${CI_REGISTRY_USER}
  IMAGE_REGISTRY_PASSWORD: ""       # masked; blank → ${CI_REGISTRY_PASSWORD}
  # ── Signed-artifact publish — feeds the Argo CD PreSync verifier (BLOB side) ──
  # publish-signed-artifacts uploads the cosign-signed AI-BOM trio (.xml/.sig/.pem)
  # and the signed dataset (+ model bundle, when present) to the GitLab Generic
  # Package Registry. The PreSync hook's ARTIFACT_BASE_URL must point at this same
  # package/version. Publishing uses CI_JOB_TOKEN — no extra secret needed.
  EVIDENCE_PACKAGE_NAME: "gaips-evidence"
  EVIDENCE_PACKAGE_VERSION: "${CI_COMMIT_REF_SLUG}"   # PreSync ARTIFACT_BASE_URL points here

# ── Shared secure-install template (extend in Python jobs) ───────────────────
# Applied by default to the python:3.11-slim image; override before_script in
# non-Python image jobs (node, syft, grype, etc.) to skip this block.
.python-secure: &python-secure
  before_script:
    - |
      # PEP 476 — SSL certificate verification is mandatory.
      # Write pip.conf so every subsequent pip call in this job enforces it.
      mkdir -p "${HOME}/.config/pip"
      python3 - <<'PYCFG'
      import os, pathlib
      cfg = pathlib.Path.home() / ".config" / "pip" / "pip.conf"
      cfg.parent.mkdir(parents=True, exist_ok=True)
      cfg.write_text(
          "[global]\n"
          "ssl_verify        = true\n"
          f"index-url         = {os.environ.get('PIP_INDEX_URL','https://pypi.org/simple/')}\n"
          f"trusted-host      = {os.environ.get('PIP_TRUSTED_HOST','pypi.org files.pythonhosted.org')}\n"
          "[install]\n"
          "require-hashes    = false\n"   # flip to true once requirements.txt has hashes
      )
      print("pip.conf written →", cfg)
      PYCFG
    - pip install --quiet --upgrade pip setuptools wheel
    - |
      # Isolated virtualenv — segregates this job's packages from the system
      # Python, preventing cross-job contamination and making pip check reliable.
      python3 -m venv --clear "${VENV_DIR}"
      . "${VENV_DIR}/bin/activate"
      pip install --quiet --upgrade pip setuptools wheel

# ── Requirements resolver (reference, then `pip install -r "${REQ_FILE}"`) ────
# Jobs must not hard-depend on a root requirements.txt that the materials don't
# ship. Resolve in order: committed root file → compiled CI lockfile → shipped
# .in source. Sets REQ_FILE (empty if none found, so installs skip cleanly).
.resolve-reqs:
  script:
    - |
      REQ_FILE="requirements.txt"
      [ -f "${REQ_FILE}" ] || REQ_FILE="${GAIPS_MATERIALS_DIR}/ci/requirements-ci.txt"
      [ -f "${REQ_FILE}" ] || REQ_FILE="${GAIPS_MATERIALS_DIR}/ci/requirements-ci.in"
      if [ -f "${REQ_FILE}" ]; then
        echo "Using requirements: ${REQ_FILE}"
      else
        echo "No requirements file found (root requirements.txt or ci/requirements-ci.*) — installs will skip"
        REQ_FILE=""
      fi

# ── Tier-0 environment audit (referenced from default.after_script) ───────────
# Fix #0-A. pip-audit against the ACTUAL installed environment of EVERY job — not
# just a requirements manifest. Jobs across the pipeline pip-install their own
# stacks inline (model-signing, sigstore, cryptography, presidio, modelaudit,
# modelscan, evidently, ydata-profiling, great-expectations, huggingface_hub…),
# none of which the manifest-only pip-audit job ever sees. Wiring this into
# default.after_script audits each job's venv where those packages actually live.
# Advisory by design (coverage, not a gate): after_script failures don't fail the
# job, so a finding records a log signal + report without blocking. Teeth come
# later — the hash-pinned lockfile audit (#0-B) and per-stage gating.
.audit-env:
  script:
    - |
      command -v pip >/dev/null 2>&1 || { echo "[audit-env] no pip on this image (${CI_JOB_NAME}) — skipping env audit"; exit 0; }
      # after_script runs in a fresh shell — re-enter the job's venv if present so
      # we audit the packages the job installed, not bare system python.
      if [ -d "${VENV_DIR}" ]; then . "${VENV_DIR}/bin/activate" 2>/dev/null || true; fi
      pip install --quiet pip-audit 2>/dev/null || { echo "[audit-env] could not install pip-audit (${CI_JOB_NAME}) — skipping"; exit 0; }
      mkdir -p "${REPORTS_DIR}"
      echo "[audit-env] auditing installed environment for job: ${CI_JOB_NAME}"
      pip-audit \
        --format json \
        --output "${REPORTS_DIR}/pip-audit-env-${CI_JOB_NAME}.json" \
        --progress-spinner off \
      || echo "[audit-env] pip-audit reported findings for ${CI_JOB_NAME} (advisory) — see ${REPORTS_DIR}/pip-audit-env-${CI_JOB_NAME}.json"

default:
  image: python:3.11-slim
  interruptible: true
  before_script:
    - !reference [.python-secure, before_script]
  # Fix #0-A: every job audits its own installed environment after running.
  # Inherited by all jobs that don't declare their own after_script; guards make
  # it a clean no-op on non-Python images (e.g. the cyclonedx-cli signing job).
  after_script:
    - !reference [.audit-env, script]
  cache:
    # Bumped pip- -> pip-v2- to abandon the bloated shared cache: heavy jobs had pushed
    # multi-GB torch/tensorflow/CUDA wheels into it over successive runs, so every job that
    # restored it ran the small runner out of disk ([Errno 28]). v2 starts empty; the
    # bloaters below opt out with cache:{} so it stays small.
    key: pip-v2-${CI_COMMIT_REF_SLUG}
    paths:
      - .pip-cache/

stages:
  - setup
  - sast
  - sbom
  - vuln-scan
  - model-integrity
  - ai-eval
  - guardrail
  - evidence
  - ai-bom
  - deploy-prep
  # Terminal stage: runs dead-last so sign-evidence can hash + sign the ENTIRE
  # run's evidence set, including the ai-bom and deploy-prep outputs.
  - attest

# ─── SETUP ───────────────────────────────────────────────────────────────────

setup:
  stage: setup
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[sigstore-discovery\]/'
      when: never
    - when: on_success
  allow_failure: true
  script:
    # python:3.11-slim ships no git, so write_version_info.py could not compute the
    # working-tree `dirty` flag or `git describe` — install git so provenance is real.
    - apt-get update -qq && apt-get install -y -qq --no-install-recommends git ca-certificates
    - !reference [.resolve-reqs, script]
    - '[ -n "${REQ_FILE}" ] && pip install -r "${REQ_FILE}" || echo "No requirements file — skipping install"'
    - mkdir -p "${SBOM_DIR}" "${EVIDENCE_DIR}" "${REPORTS_DIR}"
    - echo "Pipeline ${CI_PIPELINE_ID} @ ${CI_COMMIT_SHORT_SHA}" | tee "${EVIDENCE_DIR}/pipeline.env"
    - |
      # Record the exact Git revision this pipeline ran against, for provenance.
      TS="${CI_PIPELINE_CREATED_AT:-$(date -u +%Y-%m-%dT%H:%M:%SZ)}"
      python3 "${GAIPS_MATERIALS_DIR}/scripts/write_version_info.py" \
        --out "${EVIDENCE_DIR}/version-info.json" \
        --timestamp "${TS}"
  artifacts:
    paths:
      - "${EVIDENCE_DIR}/pipeline.env"
      - "${EVIDENCE_DIR}/version-info.json"
    expire_in: 1 day

# Import the approved model baseline (evals/model-baseline.json) as a dotenv
# report so the model-fixture + MarkLLM jobs inherit MODEL_FIXTURE_*/MARKLLM_*
# from one reviewed source of truth. dotenv variables override the inline
# variables: defaults but are themselves overridable by Project/manual CI
# variables. NOT allow_failure: a malformed baseline fails fast here at the cheap
# setup stage instead of after the expensive scans. build_model_baseline.py is
# stdlib-only, so skip the venv bootstrap.
model-manifest:
  stage: setup
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[sigstore-discovery\]/'
      when: never
    - when: on_success
  needs: []
  before_script: []
  script:
    - |
      python3 "${GAIPS_MATERIALS_DIR}/scripts/build_model_baseline.py" \
        --baseline "${GAIPS_MATERIALS_DIR}/evals/model-baseline.json" \
        --emit-dotenv "model-baseline.env"
    - cat "model-baseline.env"
  artifacts:
    reports:
      dotenv: "model-baseline.env"
    expire_in: 90 days

vault-secrets:
  stage: setup
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[sigstore-discovery\]/'
      when: never
    - when: on_success
  needs: []
  allow_failure: true
  # id_tokens issues a per-job OIDC JWT (GitLab 15.7+).
  # CI_JOB_JWT_V2 is the fallback for older instances (deprecated GitLab 16.x).
  id_tokens:
    VAULT_ID_TOKEN:
      aud: "${CI_SERVER_URL}"
  script:
    - touch .vault-env    # artifact must exist even when Vault is unreachable
    - |
      if [ -z "${VAULT_ADDR}" ]; then
        echo "VAULT_ADDR not configured — Vault fetch skipped; pipeline uses CI/CD variables"
        exit 0
      fi
    - pip install --quiet hvac
    - |
      python3 - <<'PYEOF'
      import hvac, os, pathlib, sys

      # namespace="" is harmless on OSS Vault; REQUIRED on HCP Vault / Enterprise.
      client = hvac.Client(
          url=os.environ["VAULT_ADDR"],
          namespace=os.environ.get("VAULT_NAMESPACE") or None,
      )
      jwt = os.environ.get("VAULT_ID_TOKEN") or os.environ.get("CI_JOB_JWT_V2", "")
      if not jwt:
          print("ERROR: no JWT available (VAULT_ID_TOKEN and CI_JOB_JWT_V2 both unset)")
          sys.exit(1)

      client.auth.jwt.jwt_login(role="gaips-ci", jwt=jwt)

      # KV v2 paths (mount=secret); maps to CI variable names
      PATHS = {
          "gaips/ci/model-endpoint":       "MODEL_ENDPOINT",
          "gaips/ci/model-signing-identity": "MODEL_SIGNING_IDENTITY",
          "gaips/ci/sigstore-oidc-issuer": "SIGSTORE_OIDC_ISSUER",
          "gaips/ci/hf-token":             "HF_TOKEN",
          "gaips/ci/gemini-api-key":       "GEMINI_API_KEY",
          "gaips/ci/registry-token":       "CI_REGISTRY_TOKEN",
          "gaips/ci/dt-api-url":           "DT_API_URL",
          "gaips/ci/dt-api-key":           "DT_API_KEY",
      }

      lines = []
      for kv_path, var_name in PATHS.items():
          try:
              resp = client.secrets.kv.v2.read_secret_version(
                  mount_point="secret", path=kv_path, raise_on_deleted_version=True
              )
              value = resp["data"]["data"].get("value", "")
              lines.append(f"{var_name}={value}")
              print(f"  fetched → {var_name}")
          except Exception as exc:
              print(f"  WARN: {kv_path}: {exc}")

      pathlib.Path(".vault-env").write_text("\n".join(lines) + "\n")
      print(f"Vault: {len(lines)}/{len(PATHS)} secret(s) written to .vault-env")
      PYEOF
  artifacts:
    # SECURITY: dotenv values are injected as CI variables into later jobs but are
    # stored unencrypted and are retrievable by anyone with job/artifact access —
    # they are NOT masked in logs. Short expiry limits the window; for production,
    # prefer GitLab's native `secrets:` + Vault integration (per-job, no artifact)
    # over this central broker so secrets never persist as an artifact at all.
    reports:
      dotenv: .vault-env    # injected as env vars into all later-stage jobs
    expire_in: 30 min

# ─── SAST ────────────────────────────────────────────────────────────────────

semgrep-sast:
  stage: sast
  image: ${IMAGE_SEMGREP}     # pinned semgrep image ships semgrep — no unpinned `pip install`
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[sigstore-discovery\]/'
      when: never
    - when: on_success
  needs: ["setup"]
  before_script: []           # semgrep image is self-contained; skip the python venv bootstrap
  script:
    - mkdir -p "${REPORTS_DIR}"
    # `semgrep scan` runs a tokenless rules-based scan; `semgrep ci` expects a
    # SEMGREP_APP_TOKEN and the managed-scan workflow.
    - semgrep scan --config=auto --json --output "${REPORTS_DIR}/semgrep.json" .
  artifacts:
    reports:
      sast: "${REPORTS_DIR}/semgrep.json"
    paths:
      - "${REPORTS_DIR}/semgrep.json"
    expire_in: 7 days
  allow_failure: true

# GitLab-native secret detection — writes gl-secret-detection-report.json, which
# surfaces findings directly in the GitLab Security Dashboard and MR widget.
secret-detection:
  stage: sast
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[sigstore-discovery\]/'
      when: never
    - when: on_success
  image: registry.gitlab.com/security-products/secrets:4
  before_script: []
  needs: ["setup"]
  variables:
    GIT_DEPTH: 1                            # HEAD-only; old app history is handled outside CI
    SECRET_DETECTION_HISTORIC_SCAN: "false" # flip to "true" to scan entire git history
    SECRET_DETECTION_LOG_OPTIONS: "--max-count=1"
  script:
    - mkdir -p "${REPORTS_DIR}"
    - /analyzer run
    - |
      # Copy to REPORTS_DIR so evidence-summary can pick it up alongside other reports
      cp gl-secret-detection-report.json "${REPORTS_DIR}/secret-detection.json" 2>/dev/null || true
    - |
      if [ ! -f gl-secret-detection-report.json ]; then
        echo "No secret detection report produced — skipping summary"
        exit 0
      fi
      # The GitLab secrets analyzer image is intentionally minimal and does not
      # include Python or jq, so keep this summary POSIX-shell compatible.
      # grep -c always prints a single count (0 on no match) but EXITS 1 when zero.
      # The old `|| echo 0` appended a SECOND "0", yielding "0\n0" → "sh: bad number"
      # in the arithmetic test below. Swallow the exit with `|| true` (keep the count)
      # and default an empty result to 0.
      FINDINGS=$(grep -c '"severity"' gl-secret-detection-report.json 2>/dev/null || true)
      CRITICAL=$(grep -c '"severity"[[:space:]]*:[[:space:]]*"Critical"' gl-secret-detection-report.json 2>/dev/null || true)
      FINDINGS=${FINDINGS:-0}
      CRITICAL=${CRITICAL:-0}
      echo "Secret detection: ${FINDINGS} finding(s); critical=${CRITICAL}"
      if [ "${CRITICAL}" -gt 0 ]; then
        echo "Critical secrets found — failing pipeline"
        exit 1
      fi
  artifacts:
    reports:
      secret_detection: gl-secret-detection-report.json
    paths:
      - gl-secret-detection-report.json
      - "${REPORTS_DIR}/secret-detection.json"
    expire_in: 7 days
  allow_failure: false

# Gitleaks — complements the GitLab analyzer with configurable rules and
# explicit git-history depth control. Produces a standalone JSON report.
gitleaks-scan:
  stage: sast
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[sigstore-discovery\]/'
      when: never
    - when: on_success
  image:
    name: "${IMAGE_GITLEAKS}"
    entrypoint: [""]
  before_script: []
  needs: ["setup"]
  script:
    - mkdir -p "${REPORTS_DIR}"
    - |
      gitleaks detect \
        --source="${CI_PROJECT_DIR}" \
        --config="${CI_PROJECT_DIR}/.gitleaks.toml" \
        --report-format=json \
        --report-path="${REPORTS_DIR}/gitleaks.json" \
        --redact \
        --exit-code=1 \
        2>&1 | tee "${REPORTS_DIR}/gitleaks.log" || GITLEAKS_EXIT=${PIPESTATUS[0]}
    - |
      # Summarize without leaking secret values (--redact masks them in the report)
      LEAKS=$(python3 -c "
      import json, sys
      try:
          d = json.load(open('${REPORTS_DIR}/gitleaks.json'))
          print(len(d) if isinstance(d, list) else 0)
      except Exception:
          print(0)
      " 2>/dev/null || echo 0)
      echo "gitleaks: ${LEAKS} potential secret(s) detected"
      [ "${GITLEAKS_EXIT:-0}" -eq 0 ] || { echo "Secrets detected — failing pipeline"; exit 1; }
  artifacts:
    when: always
    paths:
      - "${REPORTS_DIR}/gitleaks.json"
      - "${REPORTS_DIR}/gitleaks.log"
    expire_in: 7 days
  allow_failure: false

pip-audit:
  stage: sast
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[sigstore-discovery\]/'
      when: never
    - when: on_success
  needs: ["setup"]
  script:
    - pip install pip-audit
    - mkdir -p "${REPORTS_DIR}"
    - !reference [.resolve-reqs, script]
    - |
      if [ -z "${REQ_FILE}" ]; then
        echo "No requirements file to audit — skipping pip-audit"
        echo '{"dependencies":[]}' > "${REPORTS_DIR}/pip-audit.json"
        exit 0
      fi
      pip install -r "${REQ_FILE}"
    - |
      # Audit installed packages against OSV, PyPI advisory DB, and GitHub Advisory DB
      pip-audit \
        --requirement "${REQ_FILE}" \
        --format json \
        --output "${REPORTS_DIR}/pip-audit.json" \
        --progress-spinner off || AUDIT_EXIT=$?
      pip-audit \
        --requirement "${REQ_FILE}" \
        --format cyclonedx-json \
        --output "${REPORTS_DIR}/pip-audit-cyclonedx.json" \
        --progress-spinner off || true
      # Surface the count; non-zero exit from pip-audit already surfaces findings
      python3 - <<'PYEOF'
      import json, sys, os
      data = json.load(open(os.environ["REPORTS_DIR"] + "/pip-audit.json"))
      # pip-audit JSON schema: {"dependencies": [{"name":..., "vulns": [{"id":..., "fix_versions": ["1.2.3"], ...}]}]}
      # fix_versions is a list of version strings — no CVSS scores in this format.
      # Use the cyclonedx output (pip-audit-cyclonedx.json) for CVSS score analysis.
      deps  = data.get("dependencies", [])
      total = sum(len(d.get("vulns", [])) for d in deps)
      pkgs_affected = sum(1 for d in deps if d.get("vulns"))
      print(f"pip-audit: {total} vulnerability/ies across {pkgs_affected} package(s)")
      PYEOF
  artifacts:
    paths:
      - "${REPORTS_DIR}/pip-audit.json"
      - "${REPORTS_DIR}/pip-audit-cyclonedx.json"
    expire_in: 7 days
  allow_failure: true

# Fix #0-B — hash-pinned lockfile audit. The manifest pip-audit above resolves to
# the root requirements.txt (pandas/requests/jinja2) and never reaches the full
# pipeline stack declared in the ci/requirements-ci*.in GROUP files. This job
# compiles EACH group into a fully pinned, hash-generated lockfile and audits THEM
# — covering this (static) pipeline's stack: model-signing, sigstore, modelscan,
# huggingface_hub, presidio, evidently, ydata-profiling, great-expectations, the
# markllm watermark stack… against OSV/PyPI/GitHub advisory DBs. (The AI red-team
# tools — garak/giskard/pyrit/inspect-ai/inspect-evals — live in the separate
# live-scans pipeline, NOT here.) The per-group locks are published as artifacts;
# the CORE group's lock can be committed as ci/requirements-ci.txt to enable
# --require-hashes installs (the "teeth" half of #0). Advisory for now; flip
# allow_failure:false once that lockfile is committed and the core group resolves
# cleanly in CI.
lockfile-audit:
  stage: sast
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[sigstore-discovery\]/'
      when: never
    - when: on_success
  needs: ["setup"]
  allow_failure: true
  # cache:{} — this job's GitLab-level cache is disabled so its compiles can't bloat
  # the shared pip cache that reaches other jobs' runner disk.
  cache: {}
  variables:
    # Stay on the SMALL runner by not letting pip RETAIN downloaded wheels across the
    # three sequential group compiles below. `pip-compile --generate-hashes` downloads
    # every resolved wheel to hash it; by default pip caches them in ~/.cache/pip, so
    # the 236-package dataquality group fills the cache first and the markllm/core
    # compiles then exhaust the runner disk ([Errno 28]) — even though each group ALONE
    # is small. PIP_NO_CACHE_DIR makes each pip-compile free its downloads on exit, so
    # the groups don't accumulate. (The markllm group also pins torch==2.12.0+cpu, so
    # it hashes the ~200 MB CPU wheel, not the ~2 GB CUDA build.)
    PIP_NO_CACHE_DIR: "1"
  script:
    - pip install --quiet pip-tools pip-audit
    - mkdir -p "${REPORTS_DIR}"
    - |
      # The pipeline's deps don't reliably co-resolve as one lockfile: the markllm
      # watermark stack pins old huggingface_hub<1.0 / Pillow==9.4.0, and the data
      # quality group (evidently + ydata-profiling) pins narrow numpy/pandas ranges.
      # These run in isolated per-job venvs anyway, so each requirements-ci*.in is an
      # independently-resolvable GROUP: compile + hash-pin each on its own. A group
      # that still can't resolve is a loud WARNING (not a failure) — its packages
      # stay covered at runtime by the per-job .audit-env after_script.
      CI_DIR="${GAIPS_MATERIALS_DIR}/ci"
      : > "${REPORTS_DIR}/lockfile-unresolved-groups.txt"
      found=0
      # Compile the light, security-critical CORE group (requirements-ci.in: signing /
      # scanning / redaction tools) FIRST so its hash-lock is produced even on a bad
      # day; the heavy hyphenated groups (dataquality, markllm) come after. With
      # PIP_NO_CACHE_DIR set, downloads don't accumulate between these compiles.
      for IN_FILE in "${CI_DIR}/requirements-ci.in" "${CI_DIR}"/requirements-ci-*.in; do
        [ -e "${IN_FILE}" ] || continue
        STEM=$(basename "${IN_FILE}" .in)
        case "${STEM}" in
          *markllm*)
            # The markllm watermark stack (torch/transformers/markllm) is heavy AND is
            # already vuln-audited by the dedicated markllm-deps-audit job at the same
            # pins. Re-compiling it here is redundant, and `pip-compile --generate-hashes`
            # over its multi-GB closure exhausts the small runner's disk ([Errno 28]).
            # Skip it — markllm-deps-audit owns that group; it is not hash-locked here.
            echo "Skipping ${STEM} — covered by markllm-deps-audit (not hash-locked here)"
            continue
            ;;
        esac
        found=1
        LOCK="${REPORTS_DIR}/${STEM}.txt"
        if pip-compile --quiet --generate-hashes --allow-unsafe \
              --output-file "${LOCK}" "${IN_FILE}"; then
          echo "Compiled hash-pinned lockfile → ${LOCK}"
        else
          echo "WARNING: group '${STEM}' could not be resolved into a single lockfile —"
          echo "         its packages are audited at runtime by the per-job .audit-env."
          rm -f "${LOCK}"
          echo "${STEM}" >> "${REPORTS_DIR}/lockfile-unresolved-groups.txt"
        fi
      done
      if [ "${found}" -eq 0 ]; then
        echo "No requirements-ci*.in present — nothing to lock/audit"; exit 0
      fi
    - |
      # Audit each resolved group lock. --no-deps audits the EXACT pinned packages in the
      # hash-generated lock WITHOUT creating a venv and installing them — required here:
      # installing the dataquality closure (236 pkgs incl. ydata/dvc[all]/evidently) into
      # a venv to audit it exhausts the small runner's disk ([Errno 28]). The lock is
      # already fully pinned by `pip-compile --generate-hashes`, so --no-deps is exact.
      for LOCK in "${REPORTS_DIR}"/requirements-ci*.txt; do
        [ -e "${LOCK}" ] || continue
        STEM=$(basename "${LOCK}" .txt)
        pip-audit --requirement "${LOCK}" --no-deps --format json \
          --output "${REPORTS_DIR}/${STEM}-audit.json" --progress-spinner off || true
        pip-audit --requirement "${LOCK}" --no-deps --format cyclonedx-json \
          --output "${REPORTS_DIR}/${STEM}-audit-cyclonedx.json" --progress-spinner off || true
      done
    - |
      # Merge the per-group pip-audit JSONs into one lockfile-audit.json in the
      # pip-audit-native {"dependencies":[...]} shape that build_ai_bom.py reads
      # (P2-1); dedup by (name, version).
      python3 - <<'PYEOF'
      import json, glob, os
      reports = os.environ["REPORTS_DIR"]
      merged, seen = [], set()
      for path in sorted(glob.glob(reports + "/requirements-ci*-audit.json")):
          try:
              doc = json.load(open(path))
          except Exception as exc:
              print(f"WARN: could not read {os.path.basename(path)} ({exc})")
              continue
          if not isinstance(doc, dict):
              continue
          for dep in doc.get("dependencies", []):
              key = (dep.get("name"), dep.get("version"))
              if key in seen:
                  continue
              seen.add(key)
              merged.append(dep)
      with open(reports + "/lockfile-audit.json", "w") as f:
          json.dump({"dependencies": merged}, f, indent=2)
      total = sum(len(d.get("vulns", [])) for d in merged)
      pkgs  = sum(1 for d in merged if d.get("vulns"))
      print(f"lockfile-audit: {total} vulnerability/ies across {pkgs} package(s) "
            f"over {len(merged)} locked packages (merged from per-group locks)")
      unresolved_path = reports + "/lockfile-unresolved-groups.txt"
      if os.path.exists(unresolved_path):
          groups = [g for g in open(unresolved_path).read().split() if g]
          if groups:
              print("NOTE: groups not lockable as a single set "
                    "(covered by per-job .audit-env): " + ", ".join(groups))
      PYEOF
  artifacts:
    paths:
      - "${REPORTS_DIR}/requirements-ci*.txt"
      - "${REPORTS_DIR}/lockfile-audit.json"
      - "${REPORTS_DIR}/requirements-ci*-audit*.json"
      - "${REPORTS_DIR}/lockfile-unresolved-groups.txt"
    expire_in: 7 days

pkg-integrity:
  stage: sast
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[sigstore-discovery\]/'
      when: never
    - when: on_success
  needs: ["setup"]
  script:
    - pip install pip-tools
    - mkdir -p "${REPORTS_DIR}"
    - !reference [.resolve-reqs, script]
    - |
      if [ -z "${REQ_FILE}" ]; then
        echo "No requirements file present — skipping package integrity verification"
        echo "hash_mode=skipped" > "${REPORTS_DIR}/pkg-integrity.env"
        exit 0
      fi
    - |
      # ── Hash verification (PEP 476 / secure install) ──────────────────────
      if grep -q " --hash=" "${REQ_FILE}" 2>/dev/null; then
        echo "Hash-pinned requirements detected — installing with --require-hashes"
        pip install --require-hashes -r "${REQ_FILE}"
        echo "hash_mode=enforced" > "${REPORTS_DIR}/pkg-integrity.env"
      else
        echo "WARNING: ${REQ_FILE} lacks hashes — generating hashed lockfile"
        # Prefer a .in source if one exists alongside; else hash-pin REQ_FILE itself.
        SRC="requirements.in"
        [ -f "${SRC}" ] || SRC="${REQ_FILE}"
        pip-compile --generate-hashes "${SRC}" \
          --output-file requirements.hashed.txt \
          --quiet
        echo "hash_mode=warn_generated" > "${REPORTS_DIR}/pkg-integrity.env"
        echo "Commit requirements.hashed.txt and pin CI to it to enforce hashes."
      fi
    - |
      # ── Isolated environment verification ─────────────────────────────────
      # Install into a throw-away venv to confirm no hidden dependency conflicts.
      python3 -m venv /tmp/verify-venv
      . /tmp/verify-venv/bin/activate
      # Honour hashes when the requirements carry them (enforced mode).
      if grep -q " --hash=" "${REQ_FILE}" 2>/dev/null; then
        pip install --quiet --require-hashes --index-url "${PIP_INDEX_URL}" -r "${REQ_FILE}"
      else
        pip install --quiet --index-url "${PIP_INDEX_URL}" -r "${REQ_FILE}"
      fi
      pip check    # fails if any installed package has broken/missing deps
      # Snapshot the manifest of the VERIFIED venv NOW, while it is still active —
      # capturing it after `deactivate` recorded the bare base-python env instead.
      pip list --format json > "${REPORTS_DIR}/pkg-list.json"
      deactivate
    - |
      python3 - <<'PYEOF'
      import json, pathlib, os
      packages = json.loads(open(os.environ["REPORTS_DIR"] + "/pkg-list.json").read())
      report = {"env": packages, "hash_mode": open(os.environ["REPORTS_DIR"] + "/pkg-integrity.env").read().strip()}
      pathlib.Path(os.environ["REPORTS_DIR"] + "/pkg-integrity-manifest.json").write_text(
          json.dumps(report, indent=2)
      )
      print(f"Verified {len(packages)} package(s) in isolated venv")
      PYEOF
  artifacts:
    paths:
      - "${REPORTS_DIR}/pkg-integrity.env"
      - "${REPORTS_DIR}/pkg-integrity-manifest.json"
      - "requirements.hashed.txt"
    expire_in: 7 days
  allow_failure: true

conda-pkg-verify:
  stage: sast
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[sigstore-discovery\]/'
      when: never
    - when: on_success
  image: "${IMAGE_MINICONDA}"
  needs: ["setup"]
  before_script: []          # conda image manages its own Python env
  script:
    - mkdir -p "${REPORTS_DIR}/conda"
    - |
      # ── Secure conda configuration ────────────────────────────────────────
      conda config --set ssl_verify true
      conda config --set channel_priority strict
      conda config --add channels "${CONDA_CHANNEL}"
      # NOTE: the base image keeps 'defaults' in the merged channel list, and
      # `conda config --remove channels defaults` cannot reliably drop it (it lives
      # in the system condarc). Rather than trust the config list, we enforce
      # isolation at RESOLUTION time with --override-channels below, then VERIFY it
      # from the resolved package set (the real proof) instead of grepping config.
      conda config --show channels || true
    - |
      # ── Isolated conda environment (conda-forge ONLY) ─────────────────────
      # --override-channels ignores every configured channel (incl. defaults) and
      # uses only the --channel(s) given, so packages provably come from conda-forge.
      conda create -n ci-verify python=3.11 --yes --quiet \
        --override-channels --channel "${CONDA_CHANNEL}"
      # Attempt to install packages via conda-forge; fall back gracefully for pip-only pkgs
      conda run -n ci-verify conda install --yes --quiet \
        --override-channels --channel "${CONDA_CHANNEL}" \
        --file requirements.txt 2>/dev/null \
        || echo "NOTE: some packages are pip-only; conda coverage is partial"
      conda run -n ci-verify pip check || true
    - |
      # Export resolved environment as a reproducible manifest
      conda env export -n ci-verify --json > "${REPORTS_DIR}/conda/env-manifest.json"
      conda run -n ci-verify conda list --json > "${REPORTS_DIR}/conda/installed-packages.json"
      python3 - <<'PYEOF'
      import json, os, re, sys
      pkgs = json.load(open(os.environ["REPORTS_DIR"] + "/conda/installed-packages.json"))
      # Real isolation check: flag any package that resolved from an Anaconda default
      # channel. Denial-based (not an allowlist) so channel-string variants like
      # "conda-forge/linux-64" or a full conda-forge URL don't false-fail this gate.
      BAD = re.compile(r"(^|/|\.)(defaults|pkgs/main|pkgs/r|main|free|anaconda)(/|$)|repo\.anaconda\.com", re.I)
      leaked = sorted(
          f"{p.get('name')}@{p.get('channel')}"
          for p in pkgs
          if p.get("channel") and BAD.search(str(p.get("channel")))
      )
      print(f"conda environment: {len(pkgs)} package(s) resolved")
      if leaked:
          print(f"ERROR: {len(leaked)} package(s) resolved from an Anaconda default "
                f"channel (isolation leak): {leaked[:10]}")
          sys.exit(1)
      print("Channel isolation verified — no package resolved from a defaults/anaconda channel")
      PYEOF
  artifacts:
    paths:
      - "${REPORTS_DIR}/conda/"
    expire_in: 7 days
  allow_failure: true   # advisory until a full conda env spec is defined for the project

# ─── SBOM ────────────────────────────────────────────────────────────────────

syft-cyclonedx:
  stage: sbom
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[sigstore-discovery\]/'
      when: never
    - when: on_success
  image:
    name: "${IMAGE_SYFT}"
    entrypoint: [""]
  before_script: []          # syft image has no Python
  needs: ["setup"]
  allow_failure: true
  cache: {}                  # no Python → the inherited pip cache is a no-op restore/upload
  script:
    - mkdir -p "${SBOM_DIR}"
    - /syft dir:. -o cyclonedx-json="${SBOM_DIR}/sbom.cyclonedx.json"
    - /syft dir:. -o cyclonedx-xml="${SBOM_DIR}/sbom.cyclonedx.xml"
  artifacts:
    paths:
      - "${SBOM_DIR}/sbom.cyclonedx.json"
      - "${SBOM_DIR}/sbom.cyclonedx.xml"
    expire_in: 30 days

syft-spdx:
  stage: sbom
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[sigstore-discovery\]/'
      when: never
    - when: on_success
  image:
    name: "${IMAGE_SYFT}"
    entrypoint: [""]
  before_script: []          # syft image has no Python
  needs: ["setup"]
  allow_failure: true
  cache: {}                  # no Python → the inherited pip cache is a no-op restore/upload
  script:
    - mkdir -p "${SBOM_DIR}"
    - /syft dir:. -o spdx-json="${SBOM_DIR}/sbom.spdx.json"
    - /syft dir:. -o spdx-tag-value="${SBOM_DIR}/sbom.spdx"
  artifacts:
    paths:
      - "${SBOM_DIR}/sbom.spdx.json"
      - "${SBOM_DIR}/sbom.spdx"
    expire_in: 30 days

# DVC — data/model version lineage. The pipeline already records digests +
# signatures + version-info for provenance; DVC adds restorable, pinned versions
# of large datasets/models from a remote store. This job verifies the workspace
# matches the pinned versions (and pulls them when a remote is configured). It
# skips cleanly when the repo has no .dvc/ directory, so it is opt-in.
dvc-verify:
  stage: sbom
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[sigstore-discovery\]/'
      when: never
    - when: on_success
  needs: ["setup"]
  allow_failure: true   # advisory until DVC is initialized + a remote is configured
  cache: {}             # normal runs skip before any pip use; the inherited cache is a no-op
  script:
    - mkdir -p "${REPORTS_DIR}"
    - |
      if [ ! -d .dvc ]; then
        echo "No .dvc/ directory — DVC not initialized; skipping."
        echo "  To enable: 'dvc init', 'dvc add <dataset/model>', set DVC_REMOTE_URL."
        echo '{"skipped":true,"reason":"dvc not initialized"}' > "${REPORTS_DIR}/dvc-status.json"
        exit 0
      fi
    - pip install "dvc[all]"
    - dvc version
    - |
      if [ -n "${DVC_REMOTE_URL}" ]; then
        dvc remote add -d --force ci-remote "${DVC_REMOTE_URL}"
        dvc pull --quiet || echo "WARNING: dvc pull failed (remote/credentials?) — reporting status only"
      else
        echo "DVC_REMOTE_URL not set — skipping pull; reporting tracked-vs-workspace status only"
      fi
    - |
      # Record which DVC-tracked artifacts differ from their pinned versions.
      dvc data status --granular --json > "${REPORTS_DIR}/dvc-status.json" 2>/dev/null \
        || dvc status --json > "${REPORTS_DIR}/dvc-status.json" 2>/dev/null \
        || echo '{"note":"dvc status produced no machine-readable output"}' > "${REPORTS_DIR}/dvc-status.json"
      cat "${REPORTS_DIR}/dvc-status.json"
  artifacts:
    paths:
      - "${REPORTS_DIR}/dvc-status.json"
    expire_in: 7 days

# ─── VULNERABILITY SCAN ──────────────────────────────────────────────────────

grype-scan:
  stage: vuln-scan
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[sigstore-discovery\]/'
      when: never
    - when: on_success
  image:
    name: "${IMAGE_GRYPE}"
    entrypoint: [""]
  before_script: []          # grype image has no Python
  needs: ["syft-cyclonedx"]
  cache: {}                  # no Python → the inherited pip cache is a no-op restore/upload
  script:
    - mkdir -p "${REPORTS_DIR}"
    - |
      if [ ! -f "${SBOM_DIR}/sbom.cyclonedx.json" ]; then
        echo "CycloneDX SBOM missing — skipping Grype scan"
        echo '{"skipped":true,"reason":"CycloneDX SBOM missing"}' > "${REPORTS_DIR}/grype.json"
        exit 0
      fi
    - /grype sbom:"${SBOM_DIR}/sbom.cyclonedx.json" -o json > "${REPORTS_DIR}/grype.json"
    - /grype sbom:"${SBOM_DIR}/sbom.cyclonedx.json" -o table
  artifacts:
    paths:
      - "${REPORTS_DIR}/grype.json"
    expire_in: 7 days
  allow_failure: true

trivy-scan:
  stage: vuln-scan
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[sigstore-discovery\]/'
      when: never
    - when: on_success
  image:
    name: "${IMAGE_TRIVY}"
    entrypoint: [""]
  before_script: []          # trivy image has no Python
  needs: ["setup", "vault-secrets"]
  allow_failure: true
  cache: {}                  # no Python → the inherited pip cache is a no-op restore/upload
  script:
    - mkdir -p "${REPORTS_DIR}"
    # --skip-dirs .pip-cache: the restored pip HTTP cache is third-party download
    # cruft, not our source. Scanning it produced a false-positive "JWT token"
    # secret finding from the PyJWT docstring example. Skip it.
    - trivy fs . --skip-dirs .pip-cache --format json --output "${REPORTS_DIR}/trivy-fs.json" --exit-code 0
    - trivy fs . --skip-dirs .pip-cache --format table
    - |
      trivy image \
        --format json \
        --output "${REPORTS_DIR}/trivy-image.json" \
        --exit-code 0 \
        "${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHA}" 2>/dev/null || \
        echo '{"Results":[]}' > "${REPORTS_DIR}/trivy-image.json"
  artifacts:
    reports:
      container_scanning: "${REPORTS_DIR}/trivy-image.json"
    paths:
      - "${REPORTS_DIR}/trivy-fs.json"
      - "${REPORTS_DIR}/trivy-image.json"
    expire_in: 7 days

# ─── MODEL INTEGRITY ─────────────────────────────────────────────────────────

model-signing-install:
  stage: model-integrity
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[sigstore-discovery\]/'
      when: never
    - when: on_success
  needs: ["setup"]
  # Gating (was allow_failure:true → cosmetic). This job verifies the signing
  # toolchain installs/imports AND that the pinned cosign binary matches its
  # published checksum; if either breaks, fail FAST here before the expensive
  # model-integrity jobs (which each reinstall the same stack) run.
  allow_failure: false
  script:
    - pip install "model-signing==${MODEL_SIGNING_VERSION}" "sigstore==${SIGSTORE_PY_VERSION}"
    - python -c "import model_signing; print('model-signing', model_signing.__version__)"
    - apt-get update -qq && apt-get install -y -qq curl ca-certificates
    # cosign is a Go binary — not available on PyPI
    - |
      COSIGN_VERSION="${COSIGN_VERSION}"
      curl -sSfL \
        "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64" \
        -o /tmp/cosign-linux-amd64
      curl -sSfL \
        "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign_checksums.txt" \
        -o /tmp/cosign_checksums.txt
      grep -E "^[0-9a-f]{64}  cosign-linux-amd64$" /tmp/cosign_checksums.txt \
        | (cd /tmp && sha256sum --check --strict)
      install -m 0755 /tmp/cosign-linux-amd64 /usr/local/bin/cosign
      cosign version

model-fixture-download:
  stage: model-integrity
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[sigstore-discovery\]/'
      when: never
    - when: on_success
  needs: ["setup", "model-manifest"]
  before_script: []          # curl-only job; skip Python venv bootstrap
  cache: {}                  # curl-only → the inherited pip cache is a no-op restore/upload
  script:
    - apt-get update -qq && apt-get install -y -qq curl ca-certificates
    - mkdir -p "${MODEL_DIR}" "${EVIDENCE_DIR}"
    - |
      if [ -z "${MODEL_FIXTURE_URL}" ]; then
        echo "MODEL_FIXTURE_URL not set — skipping model fixture download"
        printf '{"skipped":true,"reason":"MODEL_FIXTURE_URL not set"}\n' \
          > "${EVIDENCE_DIR}/model-fixture-download.json"
        exit 0
      fi

      dest="${MODEL_DIR}/${MODEL_FIXTURE_PATH}"
      mkdir -p "$(dirname "${dest}")"
      curl -sSfL "${MODEL_FIXTURE_URL}" -o "${dest}"

      if [ -n "${MODEL_FIXTURE_SHA256}" ]; then
        printf '%s  %s\n' "${MODEL_FIXTURE_SHA256}" "${dest}" | sha256sum --check --strict
      fi

      bytes=$(wc -c < "${dest}" | tr -d ' ')
      printf '{"skipped":false,"path":"%s","sha256":"%s","bytes":%s}\n' \
        "${dest#${CI_PROJECT_DIR}/}" "${MODEL_FIXTURE_SHA256}" "${bytes}" \
        > "${EVIDENCE_DIR}/model-fixture-download.json"
      cat "${EVIDENCE_DIR}/model-fixture-download.json"
  artifacts:
    paths:
      - "${MODEL_DIR}/"
      - "${EVIDENCE_DIR}/model-fixture-download.json"
    expire_in: 1 day

model-digest:
  stage: model-integrity
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[sigstore-discovery\]/'
      when: never
    - when: on_success
  needs: ["model-signing-install", "model-fixture-download"]
  allow_failure: true
  # The digest loop is pure sha256sum/find — no Python deps, no pip cache needed.
  # (Was reinstalling model-signing here and never using it; removed.)
  cache: {}
  script:
    - mkdir -p "${EVIDENCE_DIR}"
    - |
      touch "${EVIDENCE_DIR}/model-digests.txt"
      MODEL_FOUND=0
      for ext in pkl pt safetensors gguf bin h5 onnx; do
        while IFS= read -r -d '' f; do
          MODEL_FOUND=1
          sha256=$(sha256sum "$f" | awk '{print $1}')
          # Fix #32 (root): record REPO-RELATIVE paths, not the absolute /builds/… find
          # path. The recorded string flows verbatim into sign-evidence recorded_digests
          # (#40-F4) and the AI-BOM artifact.path / bom-ref (#41-F5); a relative path
          # clears both at the source. Strip the project dir if $f is under it.
          rel="${f#${CI_PROJECT_DIR}/}"
          echo "${rel}  sha256:${sha256}" | tee -a "${EVIDENCE_DIR}/model-digests.txt"
        done < <(find "${MODEL_DIR}" -type f -name "*.${ext}" -print0 2>/dev/null)
      done
      if [ "${MODEL_FOUND}" -eq 0 ]; then
        echo "WARNING: No model files found under ${MODEL_DIR}" | tee -a "${EVIDENCE_DIR}/model-digests.txt"
      fi
    - cat "${EVIDENCE_DIR}/model-digests.txt"
  artifacts:
    paths:
      - "${EVIDENCE_DIR}/model-digests.txt"
    expire_in: 30 days

model-sign:
  stage: model-integrity
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[sigstore-discovery\]/'
      when: never
    - when: on_success
  needs: ["model-digest", "model-fixture-download", "vault-secrets"]
  # id_tokens issues a per-job OIDC JWT; aud "sigstore" is required by Fulcio for keyless signing.
  id_tokens:
    SIGSTORE_ID_TOKEN:
      aud: "sigstore"
  script:
    - pip install "model-signing==${MODEL_SIGNING_VERSION}" "sigstore==${SIGSTORE_PY_VERSION}"
    - |
      if [ -n "${MODEL_SIGNING_IDENTITY:-}" ]; then
        echo "MODEL_SIGNING_IDENTITY is configured"
      else
        echo "MODEL_SIGNING_IDENTITY is not configured"
      fi
      if [ -n "${SIGSTORE_OIDC_ISSUER:-}" ]; then
        echo "SIGSTORE_OIDC_ISSUER is configured"
      else
        echo "SIGSTORE_OIDC_ISSUER is not configured"
      fi
      SIG_COUNT=0
      while IFS= read -r -d '' model_dir; do
        SIG_COUNT=$((SIG_COUNT + 1))
        echo "Signing: ${model_dir}"
        python -m model_signing sign sigstore "${model_dir}" \
          --identity_token "${SIGSTORE_ID_TOKEN}" \
          --signature "${model_dir}/model.sig"
      done < <(find "${MODEL_DIR}" -mindepth 1 -maxdepth 1 -type d -print0 2>/dev/null)
      if [ "${SIG_COUNT}" -eq 0 ]; then
        # Distinguish "no models to sign" (ok) from "models present but unsigned" (fail).
        MODEL_FILES=$(find "${MODEL_DIR}" -type f ! -name "model.sig" -print -quit 2>/dev/null)
        if [ -n "${MODEL_FILES}" ]; then
          echo "ERROR: model files present under ${MODEL_DIR} but no model directory was signed"
          exit 1
        fi
        echo "No model directories found under ${MODEL_DIR} — nothing to sign"
      fi
  artifacts:
    paths:
      - "${MODEL_DIR}/**/model.sig"
    expire_in: 30 days
  # Gating (was allow_failure:true). A signing failure must NOT pass green and then
  # leave signature-verification with zero sigs to verify (it would pass vacuously).
  allow_failure: false

sigstore-identity-discover:
  stage: model-integrity
  image: python:3.11-slim
  needs: []
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_MESSAGE =~ /\[sigstore-discovery\]/'
      when: manual
    - when: never
  allow_failure: true
  # id_tokens issues the same per-job OIDC JWT shape used by model-sign.
  id_tokens:
    SIGSTORE_ID_TOKEN:
      aud: "sigstore"
  script:
    - pip install --quiet "model-signing==${MODEL_SIGNING_VERSION}" "sigstore==${SIGSTORE_PY_VERSION}" cryptography
    - mkdir -p .sigstore-identity-discover/probe
    - echo "sigstore identity probe" > .sigstore-identity-discover/probe/probe.txt
    - |
      python -m model_signing sign sigstore .sigstore-identity-discover/probe \
        --identity_token "${SIGSTORE_ID_TOKEN}" \
        --signature .sigstore-identity-discover/probe/model.sig
    - |
      python3 - <<'PYEOF'
      import base64
      import json
      from cryptography import x509
      from cryptography.x509.oid import ObjectIdentifier

      bundle = json.load(open(".sigstore-identity-discover/probe/model.sig"))
      vm = bundle.get("verificationMaterial", {})

      if "certificate" in vm:
          der = base64.b64decode(vm["certificate"]["rawBytes"])
      else:
          der = base64.b64decode(vm["x509CertificateChain"]["certificates"][0]["rawBytes"])

      cert = x509.load_der_x509_certificate(der)
      san = cert.extensions.get_extension_for_class(x509.SubjectAlternativeName)
      identity = san.value.get_values_for_type(x509.UniformResourceIdentifier)

      issuer = None
      for oid in ("1.3.6.1.4.1.57264.1.8", "1.3.6.1.4.1.57264.1.1"):
          try:
              raw = cert.extensions.get_extension_for_oid(ObjectIdentifier(oid)).value.value
          except x509.ExtensionNotFound:
              continue
          issuer = raw[2:].decode() if oid.endswith(".1.8") and raw[:1] == b"\x0c" else raw.decode()
          break

      print()
      print("==================== COPY THESE ====================")
      print("MODEL_SIGNING_IDENTITY =", identity[0] if identity else "<none found>")
      print("SIGSTORE_OIDC_ISSUER   =", issuer or "<none found>")
      print("====================================================")
      print()
      PYEOF
  artifacts:
    when: always
    paths:
      - .sigstore-identity-discover/probe/model.sig
    expire_in: 1 hour

signature-verification:
  stage: model-integrity
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[sigstore-discovery\]/'
      when: never
    - when: on_success
  needs: ["model-sign", "model-fixture-download", "vault-secrets"]
  script:
    - pip install "model-signing==${MODEL_SIGNING_VERSION}" "sigstore==${SIGSTORE_PY_VERSION}"
    - mkdir -p "${EVIDENCE_DIR}"
    - |
      # Explainability (was: only "is configured"). Log the ACTUAL identity/issuer
      # we verify against — these are public OIDC URIs, not secrets — so a
      # too-permissive MODEL_SIGNING_IDENTITY is visible in the evidence.
      # Always create the evidence files first so `artifacts: when: always` never
      # warns "no matching files", regardless of which branch below we take.
      : > "${EVIDENCE_DIR}/signature-verification.txt"
      : > "${EVIDENCE_DIR}/signature-verification.jsonl"
      echo "Verifying against:"
      echo "  MODEL_SIGNING_IDENTITY = ${MODEL_SIGNING_IDENTITY:-<unset>}"
      echo "  SIGSTORE_OIDC_ISSUER   = ${SIGSTORE_OIDC_ISSUER:-<unset>}"
      echo "  CI_COMMIT_REF_PROTECTED = ${CI_COMMIT_REF_PROTECTED:-unknown} (branch ${CI_COMMIT_REF_NAME:-?})"
      if [ -z "${MODEL_SIGNING_IDENTITY:-}" ] || [ -z "${SIGSTORE_OIDC_ISSUER:-}" ]; then
        # The pinned identity/issuer are PROTECTED CI/CD variables — GitLab injects
        # them only on protected branches/tags. Distinguish the two cases:
        if [ "${CI_COMMIT_REF_PROTECTED}" = "true" ]; then
          # Protected (enforcing) context with no identity = real misconfiguration.
          echo "GATE FAILED: protected ref but MODEL_SIGNING_IDENTITY / SIGSTORE_OIDC_ISSUER are unset"
          echo "  — these must be set to verify signatures against a pinned identity here."
          exit 1
        fi
        # Unprotected branch: protected vars are not injected by design, so the
        # pinned identity is genuinely unavailable. Signing still happened
        # (model-sign uses the per-job id_token); real verification is enforced on
        # the protected branch. This is NOT the vacuous-pass hole — it is explicitly
        # gated on ref protection, and model.sig presence is recorded below.
        SIG_PRESENT=$(find "${MODEL_DIR}" -name "model.sig" -print -quit 2>/dev/null)
        printf '{"skipped":true,"reason":"unprotected-ref: pinned identity (protected vars) not injected","ref":"%s","model_sig_present":%s}\n' \
          "${CI_COMMIT_REF_NAME:-}" "$( [ -n "${SIG_PRESENT}" ] && echo true || echo false )" \
          | tee "${EVIDENCE_DIR}/signature-verification.jsonl"
        echo "Signature verification DEFERRED to a protected-branch run (model.sig present: $( [ -n "${SIG_PRESENT}" ] && echo yes || echo no ))." \
          | tee -a "${EVIDENCE_DIR}/signature-verification.txt"
        exit 0
      fi
      SIG_COUNT=0
      while IFS= read -r -d '' sig_file; do
        model_dir=$(dirname "${sig_file}")
        SIG_COUNT=$((SIG_COUNT + 1))
        echo "Verifying: ${model_dir}"
        python -m model_signing verify sigstore "${model_dir}" \
          --signature "${sig_file}" \
          --identity "${MODEL_SIGNING_IDENTITY}" \
          --identity_provider "${SIGSTORE_OIDC_ISSUER}"
        # Persist WHAT was verified: cert SAN, issuer, Rekor logIndex, signed+recomputed digest
        python3 "${GAIPS_MATERIALS_DIR}/scripts/explain_signature.py" \
          --bundle "${sig_file}" --model-dir "${model_dir}" \
          --json-out "${EVIDENCE_DIR}/signature-verification.jsonl" \
          | tee -a "${EVIDENCE_DIR}/signature-verification.txt"
      done < <(find "${MODEL_DIR}" -name "model.sig" -print0 2>/dev/null)
      if [ "${SIG_COUNT}" -eq 0 ]; then
        # Vacuous-pass hole: passing green on zero signatures while models exist means
        # a silent signing failure verifies nothing. Fail unless there is truly no model.
        MODEL_FILES=$(find "${MODEL_DIR}" -type f ! -name "model.sig" -print -quit 2>/dev/null)
        if [ -n "${MODEL_FILES}" ]; then
          echo "GATE FAILED: model files present under ${MODEL_DIR} but NO model.sig to verify"
          echo "  (invariant: models exist ⇒ a verified signature must exist)"
          exit 1
        fi
        echo "No model.sig files and no model files — nothing to verify"
      fi
      echo "signature-verification: ${SIG_COUNT} signature(s) verified against the pinned identity"
  artifacts:
    when: always
    paths:
      - "${EVIDENCE_DIR}/signature-verification.txt"
      - "${EVIDENCE_DIR}/signature-verification.jsonl"
    expire_in: 90 days

tamper-verification:
  stage: model-integrity
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[sigstore-discovery\]/'
      when: never
    - when: on_success
  needs: ["model-digest"]
  # Gating (was allow_failure:true, which neutered the sys.exit(1) on detected
  # tamper — the unique cross-pipeline DRIFT check would detect a mismatch and
  # still pass green). First run seeds the baseline and passes; only a genuine
  # baseline≠current mismatch fails. NOTE: set VAULT_ADDR (CI/CD variables) so the
  # baseline is durable — without it the file baseline lives only in a best-effort
  # cache that silently re-seeds to current on eviction (no cross-pipeline guarantee).
  allow_failure: false
  # Persist the file-mode baseline across pipelines (best-effort; Vault is the
  # durable path). Fixed key (not ref-slug) so every run shares one baseline.
  cache:
    - key: pip-${CI_COMMIT_REF_SLUG}
      paths:
        - .pip-cache/
    - key: tamper-baseline-${CI_PROJECT_PATH_SLUG}
      paths:
        - evidence/model-digests-baseline.txt
  # Each Vault-authenticating job needs its own id_token — JWTs are per-job.
  id_tokens:
    VAULT_ID_TOKEN:
      aud: "${CI_SERVER_URL}"
  script:
    - mkdir -p "${EVIDENCE_DIR}"
    - pip install --quiet hvac
    - |
      python3 - <<'PYEOF'
      import hvac, os, pathlib, sys

      evidence_dir  = pathlib.Path(os.environ["EVIDENCE_DIR"])
      current_file  = evidence_dir / "model-digests.txt"
      baseline_file = evidence_dir / "model-digests-baseline.txt"
      project_slug  = os.environ.get("CI_PROJECT_PATH_SLUG", "unknown")
      vault_addr    = os.environ.get("VAULT_ADDR", "")

      current = current_file.read_text() if current_file.exists() else ""

      def is_empty_model_placeholder(text):
          stripped = (text or "").strip()
          return stripped.startswith("WARNING: No model files found under ")

      def has_real_model_digest(text):
          return any("  sha256:" in line for line in (text or "").splitlines())

      # ── Vault-backed baseline (preferred) ───────────────────────────────────
      if vault_addr:
          # namespace="" is harmless on OSS Vault; REQUIRED on HCP Vault / Enterprise.
          client = hvac.Client(
              url=vault_addr,
              namespace=os.environ.get("VAULT_NAMESPACE") or None,
          )
          jwt = os.environ.get("VAULT_ID_TOKEN") or os.environ.get("CI_JOB_JWT_V2", "")
          try:
              client.auth.jwt.jwt_login(role="gaips-ci", jwt=jwt)
          except Exception as exc:
              print(f"WARN: Vault auth failed ({exc}) — falling back to file baseline")
              vault_addr = ""

      if vault_addr:
          kv_path  = f"gaips/tamper-baseline/{project_slug}"
          baseline = None

          try:
              resp = client.secrets.kv.v2.read_secret_version(
                  mount_point="secret", path=kv_path, raise_on_deleted_version=True
              )
              baseline = resp["data"]["data"].get("digests", "")
              print(f"Loaded tamper baseline from Vault ({kv_path})")
          except hvac.exceptions.InvalidPath:
              print(f"No baseline in Vault at {kv_path} — seeding on first run")
          except Exception as exc:
              print(f"WARN: Vault baseline read failed ({exc}) — falling back to file baseline")

          if baseline is None:
              try:
                  client.secrets.kv.v2.create_or_update_secret(
                      mount_point="secret", path=kv_path,
                      secret={"digests": current}
                  )
                  print("Baseline seeded in Vault — permanent storage, no expiry")
              except Exception as exc:
                  print(f"WARN: Vault baseline write failed ({exc})")
              baseline = current

      # ── File-based fallback (no Vault) ──────────────────────────────────────
      # The baseline persists across pipelines ONLY via the best-effort job cache
      # below (single-runner / shared-cache setups). For durable, runner-independent
      # cross-pipeline tamper detection, set VAULT_ADDR — Vault is authoritative.
      else:
          print("VAULT_ADDR not set — using cached file baseline "
                "(best-effort; set VAULT_ADDR for durable cross-pipeline detection)")
          baseline = baseline_file.read_text() if baseline_file.exists() else None
          if baseline is None:
              print("No file baseline — seeding from current digests")
              baseline = current

      if is_empty_model_placeholder(baseline) and has_real_model_digest(current):
          print("Cached tamper baseline only recorded an empty model directory — reseeding with current model digests")
          baseline = current

      # ── Comparison (content-based, path-insensitive) ─────────────────────────
      # Compare the SET of sha256 digests, NOT the full "<path>  sha256:<hash>"
      # lines. The recorded path is environment-dependent (Fix #32 moved it from
      # the absolute /builds/… runner path to a repo-relative one), so a path-format
      # or runner-layout change must NOT read as tampering — only a content-hash
      # change (or a model file added/removed) is real tamper. Comparing lines
      # verbatim made the #32 path change false-positive against a pre-#32 baseline.
      def digest_set(text):
          out = set()
          marker = "sha256:"
          for line in (text or "").splitlines():
              idx = line.find(marker)
              if idx != -1:
                  out.add(line[idx + len(marker):].strip())
          return out

      base_digests = digest_set(baseline)
      cur_digests  = digest_set(current)

      if base_digests and cur_digests and base_digests != cur_digests:
          for h in sorted(base_digests - cur_digests):
              print(f"TAMPER DETECTED — digest in baseline missing from current: sha256:{h}")
          for h in sorted(cur_digests - base_digests):
              print(f"TAMPER DETECTED — digest in current not in baseline:     sha256:{h}")
          sys.exit(1)

      print("Tamper check PASSED — digests match baseline")

      # Migrate the stored baseline to the current (relative-path) form once the
      # CONTENT matches, so the cache/Vault stop carrying the stale absolute-path
      # format. (Previously wrote `baseline` back verbatim → it never self-healed,
      # so the #32 path change would re-trigger the diff on every run.)
      baseline_file.write_text(current or baseline or "")
      if vault_addr and (baseline or "").strip() != (current or "").strip():
          try:
              client.secrets.kv.v2.create_or_update_secret(
                  mount_point="secret", path=f"gaips/tamper-baseline/{project_slug}",
                  secret={"digests": current},
              )
              print("Migrated tamper baseline format in Vault (content unchanged)")
          except Exception as exc:
              print(f"WARN: Vault baseline migrate failed ({exc})")

      (evidence_dir / "integrity.env").write_text("tamper_check_passed=true\n")
      PYEOF
  artifacts:
    paths:
      - "${EVIDENCE_DIR}/integrity.env"
      - "${EVIDENCE_DIR}/model-digests-baseline.txt"  # file fallback; Vault is authoritative when VAULT_ADDR is set
    expire_in: 90 days

modelscan:
  stage: model-integrity
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[sigstore-discovery\]/'
      when: never
    - when: on_success
  needs: ["model-signing-install", "model-fixture-download"]
  script:
    - pip install modelscan
    - mkdir -p "${REPORTS_DIR}" "${MODEL_DIR}"
    - |
      MODEL_FILE=$(find "${MODEL_DIR}" -type f \( -name "*.pt" -o -name "*.pth" -o -name "*.bin" -o -name "*.ckpt" -o -name "*.pb" -o -name "*.h5" -o -name "*.keras" -o -name "*.npy" -o -name "*.pkl" -o -name "*.pickle" -o -name "*.joblib" -o -name "*.dill" \) 2>/dev/null | head -1)
      if [ -z "${MODEL_FILE}" ]; then
        echo "No modelscan-supported model files found under ${MODEL_DIR} — skipping modelscan"
        echo '{"skipped":true,"reason":"no modelscan-supported model files found","summary":{"total_issues_by_severity":{"LOW":0,"MEDIUM":0,"HIGH":0,"CRITICAL":0},"total_issues":0,"scanned":{"total_scanned":0}},"issues":[],"errors":[]}' > "${REPORTS_DIR}/modelscan.json"
        : > "${REPORTS_DIR}/modelscan.log"
        exit 0
      fi
    - |
      set +e
      modelscan scan \
        --path "${MODEL_DIR}" \
        --reporting-format json \
        --output-file "${REPORTS_DIR}/modelscan.json" \
        2>&1 | tee "${REPORTS_DIR}/modelscan.log"; SCAN_EXIT=${PIPESTATUS[0]}
      set -e
      # 0=clean, 1=findings, 3=no supported files. Propagate scan/usage errors.
      [ "${SCAN_EXIT:-0}" -le 1 ] || [ "${SCAN_EXIT:-0}" -eq 3 ] || exit "${SCAN_EXIT}"
    - |
      python - <<'PYEOF'
      import json, sys, os
      data = json.load(open(os.environ["REPORTS_DIR"] + "/modelscan.json"))
      summary = data.get("summary", {})
      total   = summary.get("total_issues_by_severity", {})
      critical = int(total.get("CRITICAL", 0))
      high     = int(total.get("HIGH", 0))
      scanned  = int((summary.get("scanned", {}) or {}).get("total_scanned", 0))
      print(f"modelscan: CRITICAL={critical} HIGH={high} "
            f"MEDIUM={total.get('MEDIUM',0)} LOW={total.get('LOW',0)} "
            f"SCANNED={scanned}")
      if scanned == 0:
          print("modelscan: no supported model artifacts scanned; preserving report and continuing")
      if critical > 0:
          print("CRITICAL issues found — failing pipeline")
          sys.exit(1)
      PYEOF
  artifacts:
    when: always
    paths:
      - "${REPORTS_DIR}/modelscan.json"
      - "${REPORTS_DIR}/modelscan.log"
    expire_in: 7 days
  allow_failure: true

modelaudit-scan:
  stage: model-integrity
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[sigstore-discovery\]/'
      when: never
    - when: on_success
  image: python:3.11-slim
  # modelaudit[all] pulls heavy ML frameworks (tensorflow/torch/…); on a saas-linux-small
  # runner its install + the ~750 MB model fixture overflow the ephemeral disk ([Errno 28],
  # even with --no-cache-dir). A medium runner has the disk headroom. cache:{} drops the
  # inherited pip cache this job restores but can't use (it installs with --no-cache-dir).
  tags: ["saas-linux-medium-amd64"]
  cache: {}
  before_script: []
  needs: ["modelscan", "model-fixture-download"]
  variables:
    DO_NOT_TRACK: "1"
    PROMPTFOO_DISABLE_TELEMETRY: "1"
  script:
    - python3 -c "import sys; assert sys.version_info >= (3, 10), 'modelaudit requires Python >=3.10'"
    # --no-cache-dir: don't keep a second copy of the wheels in pip's cache. modelaudit[all]
    # is a heavy install and shares the small runner's ephemeral disk with the ~750 MB model
    # fixture artifact — caching doubled the wheel footprint and tripped [Errno 28] no-space.
    - pip install --quiet --no-cache-dir --upgrade pip setuptools wheel
    - pip install --quiet --no-cache-dir "modelaudit[all]==${MODELAUDIT_VERSION}"
    - python3 -c "import importlib.metadata as m; print('modelaudit', m.version('modelaudit'))"
    - mkdir -p "${REPORTS_DIR}" "${MODEL_DIR}"
    - |
      MODEL_FILE=$(find "${MODEL_DIR}" -type f 2>/dev/null | head -1)
      if [ -z "${MODEL_FILE}" ]; then
        echo "No model files found under ${MODEL_DIR} — skipping ModelAudit"
        echo '{"tool":"modelaudit","skipped":true,"reason":"no model files found"}' > "${REPORTS_DIR}/modelaudit.json"
        echo '{"tool":"modelaudit","skipped":true,"critical":0,"warning":0,"info":0,"findings":0,"exit_code":0}' > "${REPORTS_DIR}/modelaudit-summary.json"
        : > "${REPORTS_DIR}/modelaudit.log"
        exit 0
      fi
    - |
      set +e
      modelaudit scan "${MODEL_DIR}" \
        --format json \
        --output "${REPORTS_DIR}/modelaudit.json" \
        > "${REPORTS_DIR}/modelaudit.log" 2>&1
      AUDIT_EXIT=$?
      cat "${REPORTS_DIR}/modelaudit.log"
      export AUDIT_EXIT
      set -e
      if [ ! -f "${REPORTS_DIR}/modelaudit.json" ]; then
        printf '{"tool":"modelaudit","status":"failed","exit_code":%s,"reason":"modelaudit scan did not produce an output report"}\n' \
          "${AUDIT_EXIT:-2}" > "${REPORTS_DIR}/modelaudit.json"
      fi
    - |
      python3 - <<'PYEOF'
      import json, os, sys

      report_path = os.path.join(os.environ["REPORTS_DIR"], "modelaudit.json")
      summary_path = os.path.join(os.environ["REPORTS_DIR"], "modelaudit-summary.json")
      audit_exit = int(os.environ.get("AUDIT_EXIT", "0") or 0)

      data = json.load(open(report_path))
      severities = []

      def walk(value):
          if isinstance(value, dict):
              sev = value.get("severity") or value.get("level")
              if isinstance(sev, str):
                  severities.append(sev.upper())
              for child in value.values():
                  walk(child)
          elif isinstance(value, list):
              for child in value:
                  walk(child)

      walk(data)
      critical = sum(1 for sev in severities if sev == "CRITICAL")
      warning = sum(1 for sev in severities if sev in ("WARNING", "WARN", "HIGH", "MEDIUM"))
      info = sum(1 for sev in severities if sev == "INFO")
      failed = data.get("status") == "failed" if isinstance(data, dict) else False
      summary = {
          "tool": "modelaudit",
          "skipped": bool(data.get("skipped", False)) if isinstance(data, dict) else False,
          "exit_code": audit_exit,
          "critical": critical,
          "warning": warning,
          "info": info,
          "findings": len(severities),
          "failed": failed or audit_exit == 2,
      }
      with open(summary_path, "w") as f:
          json.dump(summary, f, indent=2)
      print(f"ModelAudit: CRITICAL={critical} WARNING={warning} INFO={info} exit={audit_exit}")
      # Gate logic — modelaudit exit contract: 0=clean, 1=warning/CRITICAL found,
      # 2=operational error / no files. The previous version re-raised ONLY exit 2
      # and IGNORED exit 1, so a CRITICAL passed green. Enforce on findings too.
      if audit_exit == 2:
          print("ModelAudit operational failure (could not scan) — failing job")
          sys.exit(2)
      if critical > 0:
          print(f"ModelAudit reported {critical} CRITICAL finding(s) — failing job")
          sys.exit(1)
      if audit_exit == 1:
          print(f"ModelAudit reported findings (exit 1: {warning} warning(s)) — failing job")
          sys.exit(1)
      PYEOF
  artifacts:
    when: always
    paths:
      - "${REPORTS_DIR}/modelaudit.json"
      - "${REPORTS_DIR}/modelaudit-summary.json"
      - "${REPORTS_DIR}/modelaudit.log"
    expire_in: 7 days
  # Enforcing: the gate above (op-error / CRITICAL / findings) must be able to fail
  # the pipeline. Was allow_failure:true, which let a CRITICAL pass green.
  allow_failure: false

modelfile-audit:
  stage: model-integrity
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[sigstore-discovery\]/'
      when: never
    - when: on_success
  needs: ["setup"]
  allow_failure: true
  cache: {}             # stdlib-only Python → the inherited pip cache is a no-op restore/upload
  script:
    - mkdir -p "${REPORTS_DIR}" "${EVIDENCE_DIR}"
    - |
      python3 - <<'PYEOF'
      import hashlib, json, os, pathlib, sys

      model_dir    = pathlib.Path(os.environ["MODEL_DIR"])
      report_dir   = pathlib.Path(os.environ["REPORTS_DIR"])
      evidence_dir = pathlib.Path(os.environ["EVIDENCE_DIR"])
      root         = pathlib.Path(os.environ["CI_PROJECT_DIR"])

      # Search MODEL_DIR (recursive) and one level below repo root
      candidates = (
          list(model_dir.rglob("Modelfile")) +
          list(model_dir.rglob("modelfile")) +
          list(root.glob("Modelfile")) +
          list(root.glob("*/Modelfile"))
      )
      seen, modelfiles = set(), []
      for c in candidates:
          rp = c.resolve()
          if rp not in seen:
              seen.add(rp)
              modelfiles.append(c)

      if not modelfiles:
          print("No Modelfiles found — skipping")
          (report_dir / "modelfile-audit.json").write_text(
              json.dumps({"skipped": True, "files": []}, indent=2)
          )
          sys.exit(0)

      digest_lines, results = [], []

      for mf in modelfiles:
          rel    = str(mf.relative_to(root))
          text   = mf.read_text(errors="replace")
          digest = hashlib.sha256(text.encode()).hexdigest()
          digest_lines.append(f"{rel}  sha256:{digest}")
          results.append({"file": rel, "sha256": digest})
          print(f"{rel}  sha256:{digest}")

      # Separate file avoids a write race with model-digest
      (evidence_dir / "modelfile-digests.txt").write_text("\n".join(digest_lines) + "\n")

      (report_dir / "modelfile-audit.json").write_text(
          json.dumps({"skipped": False, "files_audited": len(results), "files": results}, indent=2)
      )
      print(f"\n{len(results)} Modelfile(s) hashed")
      PYEOF
  artifacts:
    paths:
      - "${REPORTS_DIR}/modelfile-audit.json"
      - "${EVIDENCE_DIR}/modelfile-digests.txt"
    expire_in: 7 days

clamav-scan:
  stage: model-integrity
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[sigstore-discovery\]/'
      when: never
    - when: on_success
  image: "${IMAGE_CLAMAV}"
  before_script: []          # clamav image has no Python — skip .python-secure
  needs: ["model-signing-install", "model-fixture-download"]
  cache: {}                  # no Python → the inherited pip cache is a no-op restore/upload
  script:
    - mkdir -p "${REPORTS_DIR}" "${MODEL_DIR}"
    - |
      # Pull latest malware signatures; non-fatal if mirror is unreachable
      freshclam --quiet 2>&1 | tail -3 || echo "WARNING: freshclam update failed — using cached DB"
    - |
      set +e
      echo "=== ClamAV model scan ==="
      id
      ls -la "${MODEL_DIR}"
      # NOTE: --no-summary was removed. This is the only malware control that HARD
      # GATES, so its evidence must prove the scan actually happened: the summary
      # records "Known viruses" (DB loaded) and "Scanned files" (the bytes were read).
      # Without it, a clean 718MiB scan and a zero-file scan emit identical evidence.
      clamscan \
        --recursive \
        --infected \
        --max-filesize=2047M \
        --max-scansize=2047M \
        --log="${REPORTS_DIR}/clamav-model.log" \
        "${MODEL_DIR}" \
        > "${REPORTS_DIR}/clamav-model.txt" 2>&1
      CLAM_EXIT=$?
      cat "${REPORTS_DIR}/clamav-model.txt"
      echo "clamscan exit: ${CLAM_EXIT}"
      set -e
      # clamscan exit codes: 0=clean 1=virus found 2=error.
      if [ -f "${REPORTS_DIR}/clamav-model.log" ]; then
        INFECTED=$(awk '/ FOUND$/ { count++ } END { print count + 0 }' "${REPORTS_DIR}/clamav-model.log")
      else
        INFECTED=0
      fi
      # Parse the summary so green can't mean "scanned nothing". Lenient extraction
      # (tolerates spacing); empty = couldn't parse, which we handle separately from 0.
      SCANNED=$(grep -oE 'Scanned files: *[0-9]+' "${REPORTS_DIR}/clamav-model.txt" "${REPORTS_DIR}/clamav-model.log" 2>/dev/null | grep -oE '[0-9]+' | tail -1)
      SIGS=$(grep -oE 'Known viruses: *[0-9]+' "${REPORTS_DIR}/clamav-model.txt" "${REPORTS_DIR}/clamav-model.log" 2>/dev/null | grep -oE '[0-9]+' | tail -1)
      printf '{"scanned_dir":"%s","infected":%s,"scanned_files":%s,"known_viruses":%s,"exit_code":%s}\n' \
        "${MODEL_DIR}" "${INFECTED}" "${SCANNED:-null}" "${SIGS:-null}" "${CLAM_EXIT}" \
        > "${REPORTS_DIR}/clamav-model.json"
      echo "ClamAV: ${INFECTED} infected | ${SCANNED:-?} file(s) scanned | ${SIGS:-?} signature(s) loaded | exit ${CLAM_EXIT}"
      if [ "${CLAM_EXIT}" -eq 1 ]; then
        echo "INFECTED — see report"
        exit 1
      elif [ "${CLAM_EXIT}" -ne 0 ]; then
        echo "clamscan ERROR (exit ${CLAM_EXIT})"
        exit "${CLAM_EXIT}"
      fi
      # Empty-scan guard. Only fail on a POSITIVELY-empty scan; if the summary
      # couldn't be parsed, fall back to a file-count so a format quirk can't
      # false-fail this hard gate over a genuinely clean run.
      if [ -n "${SCANNED}" ]; then
        if [ "${SCANNED}" -lt 1 ]; then
          echo "GATE FAILED: ClamAV reported 0 files scanned — a hard gate must not pass over an empty scan"
          exit 1
        fi
      else
        FILE_COUNT=$(find "${MODEL_DIR}" -type f 2>/dev/null | wc -l | tr -d ' ')
        echo "WARNING: could not parse ClamAV 'Scanned files' summary; MODEL_DIR file count=${FILE_COUNT}"
        if [ "${FILE_COUNT}" -lt 1 ]; then
          echo "GATE FAILED: nothing under ${MODEL_DIR} to scan"
          exit 1
        fi
      fi
      echo "clean (${SCANNED} file(s) scanned)"
  artifacts:
    paths:
      - "${REPORTS_DIR}/clamav-model.log"
      - "${REPORTS_DIR}/clamav-model.txt"
      - "${REPORTS_DIR}/clamav-model.json"
    expire_in: 7 days
  allow_failure: false

# HuggingFace PROVENANCE / POLICY gate (rewritten). The old job installed a
# ~73-pkg apt ClamAV stack + modelscan and re-downloaded each repo BEFORE checking
# HF_MODEL_IDS — then usually skipped, paying the whole cost for nothing, and never
# gated. Local model bytes are already covered by clamav-scan #24, model-digest #16,
# and model-sign/verify #18/#19, so re-scanning HF downloads here is redundant. What
# the HF API uniquely offers is PROVENANCE the local scans can't see: this gate uses
# huggingface_hub.model_info to enforce policy on EXTERNAL repos — disabled kill-switch,
# author allowlist, and a pinned commit sha — without re-downloading the weights.
# (modelscan #21 is intentionally left as the local pickle/.pth scanner — not touched.)
hf-artifact-scan:
  stage: model-integrity
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[sigstore-discovery\]/'
      when: never
    - when: on_success
  needs: ["setup", "vault-secrets"]
  script:
    # Guard FIRST — HF policy gating is genuinely opt-in (no external repos to gate
    # unless HF_MODEL_IDS is set). Skip BEFORE any install so an unset var is free.
    - mkdir -p "${REPORTS_DIR}/hf-scan"
    - |
      if [ -z "${HF_MODEL_IDS}" ]; then
        echo "HF_MODEL_IDS not set — no external HF repos to gate (skipping, by design)"
        echo '{"skipped":true,"reason":"HF_MODEL_IDS not set","gated":[]}' > "${REPORTS_DIR}/hf-scan/summary.json"
        exit 0
      fi
    - pip install "huggingface_hub"
    - |
      python - <<'PYEOF'
      import json, os, sys
      from huggingface_hub import model_info
      from pathlib import Path

      model_ids = [m.strip() for m in os.environ["HF_MODEL_IDS"].split(",") if m.strip()]
      report_dir = Path(os.environ["REPORTS_DIR"]) / "hf-scan"
      token      = os.environ.get("HF_TOKEN") or None

      allow_authors = {a.strip() for a in os.environ.get("HF_AUTHOR_ALLOWLIST", "").split(",") if a.strip()}
      pinned = {}
      for item in os.environ.get("HF_PINNED_SHAS", "").split(","):
          if "=" in item:
              k, v = item.split("=", 1)
              pinned[k.strip()] = v.strip()

      results = []
      exit_code = 0

      for model_id in model_ids:
          print(f"\n=== HF provenance gate: {model_id} ===")
          record = {"model_id": model_id, "violations": []}
          try:
              info = model_info(model_id, token=token, files_metadata=False)
              author = (model_id.split("/")[0] if "/" in model_id else getattr(info, "author", None))
              sha = getattr(info, "sha", None)
              disabled = bool(getattr(info, "disabled", False))
              gated = getattr(info, "gated", False)
              siblings = [s.rfilename for s in (getattr(info, "siblings", []) or [])]
              record.update({
                  "author": author, "sha": sha, "disabled": disabled,
                  "gated": gated, "private": bool(getattr(info, "private", False)),
                  "files": len(siblings),
              })
              print(f"  author={author} sha={sha} disabled={disabled} gated={gated} files={len(siblings)}")

              # Policy: disabled repos are a hard fail (moderation kill-switch).
              if disabled:
                  record["violations"].append("repo is disabled on the Hub (moderation kill-switch)")
              # Policy: author must be on the allowlist when one is configured.
              if allow_authors and author not in allow_authors:
                  record["violations"].append(f"author '{author}' not in HF_AUTHOR_ALLOWLIST")
              # Policy: live sha must match the pin when one is configured.
              want = pinned.get(model_id)
              if want and sha and want != sha:
                  record["violations"].append(f"sha mismatch — pinned {want}, live {sha}")

          except Exception as exc:
              record["violations"].append(f"model_info failed: {exc}")
              print(f"  ERROR: {exc}")

          if record["violations"]:
              exit_code = 1
              for v in record["violations"]:
                  print(f"  POLICY VIOLATION: {v}")
          else:
              print("  OK — provenance policy satisfied")
          results.append(record)

      summary = {"skipped": False, "gated": results}
      with open(report_dir / "summary.json", "w") as f:
          json.dump(summary, f, indent=2, default=str)
      print(f"\nHF provenance gate complete — {len(results)} repo(s) checked, exit {exit_code}")
      sys.exit(exit_code)
      PYEOF
  artifacts:
    when: always
    paths:
      - "${REPORTS_DIR}/hf-scan/"
    expire_in: 7 days
  # Gating: a disabled repo / disallowed author / sha drift must fail the pipeline.
  allow_failure: false

dataset-download:
  stage: model-integrity
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[sigstore-discovery\]/'
      when: never
    - when: on_success
  needs: ["setup", "vault-secrets"]
  allow_failure: true   # skips gracefully when DATASET_FILENAME is not set
  cache: {}             # curl/cp-only → the inherited pip cache is a no-op restore/upload
  script:
    - mkdir -p "${EVIDENCE_DIR}/dataset-input" "${REPORTS_DIR}"
    - |
      # Honour the chain escape hatch HERE so it actually works end-to-end: if the
      # dataset chain is disabled, stage NO fixture, so every downstream gate hits
      # its DATASETS_DISABLED skip branch (exit 0) rather than running on a fixture.
      if [ "${DATASETS_DISABLED}" = "true" ]; then
        echo "DATASETS_DISABLED=true — dataset chain disabled; staging no dataset"
        echo '{"skipped":true,"reason":"datasets-disabled"}' > "${REPORTS_DIR}/dataset-download.json"
        exit 0
      fi
    - |
      if [ -z "${DATASET_FILENAME}" ]; then
        DATASET_FILENAME="${DATASET_FIXTURE_FILE:-ci-dataset.jsonl}"
        FIXTURE_DATASET="${GAIPS_MATERIALS_DIR}/evals/${DATASET_FILENAME}"
        DATASET_PATH="${EVIDENCE_DIR}/dataset-input/${DATASET_FILENAME}"
        echo "DATASET_FILENAME not set — using committed CI dataset fixture: ${FIXTURE_DATASET}"
        cp "${FIXTURE_DATASET}" "${DATASET_PATH}"
        DIGEST=$(sha256sum "${DATASET_PATH}" | awk '{print $1}')
        SIZE_BYTES=$(wc -c < "${DATASET_PATH}" | tr -d ' ')
        echo "${DATASET_FILENAME}  sha256:${DIGEST}" | tee "${EVIDENCE_DIR}/dataset-digest.txt"
        # Tamper gate for the committed fixture: when DATASET_EXPECTED_SHA256 is pinned
        # (from evals/dataset-baseline.json), the staged fixture must match it — any
        # edit to the committed dataset trips the pipeline. This is the raw, pre-redaction
        # digest, so it is unaffected by Presidio's non-deterministic redaction.
        if [ -n "${DATASET_EXPECTED_SHA256}" ] && [ "${DIGEST}" != "${DATASET_EXPECTED_SHA256}" ]; then
          echo "ERROR: fixture SHA-256 mismatch — expected ${DATASET_EXPECTED_SHA256}, got ${DIGEST}"
          echo "       The committed dataset changed without updating its baseline pin."
          exit 1
        fi
        [ -n "${DATASET_EXPECTED_SHA256}" ] && echo "Fixture integrity verified against DATASET_EXPECTED_SHA256"
        printf '{"skipped":false,"fixture":true,"file":"%s","size_bytes":%s,"sha256":"%s"}\n' \
          "${DATASET_FILENAME}" "${SIZE_BYTES}" "${DIGEST}" \
          > "${REPORTS_DIR}/dataset-download.json"
        echo "Dataset fixture staged: ${DATASET_FILENAME} (${SIZE_BYTES} bytes)"
        exit 0
      fi
    - |
      # Download mode requires an integrity pin (mirrors the always-on model
      # fixture check). Without DATASET_EXPECTED_SHA256 a downloaded dataset would
      # be accepted unverified — fail unless the operator explicitly opts out.
      if [ -z "${DATASET_EXPECTED_SHA256}" ] && [ "${DATASET_ALLOW_UNVERIFIED}" != "true" ]; then
        echo "ERROR: download mode requires DATASET_EXPECTED_SHA256 (the dataset integrity pin)."
        echo "       Set it to the expected sha256, or set DATASET_ALLOW_UNVERIFIED=true to accept"
        echo "       an unverified download (NOT recommended)."
        exit 1
      fi
    # python:3.11-slim ships no curl — install it before the registry download.
    # (Only reached in download mode; the fixture path above uses cp and exits first.)
    - apt-get update -qq && apt-get install -y -qq --no-install-recommends curl ca-certificates
    - |
      DOWNLOAD_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${DATASET_PACKAGE_NAME}/${DATASET_PACKAGE_VERSION}/${DATASET_FILENAME}"
      echo "Downloading: ${DOWNLOAD_URL}"
      curl --fail --location \
        --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        --output "${EVIDENCE_DIR}/dataset-input/${DATASET_FILENAME}" \
        "${DOWNLOAD_URL}"
    - |
      FILEPATH="${EVIDENCE_DIR}/dataset-input/${DATASET_FILENAME}"
      DIGEST=$(sha256sum "${FILEPATH}" | awk '{print $1}')
      echo "${DATASET_FILENAME}  sha256:${DIGEST}" | tee "${EVIDENCE_DIR}/dataset-digest.txt"
      if [ -n "${DATASET_EXPECTED_SHA256}" ]; then
        if [ "${DIGEST}" != "${DATASET_EXPECTED_SHA256}" ]; then
          echo "ERROR: SHA-256 mismatch — expected ${DATASET_EXPECTED_SHA256}, got ${DIGEST}"
          exit 1
        fi
        echo "Dataset integrity verified against DATASET_EXPECTED_SHA256"
      else
        echo "WARNING: DATASET_ALLOW_UNVERIFIED=true — accepting downloaded dataset WITHOUT a hash pin"
      fi
    - |
      python3 - <<'PYEOF'
      import json, os, pathlib
      evidence_dir = pathlib.Path(os.environ["EVIDENCE_DIR"])
      filename     = os.environ["DATASET_FILENAME"]
      filepath     = evidence_dir / "dataset-input" / filename
      digest_line  = (evidence_dir / "dataset-digest.txt").read_text().strip()
      report = {
          "skipped":    False,
          "file":       filename,
          "size_bytes": filepath.stat().st_size,
          "sha256":     digest_line.split("sha256:")[1],
      }
      (pathlib.Path(os.environ["REPORTS_DIR"]) / "dataset-download.json").write_text(
          json.dumps(report, indent=2)
      )
      print(f"Dataset downloaded: {filename} ({report['size_bytes']:,} bytes)")
      PYEOF
  artifacts:
    paths:
      - "${EVIDENCE_DIR}/dataset-input/"
      - "${EVIDENCE_DIR}/dataset-digest.txt"
      - "${REPORTS_DIR}/dataset-download.json"
    expire_in: 1 day

dataset-scan:
  stage: model-integrity
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[sigstore-discovery\]/'
      when: never
    - when: on_success
  needs: ["dataset-download"]
  allow_failure: false   # hard gate — dataset must be clean before reaching eval jobs
  cache: {}              # AV scan via apt clamav, no pip → the inherited pip cache is a no-op
  script:
    - mkdir -p "${REPORTS_DIR}" "${EVIDENCE_DIR}/dataset-input"
    - |
      DATASET_FILE=$(find "${EVIDENCE_DIR}/dataset-input" -type f -print -quit 2>/dev/null)
      if [ -z "${DATASET_FILE}" ]; then
        if [ "${DATASETS_DISABLED}" = "true" ]; then
          echo "Dataset chain disabled (DATASETS_DISABLED=true) — scan skipped"
          echo '{"skipped":true,"reason":"datasets-disabled"}' > "${REPORTS_DIR}/dataset-scan.json"
          exit 0
        fi
        echo "ERROR: no dataset from dataset-download but the chain is enabled — broken chain, not a skip"
        echo '{"skipped":false,"error":"expected-but-missing dataset (broken chain)"}' > "${REPORTS_DIR}/dataset-scan.json"
        exit 1
      fi
      echo "Scanning: ${DATASET_FILE}"
    # --no-install-recommends drops the ~73-pkg recommended stack (exim4 MTA et al.)
    # that plain `apt-get install clamav` pulled in to scan a few bytes. The job
    # stays on python:3.11-slim because the structural JSONL gate below needs
    # python3 (the clamav/clamav image, used by clamav-scan #24, ships no Python).
    - apt-get update -qq && apt-get install -y -qq --no-install-recommends clamav clamav-freshclam ca-certificates
    - |
      freshclam --quiet 2>&1 | tail -3 || echo "WARNING: freshclam update failed — using cached DB"
    - |
      DATASET_FILE=$(find "${EVIDENCE_DIR}/dataset-input" -type f -print -quit)
      [ -n "${DATASET_FILE}" ] || { echo "No dataset file found before ClamAV scan"; exit 1; }
      echo "=== ClamAV dataset scan ==="
      echo "user: $(id)"
      echo "dataset-input listing:"
      ls -la "${EVIDENCE_DIR}/dataset-input"
      set +e
      # --no-summary removed: this is a hard gate, so the evidence must show the DB
      # loaded ("Known viruses") and the file was read ("Scanned files").
      clamscan \
        --infected \
        --log="${REPORTS_DIR}/dataset-clamav.log" \
        "${DATASET_FILE}" \
        2>&1 | tee "${REPORTS_DIR}/clamav-dataset.txt"
      CLAM_EXIT=${PIPESTATUS[0]}
      set -e
      echo "clamscan exit: ${CLAM_EXIT}"
      if [ -f "${REPORTS_DIR}/dataset-clamav.log" ]; then
        INFECTED=$(awk '/ FOUND$/ { count++ } END { print count + 0 }' "${REPORTS_DIR}/dataset-clamav.log")
      else
        INFECTED=0
      fi
      SCANNED=$(grep -oE 'Scanned files: *[0-9]+' "${REPORTS_DIR}/clamav-dataset.txt" "${REPORTS_DIR}/dataset-clamav.log" 2>/dev/null | grep -oE '[0-9]+' | tail -1)
      SIGS=$(grep -oE 'Known viruses: *[0-9]+' "${REPORTS_DIR}/clamav-dataset.txt" "${REPORTS_DIR}/dataset-clamav.log" 2>/dev/null | grep -oE '[0-9]+' | tail -1)
      printf '{"scanned_file":"%s","infected":%s,"scanned_files":%s,"known_viruses":%s,"exit_code":%s}\n' \
        "${DATASET_FILE}" "${INFECTED}" "${SCANNED:-null}" "${SIGS:-null}" "${CLAM_EXIT}" \
        > "${REPORTS_DIR}/dataset-clamav.json"
      echo "ClamAV: ${INFECTED} infected | ${SCANNED:-?} file(s) scanned | ${SIGS:-?} signature(s) loaded | exit ${CLAM_EXIT}"
      if [ "${CLAM_EXIT}" -eq 1 ]; then
        echo "INFECTED — see report above"
        exit 1
      elif [ "${CLAM_EXIT}" -ne 0 ]; then
        echo "clamscan ERROR (exit ${CLAM_EXIT})"
        exit "${CLAM_EXIT}"
      fi
      # Empty-scan guard, with a fall back so a summary-parse miss can't false-fail
      # this hard gate (the dataset file is known to exist from the guard above).
      if [ -n "${SCANNED}" ]; then
        if [ "${SCANNED}" -lt 1 ]; then
          echo "GATE FAILED: ClamAV reported 0 files scanned — a hard gate must not pass over an empty scan"
          exit 1
        fi
      else
        echo "WARNING: could not parse ClamAV 'Scanned files' summary; verifying the target file is non-empty"
        [ -s "${DATASET_FILE}" ] || { echo "GATE FAILED: dataset file ${DATASET_FILE} is empty/missing"; exit 1; }
      fi
      echo "clean (${SCANNED:-?} file(s) scanned)"
    - |
      python3 - <<'PYEOF'
      import json, os, pathlib, sys

      evidence_dir = pathlib.Path(os.environ["EVIDENCE_DIR"])
      report_dir   = pathlib.Path(os.environ["REPORTS_DIR"])

      dataset_file = next(evidence_dir.glob("dataset-input/*"), None)
      if not dataset_file:
          sys.exit(0)

      findings = []
      text = dataset_file.read_text(errors="replace")

      # Structural validation — JSON and JSONL are the expected dataset formats
      if dataset_file.suffix == ".json":
          try:
              data = json.loads(text)
              count = len(data) if isinstance(data, list) else 1
              print(f"JSON valid — {count} record(s)")
          except json.JSONDecodeError as exc:
              findings.append({"severity": "HIGH", "detail": f"Invalid JSON: {exc}"})
      elif dataset_file.suffix in (".jsonl", ".ndjson"):
          line_errors = []
          for i, line in enumerate(text.splitlines(), 1):
              if not line.strip():
                  continue
              try:
                  json.loads(line)
              except json.JSONDecodeError as exc:
                  line_errors.append(f"line {i}: {exc}")
          if line_errors:
              findings.append({"severity": "HIGH", "detail": f"Invalid JSONL: {line_errors[:3]}"})
          else:
              print(f"JSONL valid — {i} line(s)")
      else:
          print(f"Format {dataset_file.suffix!r} — structural validation skipped")

      report = {
          "skipped":  False,
          "file":     dataset_file.name,
          "findings": findings,
      }
      (report_dir / "dataset-scan.json").write_text(json.dumps(report, indent=2))

      if findings:
          for f in findings:
              print(f"  [{f['severity']}] {f['detail']}")
          sys.exit(1)

      print("Dataset scan PASSED")
      PYEOF
  artifacts:
    paths:
      - "${REPORTS_DIR}/dataset-scan.json"
      - "${REPORTS_DIR}/dataset-clamav.log"
      - "${REPORTS_DIR}/dataset-clamav.json"
      - "${REPORTS_DIR}/clamav-dataset.txt"
    expire_in: 7 days

# Defence-in-depth on data confidentiality: after the AV/structural gate, strip
# secrets (gitleaks) and PII (Presidio) from the downloaded data IN PLACE, before
# it is validated, signed, or loaded into any eval.
dataset-redact:
  stage: model-integrity
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[sigstore-discovery\]/'
      when: never
    - when: on_success
  # needs BOTH: dataset-scan gives the clean-gate ordering edge; dataset-download
  # carries the actual evidence/dataset-input/ artifact (dataset-scan republishes
  # only its reports). Without dataset-download here, redact got an empty input and
  # skipped green — starving validate/GX/profile/sign down the chain.
  needs: ["dataset-scan", "dataset-download"]
  # Fail-closed: a redaction tooling failure must NOT let unredacted data through,
  # AND a missing-but-expected dataset (broken chain) must FAIL — not skip green.
  allow_failure: false
  variables:
    # Data is always redacted; the job then HARD-FAILS if findings exceed these.
    # Default: zero tolerance for secrets in training data; PII gate opt-in (-1).
    REDACT_MAX_SECRETS: "0"
    REDACT_MAX_PII: "-1"
  script:
    - mkdir -p "${REPORTS_DIR}" "${EVIDENCE_DIR}/dataset-input"
    - |
      DATASET_FILE=$(find "${EVIDENCE_DIR}/dataset-input" -maxdepth 1 -type f \
        ! -name "dataset.sig" ! -name "dataset.pem" 2>/dev/null | head -1 || true)
      if [ -z "${DATASET_FILE}" ]; then
        if [ "${DATASETS_DISABLED}" = "true" ]; then
          echo "Dataset chain disabled (DATASETS_DISABLED=true) — redaction skipped"
          echo '{"skipped":true,"reason":"datasets-disabled"}' > "${REPORTS_DIR}/dataset-redact.json"
          exit 0
        fi
        echo "ERROR: no dataset under dataset-input/ but the chain is enabled — expected the dataset"
        echo "       staged by dataset-download. This is a BROKEN CHAIN (check needs:/artifacts), not"
        echo "       an intended skip. Set DATASETS_DISABLED=true only to deliberately run without data."
        echo '{"skipped":false,"error":"expected-but-missing dataset (broken chain)"}' > "${REPORTS_DIR}/dataset-redact.json"
        exit 1
      fi
    # python:3.11-slim ships no curl — install it (+ CA certs) before fetching the
    # gitleaks release. Runs only after the skip guard so a disabled chain pays nothing.
    - apt-get update -qq && apt-get install -y -qq --no-install-recommends curl ca-certificates
    - |
      # Install gitleaks (Go binary) — checksum-verified against the official
      # release checksums file, same trust model as the cosign install.
      TGZ="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
      curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${TGZ}" -o "/tmp/${TGZ}"
      curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_checksums.txt" -o /tmp/gitleaks_checksums.txt
      grep " ${TGZ}\$" /tmp/gitleaks_checksums.txt | (cd /tmp && sha256sum --check --strict)
      tar -xzf "/tmp/${TGZ}" -C /tmp gitleaks
      install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
      gitleaks version
    # `click` is installed explicitly: spaCy's CLI imports it directly, but the
    # presidio dependency tree pulls typer 0.26.x, which no longer hard-depends on
    # click — so `python -m spacy download` would die with ModuleNotFoundError.
    - pip install "presidio-analyzer" "presidio-anonymizer" "click"
    - python -m spacy download en_core_web_sm
    - |
      DATASET_FILE=$(find "${EVIDENCE_DIR}/dataset-input" -maxdepth 1 -type f \
        ! -name "dataset.sig" ! -name "dataset.pem" | head -1 || true)
      # Detect secrets (raw report stays internal — never published as an artifact)
      gitleaks detect --no-git --source "${DATASET_FILE}" \
        --report-format json --report-path /tmp/gitleaks-dataset.json --exit-code 0 || true
      python3 "${GAIPS_MATERIALS_DIR}/scripts/redact_dataset.py" \
        --input "${DATASET_FILE}" \
        --gitleaks-report /tmp/gitleaks-dataset.json \
        --report "${REPORTS_DIR}/dataset-redact.json" \
        --max-secrets "${REDACT_MAX_SECRETS}" \
        --max-pii "${REDACT_MAX_PII}"
  artifacts:
    paths:
      - "${REPORTS_DIR}/dataset-redact.json"
      - "${EVIDENCE_DIR}/dataset-input/"   # the redacted data
    expire_in: 7 days

# Contract gate: the eval/training dataset must conform to the eval-dataset JSON
# Schema before any eval job loads it. Catches off-contract data up front.
eval-dataset-validate:
  stage: model-integrity
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[sigstore-discovery\]/'
      when: never
    - when: on_success
  needs: ["dataset-redact"]
  allow_failure: false   # a malformed eval dataset must stop the run (skips cleanly when no dataset)
  script:
    # Guard BEFORE the install — an intentionally-disabled chain shouldn't pay for pip.
    - mkdir -p "${REPORTS_DIR}"
    - |
      DATASET_FILE=$(find "${EVIDENCE_DIR}/dataset-input" -maxdepth 1 -type f \
        ! -name "dataset.sig" ! -name "dataset.pem" 2>/dev/null | head -1 || true)
      if [ -z "${DATASET_FILE}" ]; then
        if [ "${DATASETS_DISABLED}" = "true" ]; then
          echo "Dataset chain disabled (DATASETS_DISABLED=true) — schema validation skipped"
          echo '{"skipped":true,"reason":"datasets-disabled"}' > "${REPORTS_DIR}/eval-dataset-validation.json"
          exit 0
        fi
        echo "ERROR: no eval dataset present but the chain is enabled — expected dataset-redact's"
        echo "       republished dataset-input/. Broken chain, not an intended skip."
        echo '{"skipped":false,"error":"expected-but-missing dataset (broken chain)"}' > "${REPORTS_DIR}/eval-dataset-validation.json"
        exit 1
      fi
    - pip install jsonschema
    - |
      DATASET_FILE=$(find "${EVIDENCE_DIR}/dataset-input" -maxdepth 1 -type f \
        ! -name "dataset.sig" ! -name "dataset.pem" 2>/dev/null | head -1 || true)
      python3 "${GAIPS_MATERIALS_DIR}/scripts/validate_eval_dataset.py" \
        --dataset "${DATASET_FILE}" \
        --schema "${GAIPS_MATERIALS_DIR}/evals/eval-dataset.schema.json" \
        --report "${REPORTS_DIR}/eval-dataset-validation.json"
  artifacts:
    paths:
      - "${REPORTS_DIR}/eval-dataset-validation.json"
    expire_in: 7 days

# Content-quality gate, one rung above eval-dataset-validate's STRUCTURE gate:
# null rates, value ranges, uniqueness, cardinality — expressed as a Great
# Expectations checkpoint whose pass/fail gates the run, with Data Docs as a
# human-readable evidence artifact. Runs on the redacted, on-contract data.
great-expectations-validate:
  stage: model-integrity
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[sigstore-discovery\]/'
      when: never
    - when: on_success
  needs: ["eval-dataset-validate", "dataset-redact"]
  allow_failure: true   # soft gate — flip to false once expectations are tuned (mixed-strictness rollout)
  script:
    - pip install great-expectations pandas
    - mkdir -p "${REPORTS_DIR}" "${EVIDENCE_DIR}/great-expectations"
    - |
      DATASET_FILE=$(find "${EVIDENCE_DIR}/dataset-input" -maxdepth 1 -type f \
        ! -name "dataset.sig" ! -name "dataset.pem" 2>/dev/null | head -1 || true)
      if [ -z "${DATASET_FILE}" ]; then
        if [ "${DATASETS_DISABLED}" = "true" ]; then
          echo "Dataset chain disabled (DATASETS_DISABLED=true) — GX content gate skipped"
          echo '{"skipped":true,"reason":"datasets-disabled"}' > "${REPORTS_DIR}/great-expectations.json"
          exit 0
        fi
        echo "ERROR: no dataset present but the chain is enabled — broken chain, not an intended skip"
        echo '{"skipped":false,"error":"expected-but-missing dataset (broken chain)"}' > "${REPORTS_DIR}/great-expectations.json"
        exit 1
      fi
      python3 "${GAIPS_MATERIALS_DIR}/scripts/run_great_expectations.py" \
        --dataset "${DATASET_FILE}" \
        --suite "${GAIPS_MATERIALS_DIR}/evals/great-expectations-suite.json" \
        --report "${REPORTS_DIR}/great-expectations.json" \
        --docs-dir "${EVIDENCE_DIR}/great-expectations/data-docs" \
        --gx-root "${CI_PROJECT_DIR}/.gx"
  artifacts:
    paths:
      - "${REPORTS_DIR}/great-expectations.json"
      - "${EVIDENCE_DIR}/great-expectations/"   # Data Docs site
    expire_in: 30 days

# Advisory auto-profile of the dataset (types, distributions, null counts,
# cardinality, alerts). Pairs with the GX gate: profile → read alerts → refine
# the expectation suite. Never gates — artifact only.
ydata-profile:
  stage: model-integrity
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[sigstore-discovery\]/'
      when: never
    - when: on_success
  needs: ["dataset-redact"]
  allow_failure: true   # advisory profiling — never blocks
  script:
    # Pin setuptools<81: it removed the bundled pkg_resources, which ydata-profiling
    # still imports (the shared before_script upgrades setuptools to 82). Install it
    # first so pkg_resources is present.
    - pip install "setuptools<81" ydata-profiling pandas
    - mkdir -p "${REPORTS_DIR}" "${EVIDENCE_DIR}/ydata-profile"
    - |
      DATASET_FILE=$(find "${EVIDENCE_DIR}/dataset-input" -maxdepth 1 -type f \
        ! -name "dataset.sig" ! -name "dataset.pem" 2>/dev/null | head -1 || true)
      if [ -z "${DATASET_FILE}" ]; then
        if [ "${DATASETS_DISABLED}" = "true" ]; then
          echo "Dataset chain disabled (DATASETS_DISABLED=true) — profiling skipped"
          echo '{"skipped":true,"reason":"datasets-disabled"}' > "${REPORTS_DIR}/ydata-profile.json"
          exit 0
        fi
        echo "ERROR: no dataset present but the chain is enabled — broken chain, not an intended skip"
        echo '{"skipped":false,"error":"expected-but-missing dataset (broken chain)"}' > "${REPORTS_DIR}/ydata-profile.json"
        exit 1
      fi
      python3 "${GAIPS_MATERIALS_DIR}/scripts/run_ydata_profile.py" \
        --dataset "${DATASET_FILE}" \
        --html "${EVIDENCE_DIR}/ydata-profile/profile.html" \
        --json "${REPORTS_DIR}/ydata-profile.json"
  artifacts:
    paths:
      - "${REPORTS_DIR}/ydata-profile.json"
      - "${EVIDENCE_DIR}/ydata-profile/"
    expire_in: 30 days

dataset-sign:
  stage: model-integrity
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[sigstore-discovery\]/'
      when: never
    - when: on_success
  # Sign only AFTER scan + redaction + schema validation — attest clean, redacted,
  # on-contract data (signs the redacted bytes, never the raw download).
  # needs BOTH: eval-dataset-validate is the ordering edge (validation must pass);
  # dataset-redact carries the actual evidence/dataset-input/ (the redacted bytes) —
  # eval-dataset-validate republishes only its report, so without dataset-redact
  # here this job sees no dataset and trips the broken-chain guard.
  needs: ["eval-dataset-validate", "dataset-redact"]
  allow_failure: true   # skips gracefully when no dataset is present
  # aud "sigstore" is required by Fulcio for keyless signing (same as model-sign).
  id_tokens:
    SIGSTORE_ID_TOKEN:
      aud: "sigstore"
  script:
    - mkdir -p "${EVIDENCE_DIR}/dataset-input"
    - |
      DATASET_FILE=$(find "${EVIDENCE_DIR}/dataset-input" -maxdepth 1 -type f \
        ! -name "dataset.sig" ! -name "dataset.pem" 2>/dev/null | head -1 || true)
      if [ -z "${DATASET_FILE}" ]; then
        if [ "${DATASETS_DISABLED}" = "true" ]; then
          echo "Dataset chain disabled (DATASETS_DISABLED=true) — dataset signing skipped"
          exit 0
        fi
        echo "ERROR: no dataset to sign but the chain is enabled — broken chain, not an intended skip"
        exit 1
      fi
      echo "Signing dataset: ${DATASET_FILE}"
    # python:3.11-slim ships no curl — install it (+ CA certs) before fetching cosign.
    - apt-get update -qq && apt-get install -y -qq --no-install-recommends curl ca-certificates
    - |
      # Install cosign (Go binary, not on PyPI) — checksum-verified, as elsewhere.
      curl -sSfL \
        "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64" \
        -o /tmp/cosign-linux-amd64
      curl -sSfL \
        "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign_checksums.txt" \
        -o /tmp/cosign_checksums.txt
      grep -E "^[0-9a-f]{64}  cosign-linux-amd64$" /tmp/cosign_checksums.txt \
        | (cd /tmp && sha256sum --check --strict)
      install -m 0755 /tmp/cosign-linux-amd64 /usr/local/bin/cosign
    - |
      DATASET_FILE=$(find "${EVIDENCE_DIR}/dataset-input" -maxdepth 1 -type f \
        ! -name "dataset.sig" ! -name "dataset.pem" | head -1 || true)
      if [ -n "${SIGSTORE_ID_TOKEN}" ]; then
        # SIGSTORE_ID_TOKEN is set by id_tokens above; cosign reads it automatically
        cosign sign-blob --yes \
          --output-signature "${EVIDENCE_DIR}/dataset-input/dataset.sig" \
          --output-certificate "${EVIDENCE_DIR}/dataset-input/dataset.pem" \
          "${DATASET_FILE}"
        echo "Dataset signed via Sigstore keyless"
      else
        echo "SIGSTORE_ID_TOKEN not available — dataset unsigned (id_tokens requires GitLab 15.7+)"
      fi
  artifacts:
    paths:
      - "${EVIDENCE_DIR}/dataset-input/"
    expire_in: 90 days

artifact-signing-gate:
  stage: model-integrity
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[sigstore-discovery\]/'
      when: never
    - when: on_success
  needs: ["signature-verification", "tamper-verification", "modelscan", "modelaudit-scan", "modelfile-audit", "clamav-scan", "hf-artifact-scan", "dataset-scan", "eval-dataset-validate"]
  # Enforcing chokepoint: no eval job runs unless model integrity passed. The
  # tamper job now hard-gates on its own (allow_failure:false), so a real tamper
  # already blocks upstream; this gate is the defence-in-depth backstop — on a
  # missing integrity.env (tamper job never wrote it) it still fails closed.
  # (Do NOT set allow_failure:true — that would make the gate a no-op.)
  allow_failure: false
  before_script: []          # stdlib only; skip the venv bootstrap
  script:
    - |
      if [ ! -f "${EVIDENCE_DIR}/integrity.env" ]; then
        echo "GATE FAILED: integrity evidence missing — tamper-verification did not pass"
        exit 1
      fi
      source "${EVIDENCE_DIR}/integrity.env"
      if [ "${tamper_check_passed}" != "true" ]; then
        echo "GATE FAILED: integrity check did not pass"
        exit 1
      fi
      python3 - <<'PYEOF'
      import json, os, sys

      path = os.path.join(os.environ["REPORTS_DIR"], "modelscan.json")
      if not os.path.exists(path):
          print("GATE FAILED: modelscan report missing")
          sys.exit(1)

      data = json.load(open(path))
      summary = data.get("summary", {}) or {}
      total = summary.get("total_issues_by_severity", {}) or {}
      critical = int(total.get("CRITICAL", 0))
      if critical > 0:
          print(f"GATE FAILED: modelscan reported {critical} CRITICAL issue(s)")
          sys.exit(1)
      scanned = int((summary.get("scanned", {}) or {}).get("total_scanned", 0))
      if scanned == 0:
          print("ModelScan gate check PASSED: no supported artifacts scanned")
      print("ModelScan gate check PASSED")
      path = os.path.join(os.environ["REPORTS_DIR"], "modelaudit-summary.json")
      if not os.path.exists(path):
          print("GATE FAILED: ModelAudit summary missing")
          sys.exit(1)

      audit = json.load(open(path))
      if audit.get("failed"):
          print("GATE FAILED: ModelAudit had an operational scan failure")
          sys.exit(1)
      critical = int(audit.get("critical", 0))
      if critical > 0:
          print(f"GATE FAILED: ModelAudit reported {critical} CRITICAL issue(s)")
          sys.exit(1)
      print("ModelAudit gate check PASSED")
      PYEOF
      echo "Artifact signing gate PASSED — proceeding to evaluation"

# ─── AI EVALUATION ───────────────────────────────────────────────────────────

# Fix #23: audits the AI/watermark stack (torch/transformers/markllm) up in the
# sast stage alongside pip-audit and lockfile-audit — depends only on setup, so it
# runs BEFORE markllm-watermark-eval (#35) actually installs those multi-GB deps,
# rather than after artifact-signing-gate in ai-eval. Gating stays deferred
# (allow_failure:true) for now.
markllm-deps-audit:
  stage: sast
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[sigstore-discovery\]/'
      when: never
    - when: on_success
  image: python:3.10-slim
  needs: ["setup"]
  allow_failure: true
  script:
    - pip install --quiet --upgrade pip pip-audit
    - mkdir -p "${REPORTS_DIR}"
    - |
      pip-audit \
        --requirement <(printf 'torch==%s\ntransformers==%s\nmarkllm==%s\n' "${TORCH_VERSION}" "${TRANSFORMERS_VERSION}" "${MARKLLM_VERSION}") \
        --format json \
        --output "${REPORTS_DIR}/markllm-deps-audit.json" \
        --progress-spinner off || true
    - |
      python3 - <<'PYEOF'
      import json, os
      data = json.load(open(os.environ["REPORTS_DIR"] + "/markllm-deps-audit.json"))
      deps  = data.get("dependencies", [])
      total = sum(len(d.get("vulns", [])) for d in deps)
      pkgs  = sum(1 for d in deps if d.get("vulns"))
      print(f"markllm-deps-audit: {total} vulnerability/ies across {pkgs} package(s)")
      for d in deps:
        for v in d.get("vulns", []):
          print(f"  {d['name']} — {v['id']}: fix_versions={v.get('fix_versions')}")
      PYEOF
  artifacts:
    paths:
      - "${REPORTS_DIR}/markllm-deps-audit.json"
    expire_in: 7 days

markllm-watermark-eval:
  stage: ai-eval
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[sigstore-discovery\]/'
      when: never
    - when: on_success
  image: python:3.10-slim
  needs: ["artifact-signing-gate", "model-manifest"]
  # Medium runner for disk headroom: this job downloads a ~3 GB transformers MODEL at
  # runtime (Qwen2.5-1.5B-Instruct) — that model pull, not the torch install, is what
  # needs the room. Torch itself is now the CPU-only wheel (see below), so the install
  # footprint is small; the medium runner is justified by the model download alone.
  tags: ["saas-linux-medium-amd64"]
  # cache:{} — keep this job's deps + model out of the shared pip cache so they can't
  # bloat other jobs' runner disk. It re-downloads its own deps.
  cache: {}
  # Advisory: the live eval pulls a multi-GB transformers model and evaluates a model
  # that is NOT the signed integrity-path artifact, so a load/runtime failure records
  # evidence (markllm-results.json) without blocking the security pipeline. (Its result
  # is an ADVISORY input to evidence-summary — see write_ci_evidence_summary.py.)
  allow_failure: true
  script:
    - pip install --quiet --upgrade pip setuptools wheel
    # Install torch from the CPU-only wheel index: the default PyPI build pulls the
    # ~2 GB CUDA stack (nvidia-* wheels) onto CPU-only CI runners — gratuitous disk that
    # was the root [Errno 28] cause. The +cpu wheel (~200 MB, no nvidia deps) matches the
    # hash-pinned requirements-ci-markllm.txt lock. torch must land first so the markllm/
    # transformers install below sees it already satisfied and won't re-fetch CUDA torch.
    - pip install --quiet "torch==${TORCH_VERSION}+cpu" --index-url https://download.pytorch.org/whl/cpu
    - pip install --quiet "markllm==${MARKLLM_VERSION}" "transformers==${TRANSFORMERS_VERSION}"
    - mkdir -p "${REPORTS_DIR}"
    - |
      # Resolve the model id dynamically from the model download. If
      # MARKLLM_MODEL_ID is set, it wins (explicit override). Otherwise derive
      # it from MODEL_FIXTURE_URL: pull "<org>/<repo>" out of the Hugging Face
      # URL and drop a trailing -GGUF/-GGML suffix so the integrity-path GGUF
      # fixture maps to the transformers repo MarkLLM actually loads.
      MODEL_ID="${MARKLLM_MODEL_ID}"
      if [ -z "${MODEL_ID}" ] && [ -n "${MODEL_FIXTURE_URL}" ]; then
        repo="$(printf '%s\n' "${MODEL_FIXTURE_URL}" \
          | sed -n 's#^https*://huggingface.co/\([^/][^/]*/[^/][^/]*\).*#\1#p')"
        case "${repo}" in
          *-GGUF|*-gguf|*-GGML|*-ggml) repo="${repo%-*}" ;;
        esac
        MODEL_ID="${repo}"
      fi
      test -n "${MODEL_ID}" || {
        echo "MARKLLM_MODEL_ID is empty and could not be derived from MODEL_FIXTURE_URL"
        echo "Set MARKLLM_MODEL_ID to a Hugging Face transformers repo id explicitly."
        exit 1
      }
      echo "MarkLLM model id (resolved): ${MODEL_ID}"
      export MARKLLM_MODEL_ID="${MODEL_ID}"
      python "${GAIPS_MATERIALS_DIR}/scripts/run_markllm_watermark_eval.py" \
        --output "${REPORTS_DIR}/markllm-results.json"
  artifacts:
    when: always
    paths:
      - "${REPORTS_DIR}/markllm-results.json"
    expire_in: 7 days

# NOTE: `model-drift-detection` was RELOCATED to the live-scans pipeline (Fix #24a).
# It compares this run's eval METRICS to evals/eval-baseline.json, but its six
# inputs (inspect-ai, garak, pyrit, giskard, guardrail-regression, promptfoo) are
# produced only by the live-scan jobs — in the static pipeline they never exist,
# so the unit (and the drift-gate that consumed it) was dead-by-construction. It
# now lives in ci/live-scans.gitlab-ci.yml alongside those inputs. The remaining
# drift control HERE is data/INPUT drift via evidently-drift (#38), bootstrapped
# by data-drift-baseline-commit below.

# Fix #24b — data-drift baseline bootstrap. Auto-commit the seeded DATA-drift
# reference (evals/dataset-reference.jsonl) on the FIRST run, so evidently-drift
# (#38) leaves seed-mode and starts gating without a manual commit. This replaces
# the former eval-baseline auto-commit, which seeded the WRONG control: the
# eval-metric baseline and its drift unit moved to the live-scans pipeline (Fix
# #24a), leaving the dataset reference as the real drift control the static
# pipeline was starving. The reference is SANITIZED before commit — never a raw
# cp — because the raw evidently seed can carry NaN-filled columns from
# heterogeneous records. Default branch only; never overwrites an existing
# reference; skips cleanly with no push token. Requires GITLAB_PUSH_TOKEN
# (Project Access Token, scope write_repository) as a masked CI/CD variable.
# Activation spans TWO default-branch runs: this job seeds+commits the reference
# with [skip ci] (no pipeline triggered), so evidently-drift first *compares* on
# the NEXT default-branch pipeline — not the run that does the commit.
data-drift-baseline-commit:
  stage: guardrail
  needs: ["evidently-drift"]
  allow_failure: true   # a failed auto-commit must never break the build
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[sigstore-discovery\]/'
      when: never
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  before_script:
    - apt-get update -qq && apt-get install -y -qq git
  script:
    - |
      SEED="${REPORTS_DIR}/dataset-reference.seed.jsonl"
      DEST="${GAIPS_MATERIALS_DIR}/evals/dataset-reference.jsonl"
      if [ ! -f "${SEED}" ]; then
        echo "No dataset reference seeded this run — nothing to commit"; exit 0
      fi
      if [ -f "${DEST}" ]; then
        echo "Reference already present at ${DEST} — not overwriting"; exit 0
      fi
      if [ -z "${GITLAB_PUSH_TOKEN}" ]; then
        echo "GITLAB_PUSH_TOKEN not set — auto-commit disabled."
        echo "Sanitize + commit ${SEED} → ${DEST} manually to activate data-drift detection."
        exit 0
      fi
      # Sanitize, don't raw-cp: drop null / non-finite values per record and
      # re-emit strict JSONL, so a malformed seed can never become the committed
      # reference. Aborts the commit if the seed yields zero valid records.
      mkdir -p "$(dirname "${DEST}")"
      python3 - "${SEED}" "${DEST}" <<'PYEOF'
      import json, math, sys
      src, dst = sys.argv[1], sys.argv[2]
      out = []
      with open(src, encoding="utf-8") as fh:
          for line in fh:
              line = line.strip()
              if not line:
                  continue
              rec = json.loads(line)
              clean = {
                  k: v for k, v in rec.items()
                  if v is not None and not (isinstance(v, float) and not math.isfinite(v))
              }
              if clean:
                  out.append(clean)
      if not out:
          sys.exit("Seed produced zero valid records — refusing to commit an empty reference")
      with open(dst, "w", encoding="utf-8") as fh:
          fh.write("\n".join(json.dumps(r, sort_keys=True) for r in out) + "\n")
      print(f"Sanitized {len(out)} record(s) → {dst}")
      PYEOF
      git config user.email "gaips-ci@${CI_SERVER_HOST}"
      git config user.name "GAIPS CI"
      git add "${DEST}"
      git commit -m "ci: seed data-drift reference [skip ci]"
      # ci.skip + [skip ci] both prevent this push from triggering a new pipeline.
      git push -o ci.skip \
        "https://oauth2:${GITLAB_PUSH_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" \
        "HEAD:${CI_DEFAULT_BRANCH}"
      # This push uses -o ci.skip + the [skip ci] commit message, so it does NOT
      # trigger a pipeline. Activation therefore takes TWO default-branch runs:
      # THIS run seeds + commits the reference; the NEXT default-branch pipeline is
      # the first where evidently-drift finds the reference and actually compares.
      echo "Committed dataset-reference.jsonl → ${CI_DEFAULT_BRANCH}."
      echo "data-drift detection activates on the NEXT default-branch pipeline (this commit is [skip ci])."

# Data/feature drift on the INPUT side — complements model-drift-detection (which
# watches eval METRICS). Evidently's DataDriftPreset (PSI) compares a committed
# reference snapshot of the dataset (evals/dataset-reference.jsonl) to the current
# one; TextEvals adds LLM-relevant text descriptors over the prompt columns. On
# first run it seeds the reference for the maintainer to commit.
evidently-drift:
  stage: guardrail
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[sigstore-discovery\]/'
      when: never
    - when: on_success
  needs: ["dataset-redact", "eval-dataset-validate"]
  allow_failure: true   # soft gate — flip to false once a reference is committed + tuned
  script:
    # Pinned for reproducibility (was unpinned, floated to bleeding-edge majors).
    # These are the versions the env last resolved; the script's API (Dataset/
    # DataDefinition/Report, DataDriftPreset(method="psi")/TextEvals) matches this
    # evidently line. NOTE: the compare path only runs once a reference is committed,
    # so evidently↔pandas compat is first exercised on the first comparing run.
    - pip install "evidently==0.7.21" "pandas==3.0.3"
    - mkdir -p "${REPORTS_DIR}" "${EVIDENCE_DIR}/evidently"
    - |
      DATASET_FILE=$(find "${EVIDENCE_DIR}/dataset-input" -maxdepth 1 -type f \
        ! -name "dataset.sig" ! -name "dataset.pem" 2>/dev/null | head -1 || true)
      if [ -z "${DATASET_FILE}" ]; then
        echo "No dataset present — Evidently data-drift skipped (evals run on fixtures)"
        echo '{"skipped":true,"reason":"no dataset present"}' > "${REPORTS_DIR}/evidently-drift.json"
        exit 0
      fi
      python3 "${GAIPS_MATERIALS_DIR}/scripts/run_evidently_report.py" \
        --current "${DATASET_FILE}" \
        --reference "${GAIPS_MATERIALS_DIR}/evals/dataset-reference.jsonl" \
        --report "${REPORTS_DIR}/evidently-drift.json" \
        --html "${EVIDENCE_DIR}/evidently/drift-report.html" \
        --seed-out "${REPORTS_DIR}/dataset-reference.seed.jsonl"
    - |
      if [ -f "${REPORTS_DIR}/dataset-reference.seed.jsonl" ]; then
        echo "Reference seeded — commit ${REPORTS_DIR}/dataset-reference.seed.jsonl to evals/dataset-reference.jsonl"
      fi
  artifacts:
    paths:
      - "${REPORTS_DIR}/evidently-drift.json"
      - "${REPORTS_DIR}/dataset-reference.seed.jsonl"
      - "${EVIDENCE_DIR}/evidently/"
    expire_in: 30 days

# ─── EVIDENCE ────────────────────────────────────────────────────────────────

evidence-summary:
  stage: evidence
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[sigstore-discovery\]/'
      when: never
    - when: on_success
  needs:
    - semgrep-sast
    - secret-detection
    - gitleaks-scan
    - pip-audit
    - pkg-integrity
    - conda-pkg-verify
    - syft-cyclonedx
    - syft-spdx
    - grype-scan
    - trivy-scan
    - modelscan
    - modelaudit-scan
    - modelfile-audit
    - clamav-scan
    - hf-artifact-scan
    - model-digest
    - dataset-download
    - dataset-scan
    - dataset-redact
    - eval-dataset-validate
    - great-expectations-validate
    - ydata-profile
    - dvc-verify
    - evidently-drift
    - tamper-verification
    - markllm-watermark-eval
  script:
    - pip install jinja2
    - mkdir -p "${EVIDENCE_DIR}"
    - |
      python "${GAIPS_MATERIALS_DIR}/scripts/write_ci_evidence_summary.py" \
        --reports "${REPORTS_DIR}" \
        --out "${EVIDENCE_DIR}/evidence-summary.md"
    - cat "${EVIDENCE_DIR}/evidence-summary.md"
    - |
      # If this run seeded a drift reference (none committed yet), bundle it with
      # the end-of-pipeline evidence so the maintainer can grab it from one place
      # and commit it to evals/dataset-reference.jsonl to activate drift detection.
      # (evidently-drift writes dataset-reference.seed.jsonl; the old
      # eval-baseline.seed.json seed is no longer produced by this pipeline.)
      if [ -f "${REPORTS_DIR}/dataset-reference.seed.jsonl" ]; then
        cp -f "${REPORTS_DIR}/dataset-reference.seed.jsonl" "${EVIDENCE_DIR}/dataset-reference.seed.jsonl"
        echo "Seeded drift reference bundled at ${EVIDENCE_DIR}/dataset-reference.seed.jsonl — commit it to evals/dataset-reference.jsonl to activate drift detection."
      fi
    - |
      # Capture the approved model baseline (committed + reviewed) with the
      # end-of-pipeline evidence so the final report records the exact model
      # identity and variable manifest this run was pinned to.
      cp -f "${GAIPS_MATERIALS_DIR}/evals/model-baseline.json" "${EVIDENCE_DIR}/model-baseline.json"
  artifacts:
    paths:
      - "${EVIDENCE_DIR}/evidence-summary.md"
      - "${EVIDENCE_DIR}/dataset-reference.seed.jsonl"
      - "${EVIDENCE_DIR}/model-baseline.json"
    expire_in: 90 days

# Builds a comprehensive RUN-EVIDENCE manifest — rich pipeline metadata, the
# approved-vs-recorded model identity, and a sha256 hash-manifest of EVERY report,
# SBOM, and evidence artifact produced across the whole run — then keyless-signs it
# with cosign and self-verifies the result. Signing this one manifest therefore
# binds the integrity of the entire run's evidence set in a single transparency-
# logged signature. (Renamed from `model-signing-evidence`: the model itself is
# signed by `model-sign`; this job signs evidence ABOUT the run.)
sign-evidence:
  # Terminal `attest` stage (last in the pipeline) so the hash-manifest below
  # captures EVERY artifact, including the signed AI-BOM and deploy-prep outputs.
  stage: attest
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[sigstore-discovery\]/'
      when: never
    - when: on_success
  # Depend on EVERY artifact-producing job so this job receives every report/SBOM/
  # evidence artifact in the run and can hash them all into one signed manifest.
  # This is a SUPERSET of evidence-summary's collection set: it additionally pulls
  # the artifact-producing jobs evidence-summary omits — setup, lockfile-audit,
  # model-fixture-download, dataset-sign, markllm-deps-audit — so the whole-run
  # attestation actually covers their reports/ and evidence/ files rather than
  # silently dropping them (GitLab only downloads artifacts from jobs in needs:).
  needs:
    - setup
    - semgrep-sast
    - secret-detection
    - gitleaks-scan
    - pip-audit
    - lockfile-audit
    - pkg-integrity
    - conda-pkg-verify
    - syft-cyclonedx
    - syft-spdx
    - grype-scan
    - trivy-scan
    - model-fixture-download
    - modelscan
    - modelaudit-scan
    - modelfile-audit
    - clamav-scan
    - hf-artifact-scan
    - model-digest
    - dataset-download
    - dataset-scan
    - dataset-redact
    - dataset-sign
    - eval-dataset-validate
    - great-expectations-validate
    - ydata-profile
    - dvc-verify
    - evidently-drift
    - tamper-verification
    - markllm-deps-audit
    - markllm-watermark-eval
    - artifact-signing-gate
    - signature-verification   # Fix #32a: pull the #19 verdict so the bundle records verified, not just notarized
    - evidence-summary
    # ai-bom stage — captures the signed AI-BOM (the keystone an auditor reads)
    - ai-bom-assemble
    - ai-bom-validate
    - ai-bom-sign
    - dependency-track-upload
    # deploy-prep stage — captures the publish manifest, image-sign, metrics, pages
    - image-sign
    - publish-signed-artifacts
    - metrics-normalize
    - pages
  # SIGSTORE_ID_TOKEN is the standard env var cosign reads for keyless signing.
  # aud must be "sigstore" — Fulcio validates this claim. This is a GitLab-native
  # id_token (works on any ref), independent of the protected MODEL_SIGNING_IDENTITY.
  id_tokens:
    SIGSTORE_ID_TOKEN:
      aud: "sigstore"
  # cosign does all signing; no pip packages are needed (stdlib-only manifest build).
  before_script: []
  cache: {}
  script:
    - apt-get update -qq && apt-get install -y -qq curl ca-certificates
    - mkdir -p "${EVIDENCE_DIR}"
    - |
      # Build the run-evidence manifest (stdlib only).
      python3 - <<'PYEOF'
      import json, os, hashlib, datetime
      from pathlib import Path

      def env(k):
          v = os.environ.get(k, "")
          return v if v != "" else None

      def sha256_file(p):
          h = hashlib.sha256()
          with open(p, "rb") as f:
              for chunk in iter(lambda: f.read(1024 * 1024), b""):
                  h.update(chunk)
          return h.hexdigest()

      project_dir  = os.environ["CI_PROJECT_DIR"]
      reports_dir  = Path(os.environ["REPORTS_DIR"])
      sbom_dir     = Path(os.environ["SBOM_DIR"])
      evidence_dir = Path(os.environ["EVIDENCE_DIR"])
      out          = evidence_dir / "sign-evidence.json"
      own_files    = {"sign-evidence.json", "sign-evidence.sig", "sign-evidence.pem"}

      # --- hash-manifest of every report / SBOM / evidence artifact in the run ---
      artifacts, seen = [], set()
      for base in (reports_dir, sbom_dir, evidence_dir):
          if not base.exists():
              continue
          for p in sorted(base.rglob("*")):
              if not p.is_file() or p.name in own_files:
                  continue
              rel = os.path.relpath(p, project_dir)
              if rel in seen:
                  continue
              seen.add(rel)
              artifacts.append({
                  "path": rel,
                  "sha256": sha256_file(p),
                  "size_bytes": p.stat().st_size,
              })

      # --- model identity: approved baseline vs the digest model-digest recorded ---
      model = {}
      baseline = evidence_dir / "model-baseline.json"
      if not baseline.exists():
          baseline = Path(os.environ["GAIPS_MATERIALS_DIR"]) / "evals" / "model-baseline.json"
      if baseline.exists():
          b = json.loads(baseline.read_text()).get("model", {})
          model.update(name=b.get("name"), path=b.get("path"),
                       approved_sha256=b.get("sha256"))

      recorded = []
      digests_txt = evidence_dir / "model-digests.txt"
      if digests_txt.exists():
          for line in digests_txt.read_text().splitlines():
              if "sha256:" in line:
                  fpath, _, dg = line.rpartition("sha256:")
                  fp = fpath.strip()
                  # Fix #40-F4 (defensive to the #17 root fix): never record an absolute
                  # /builds/… path; model-digest now writes repo-relative.
                  if os.path.isabs(fp):
                      fp = os.path.relpath(fp, project_dir)
                  recorded.append({"path": fp, "sha256": dg.strip()})
      model["recorded_digests"] = recorded
      model["digest_match"] = bool(
          model.get("approved_sha256")
          and any(r["sha256"] == model["approved_sha256"] for r in recorded)
      )

      # Fix #32a — record whether the recorded digest was actually VERIFIED against a
      # signature (signature-verification #19), not merely notarized. #19 writes a
      # deferred marker on unprotected refs; mark the bundle unverified + reason so it
      # is self-declaring rather than implying assurance it does not have.
      verified, vreason = "unknown", "signature-verification did not run"
      sigver = evidence_dir / "signature-verification.jsonl"
      if sigver.exists():
          recs = []
          for ln in sigver.read_text().splitlines():
              ln = ln.strip()
              if ln:
                  try:
                      recs.append(json.loads(ln))
                  except Exception:
                      pass
          if any(r.get("skipped") for r in recs):
              verified = "false"
              vreason = next((r.get("reason") for r in recs if r.get("skipped")), "deferred")
          elif any(r.get("subjects") and all(s.get("match") for s in r["subjects"]) for r in recs):
              verified, vreason = "true", None
          elif recs:
              verified, vreason = "false", "no signed subject matched the on-disk model"
      model["verified"] = verified
      if vreason:
          model["verified_reason"] = vreason

      bundle = {
          "schema_version": "2.0",
          "kind": "gaips-run-evidence",
          "generated_at": datetime.datetime.now(datetime.UTC).isoformat().replace("+00:00", "Z"),
          "pipeline": {
              "id":            env("CI_PIPELINE_ID"),
              "url":           env("CI_PIPELINE_URL"),
              "source":        env("CI_PIPELINE_SOURCE"),
              "created_at":    env("CI_PIPELINE_CREATED_AT"),
              "project_path":  env("CI_PROJECT_PATH"),
              "project_url":   env("CI_PROJECT_URL"),
              "commit_sha":    env("CI_COMMIT_SHA"),
              "commit_short":  env("CI_COMMIT_SHORT_SHA"),
              "commit_title":  env("CI_COMMIT_TITLE"),
              "ref":           env("CI_COMMIT_REF_NAME"),
              "ref_protected": env("CI_COMMIT_REF_PROTECTED"),
              "triggered_by":  env("GITLAB_USER_LOGIN"),
              "runner":        env("CI_RUNNER_DESCRIPTION"),
              "signing_job_id":  env("CI_JOB_ID"),
              "signing_job_url": env("CI_JOB_URL"),
          },
          "model": model,
          "artifact_count": len(artifacts),
          "artifacts": artifacts,
      }

      out.write_text(json.dumps(bundle, indent=2) + "\n")
      print(json.dumps(bundle, indent=2))
      print(f"\nHashed {len(artifacts)} artifact(s); model.digest_match={model.get('digest_match')}")
      PYEOF
    - |
      # Install cosign binary (not available via pip; each job gets a fresh container)
      COSIGN_VERSION="${COSIGN_VERSION}"
      curl -sSfL \
        "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64" \
        -o /tmp/cosign-linux-amd64
      curl -sSfL \
        "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign_checksums.txt" \
        -o /tmp/cosign_checksums.txt
      grep -E "^[0-9a-f]{64}  cosign-linux-amd64$" /tmp/cosign_checksums.txt \
        | (cd /tmp && sha256sum --check --strict)
      install -m 0755 /tmp/cosign-linux-amd64 /usr/local/bin/cosign
    - |
      BUNDLE="${EVIDENCE_DIR}/sign-evidence.json"
      if [ -n "${SIGSTORE_ID_TOKEN}" ]; then
        # SIGSTORE_ID_TOKEN is set by id_tokens above; cosign reads it automatically
        cosign sign-blob --yes \
          --output-signature "${EVIDENCE_DIR}/sign-evidence.sig" \
          --output-certificate "${EVIDENCE_DIR}/sign-evidence.pem" \
          "${BUNDLE}"
        echo "Run-evidence manifest signed via Sigstore keyless"
        # Self-verify the signature we just produced, so a broken signature fails
        # the job here rather than shipping an unverified artifact downstream.
        cosign verify-blob \
          --certificate "${EVIDENCE_DIR}/sign-evidence.pem" \
          --signature   "${EVIDENCE_DIR}/sign-evidence.sig" \
          --certificate-identity-regexp ".+" \
          --certificate-oidc-issuer-regexp "https://(gitlab|oauth2)\\..+" \
          "${BUNDLE}" \
          && echo "Self-verify OK: signature matches the manifest" \
          || { echo "ERROR: self-verify of the signed evidence failed"; exit 1; }
      else
        echo "SIGSTORE_ID_TOKEN not available — cannot sign the evidence bundle (id_tokens requires GitLab 15.7+)"
        if [ "${EVIDENCE_SIGNING_REQUIRED}" = "true" ]; then
          echo "ERROR: EVIDENCE_SIGNING_REQUIRED=true but no SIGSTORE_ID_TOKEN is available — refusing to ship an unsigned evidence seal"
          exit 1
        fi
        echo "EVIDENCE_SIGNING_REQUIRED is not 'true' — emitting the unsigned manifest and exiting 0 (teeth-last; set EVIDENCE_SIGNING_REQUIRED=true in production to make this a hard gate)"
      fi
  artifacts:
    paths:
      - "${EVIDENCE_DIR}/sign-evidence.json"
      - "${EVIDENCE_DIR}/sign-evidence.sig"
      - "${EVIDENCE_DIR}/sign-evidence.pem"
    expire_in: 90 days

# ─── AI BOM ──────────────────────────────────────────────────────────────────
# Consolidates every prior element — software components, ML models (digests +
# signatures + scan verdicts), datasets, and AI evaluation evidence — into one
# CycloneDX 1.6 AI BOM, then signs it keyless. This is the pipeline's final
# attestable inventory: the single document an auditor reads to see "all elements".

ai-bom-assemble:
  stage: ai-bom
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[sigstore-discovery\]/'
      when: never
    - when: on_success
  # Direct needs because GitLab only downloads artifacts from jobs named here
  # (artifact inheritance is not transitive through evidence-summary).
  needs:
    - setup
    - syft-cyclonedx
    - pip-audit
    # Vuln sources build_ai_bom.py parses into vulnerabilities[] (#29). GitLab only
    # downloads artifacts from jobs named here, so without these the lockfile/grype/
    # trivy parsing is dead and the BOM undercounts known risk.
    - lockfile-audit
    - grype-scan
    - trivy-scan
    - model-fixture-download
    - model-digest
    - model-sign
    - modelfile-audit
    - modelscan
    - modelaudit-scan
    - clamav-scan
    - hf-artifact-scan
    - dataset-download
    - dataset-scan
    - dataset-redact
    - eval-dataset-validate
    - great-expectations-validate
    - ydata-profile
    - dvc-verify
    - evidently-drift
    - dataset-sign
    - markllm-deps-audit
    - evidence-summary
  script:
    - mkdir -p "${SBOM_DIR}"
    - |
      # Stamp the BOM with a UTC build timestamp (CI provides CI_PIPELINE_CREATED_AT;
      # fall back to `date` so local runs still work). The model and dataset cosign
      # signatures (model.sig / dataset.sig) are embedded into their components here;
      # the BOM's OWN signature is applied downstream by ai-bom-sign (enveloped).
      TS="${CI_PIPELINE_CREATED_AT:-$(date -u +%Y-%m-%dT%H:%M:%SZ)}"
      python3 "${GAIPS_MATERIALS_DIR}/scripts/build_ai_bom.py" \
        --sbom     "${SBOM_DIR}" \
        --reports  "${REPORTS_DIR}" \
        --evidence "${EVIDENCE_DIR}" \
        --models   "${MODEL_DIR}" \
        --timestamp "${TS}" \
        --dataset-baseline "${GAIPS_MATERIALS_DIR}/evals/dataset-baseline.json" \
        --out      "${SBOM_DIR}/aibom.cyclonedx.json"
  artifacts:
    paths:
      - "${SBOM_DIR}/aibom.cyclonedx.json"
    expire_in: 90 days

ai-bom-validate:
  stage: ai-bom
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[sigstore-discovery\]/'
      when: never
    - when: on_success
  image:
    name: "${IMAGE_CYCLONEDX}"
    entrypoint: [""]
  before_script: []          # cyclonedx-cli image has no Python
  needs: ["ai-bom-assemble"]
  script:
    - |
      # Hard-validate the AI BOM against the CycloneDX 1.6 JSON schema.
      # Binary lives at /cyclonedx in the image; PATH may not include / once the
      # entrypoint is cleared, so call it by absolute path.
      /cyclonedx validate \
        --input-file "${SBOM_DIR}/aibom.cyclonedx.json" \
        --input-format json \
        --input-version v1_6 \
        --fail-on-errors
    - |
      # Emit an XML rendering — this is what ai-bom-sign signs (the CLI's
      # enveloped signature is an XML Digital Signature embedded in the BOM).
      /cyclonedx convert \
        --input-file "${SBOM_DIR}/aibom.cyclonedx.json" \
        --output-file "${SBOM_DIR}/aibom.cyclonedx.xml" \
        --output-format xml \
        --output-version v1_6
  artifacts:
    paths:
      - "${SBOM_DIR}/aibom.cyclonedx.xml"
    expire_in: 90 days

# Fix #31: ai-bom-validate proves the BOM is well-FORMED; this asserts it is
# SUBSTANTIVE — vulnerabilities[] populated when the audit found vulns (#29), every
# model signed + verified (#32). The validate image is the .NET cyclonedx-cli (no
# Python), so the content checks run here in python:3.11-slim instead. Advisory
# (allow_failure: true) per the Fix #0/#23 teeth-last posture; flip --enforce once
# the pipeline is otherwise green.
ai-bom-content-gate:
  stage: ai-bom
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[sigstore-discovery\]/'
      when: never
    - when: on_success
  # Must pull the IDENTICAL audit surface ai-bom-assemble emitted — the gate runs the
  # same build_ai_bom._vulnerabilities() over REPORTS_DIR, so any missing producer here
  # undercounts audit-reported vulns and checks a different surface than the BOM (#29).
  needs: ["ai-bom-assemble", "pip-audit", "lockfile-audit", "markllm-deps-audit", "grype-scan", "trivy-scan"]
  allow_failure: true
  before_script: []
  cache: {}
  script:
    - |
      python3 "${GAIPS_MATERIALS_DIR}/scripts/assert_ai_bom_content.py" \
        --bom "${SBOM_DIR}/aibom.cyclonedx.json" \
        --reports "${REPORTS_DIR}"

ai-bom-sign:
  stage: ai-bom
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[sigstore-discovery\]/'
      when: never
    - when: on_success
  # Fix #25: keyless Sigstore signing (Fulcio cert + Rekor transparency log), the
  # same identity-bound mechanism as model-sign / dataset-sign / sign-evidence —
  # NOT an ephemeral, identity-less RSA key that only verifies within one run.
  # Uses the default python:3.11-slim image (not the .NET cyclonedx-cli image): we
  # need curl + a shell to install cosign, not the CycloneDX CLI.
  needs: ["ai-bom-validate"]
  # Hardened to a gate (was allow_failure:true): an unsigned AI BOM must not be
  # delivered green. Skips cleanly only when there is genuinely no BOM to sign.
  allow_failure: false
  # id_tokens issues a per-job OIDC JWT; aud "sigstore" is required by Fulcio.
  id_tokens:
    SIGSTORE_ID_TOKEN:
      aud: "sigstore"
  script:
    - |
      XML="${SBOM_DIR}/aibom.cyclonedx.xml"
      if [ ! -f "${XML}" ]; then
        echo "No XML BOM present (ai-bom-validate skipped) — nothing to sign"
        exit 0
      fi
    # python:3.11-slim ships no curl — install it (+ CA certs) before fetching cosign.
    - apt-get update -qq && apt-get install -y -qq --no-install-recommends curl ca-certificates
    - |
      # Install cosign (Go binary, not on PyPI) — checksum-verified, as elsewhere.
      curl -sSfL \
        "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64" \
        -o /tmp/cosign-linux-amd64
      curl -sSfL \
        "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign_checksums.txt" \
        -o /tmp/cosign_checksums.txt
      grep -E "^[0-9a-f]{64}  cosign-linux-amd64$" /tmp/cosign_checksums.txt \
        | (cd /tmp && sha256sum --check --strict)
      install -m 0755 /tmp/cosign-linux-amd64 /usr/local/bin/cosign
    - |
      XML="${SBOM_DIR}/aibom.cyclonedx.xml"
      if [ -z "${SIGSTORE_ID_TOKEN}" ]; then
        # A BOM exists but we cannot keyless-sign it. Do NOT pass green with an
        # unsigned BOM — that is exactly what the old ephemeral-RSA fallback did.
        echo "ERROR: SIGSTORE_ID_TOKEN unavailable (id_tokens requires GitLab 15.7+) — cannot sign the AI BOM"
        exit 1
      fi
      # SIGSTORE_ID_TOKEN is read by cosign automatically. Detached keyless
      # signature + Fulcio certificate (recorded in Rekor), mirroring dataset-sign.
      cosign sign-blob --yes \
        --output-signature "${SBOM_DIR}/aibom.cyclonedx.sig" \
        --output-certificate "${SBOM_DIR}/aibom.cyclonedx.pem" \
        "${XML}"
      echo "AI BOM signed via Sigstore keyless (Fulcio + Rekor)"
  artifacts:
    paths:
      - "${SBOM_DIR}/aibom.cyclonedx.xml"     # the signed bytes
      - "${SBOM_DIR}/aibom.cyclonedx.sig"     # detached keyless signature
      - "${SBOM_DIR}/aibom.cyclonedx.pem"     # Fulcio cert for offline verify-blob
    expire_in: 90 days

# NOTE: `drift-gate` was REMOVED (Fix #24a). In the static pipeline it was vacuous
# theater — its only input, model-drift-detection, is dead-by-construction here
# (its six live-scan eval inputs moved to the live-scans pipeline), so the hard gate
# could only ever pass. The eval-metric drift unit + its gate belong in live-scans
# alongside the inputs. If DATA-drift enforcement is wanted here, add a small gate
# over evidently-drift (#38) once it has a committed reference baseline (Fix #24b).

# Ingest the signed BOMs into Dependency-Track for CONTINUOUS analysis — the SBOM
# and the AI BOM (nested under the app project) are re-scanned against new CVEs +
# policy conditions over time, turning the point-in-time grype/trivy scan into
# ongoing monitoring. Hard policy gate (fails on a blocking violationState), but
# skips cleanly when DT_API_URL/DT_API_KEY are unset — same pattern as dataset-scan.
# NOTE: DT's vuln matching targets software components; the AI BOM's model/data
# components ride along as inventory + POLICY targets (which DO gate), not CVE matches.
dependency-track-upload:
  stage: ai-bom
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[sigstore-discovery\]/'
      when: never
    - when: on_success
  needs: ["syft-cyclonedx", "ai-bom-assemble", "vault-secrets"]
  allow_failure: false   # hard gate on blocking policy violations (skips cleanly when DT unconfigured)
  variables:
    DT_PROJECT_NAME: "${CI_PROJECT_NAME}"
  script:
    - pip install requests
    - mkdir -p "${REPORTS_DIR}"
    - |
      python3 "${GAIPS_MATERIALS_DIR}/scripts/dependency_track_upload.py" \
        --bom "${SBOM_DIR}/sbom.cyclonedx.json" \
        --aibom "${SBOM_DIR}/aibom.cyclonedx.json" \
        --project-name "${DT_PROJECT_NAME}" \
        --project-version "${CI_COMMIT_REF_NAME}" \
        --aibom-name "${DT_PROJECT_NAME}-aibom" \
        --report "${REPORTS_DIR}/dependency-track.json" \
        --fail-on "${DT_FAIL_ON}"
  artifacts:
    paths:
      - "${REPORTS_DIR}/dependency-track.json"
    expire_in: 30 days

# ─── DEPLOY PREP ───────────────────────────────────────────────────────────────
# The two halves of the sign→verify-at-deploy loop are produced here:
#   • image-sign               → Cosign signature on the workload image (Kyverno verifies it at admission)
#   • publish-signed-artifacts → signed AI-BOM + dataset (+ model) pushed to a registry the Argo CD PreSync hook can fetch
# Both skip cleanly when their inputs aren't configured, so the pipeline keeps
# running unchanged until the image and an artifact store are wired in.

# Cosign KEYLESS signature on the already-built workload image. This is the IMAGE
# half of the loop: kyverno-verify-image-signatures.yaml admits a Pod only if its
# image carries a signature from this CI identity. Without this job, flipping that
# policy to Enforce would block every deploy — that mismatch is what this closes.
image-sign:
  stage: deploy-prep
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[sigstore-discovery\]/'
      when: never
    - when: on_success
  # drift-gate removed (was vacuous theater in the static pipeline — its only input,
  # model-drift-detection, is dead-by-construction here; see Fix #24a). Anchored instead
  # to the ai-bom stage's remaining hard gate so image signing still follows it.
  needs: ["dependency-track-upload"]
  # Fulcio requires an OIDC token with aud "sigstore" for keyless signing — same
  # mechanism model-sign / dataset-sign use. The resulting cert's identity is this
  # GitLab job's SAN, which matches the Kyverno policy's gitlab issuer/subject regex.
  id_tokens:
    SIGSTORE_ID_TOKEN:
      aud: "sigstore"
  allow_failure: true   # signing failure must not block BOM/evidence delivery; Kyverno is the deploy-time gate
  before_script: []     # cosign is a Go binary; no Python venv needed
  script:
    - |
      if [ -z "${IMAGE_REF}" ]; then
        echo "IMAGE_REF unset — image signing skipped (set it to the built+pushed workload image to enable)"
        exit 0
      fi
    - apt-get update -qq && apt-get install -y -qq curl ca-certificates >/dev/null
    - |
      # Install cosign — checksum-verified, identical to model-signing-install.
      curl -sSfL "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64" -o /tmp/cosign-linux-amd64
      curl -sSfL "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign_checksums.txt" -o /tmp/cosign_checksums.txt
      grep -E "^[0-9a-f]{64}  cosign-linux-amd64$" /tmp/cosign_checksums.txt | (cd /tmp && sha256sum --check --strict)
      install -m 0755 /tmp/cosign-linux-amd64 /usr/local/bin/cosign
      cosign version
    - |
      # Authenticate to the registry so cosign can PUSH the signature next to the
      # image. Falls back to the GitLab-provided registry creds when the explicit
      # IMAGE_REGISTRY_* vars are unset.
      REG_HOST="${IMAGE_REGISTRY_HOST:-${CI_REGISTRY:-}}"
      REG_USER="${IMAGE_REGISTRY_USER:-${CI_REGISTRY_USER:-}}"
      REG_PASS="${IMAGE_REGISTRY_PASSWORD:-${CI_REGISTRY_PASSWORD:-}}"
      if [ -n "${REG_HOST}" ] && [ -n "${REG_USER}" ] && [ -n "${REG_PASS}" ]; then
        echo "${REG_PASS}" | cosign login "${REG_HOST}" -u "${REG_USER}" --password-stdin
      else
        echo "No registry credentials provided — relying on ambient auth (may fail to push the signature)"
      fi
    - |
      # SIGSTORE_ID_TOKEN (from id_tokens) is read automatically by cosign for
      # keyless signing. --yes suppresses the interactive transparency-log consent.
      echo "Signing image: ${IMAGE_REF}"
      COSIGN_YES=true cosign sign --yes "${IMAGE_REF}"
    - |
      # Confirm a signature exists and is logged in Rekor. Strict identity matching
      # is Kyverno's job at admission; here we only assert "a signature from a
      # gitlab/sigstore issuer is present", so a regexp keeps this self-check robust
      # across GitLab.com vs self-managed instances.
      cosign verify \
        --certificate-identity-regexp ".+" \
        --certificate-oidc-issuer-regexp "https://(gitlab|oauth2)\\..+" \
        "${IMAGE_REF}" \
        && echo "Image signature verified (present + Rekor-logged)" \
        || echo "WARN: post-sign verify did not match — check the issuer regexp against your Fulcio cert"

# Publish the signed evidence the Argo CD PreSync hook fetches at deploy time.
# Uploads to the GitLab Generic Package Registry at
#   ${EVIDENCE_PACKAGE_NAME}/${EVIDENCE_PACKAGE_VERSION}/<file>
# which is exactly where the PreSync ConfigMap's ARTIFACT_BASE_URL must point.
# Normalises the dataset to a fixed filename (the cosign blob signature is over
# the bytes, not the name) so the hook's BLOB_ARTIFACTS list is stable, and emits
# an artifacts-manifest.txt recording precisely what was published.
publish-signed-artifacts:
  stage: deploy-prep
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[sigstore-discovery\]/'
      when: never
    - when: on_success
  needs: ["ai-bom-sign", "dataset-sign", "model-sign", "model-fixture-download"]
  allow_failure: true   # advisory: a publish hiccup must not fail the run; re-publishable from artifacts
  before_script: []
  script:
    - |
      if [ -z "${CI_API_V4_URL:-}" ] || [ -z "${CI_PROJECT_ID:-}" ]; then
        echo "Not running against a GitLab API (CI_API_V4_URL/CI_PROJECT_ID unset) — publish skipped"
        exit 0
      fi
      apt-get update -qq && apt-get install -y -qq curl ca-certificates >/dev/null || true
    - mkdir -p "${EVIDENCE_DIR}/publish"
    - |
      STAGE_DIR="${EVIDENCE_DIR}/publish"
      : > "${STAGE_DIR}/artifacts-manifest.txt"
      stage() {  # stage <src> <published-name>
        [ -f "$1" ] || { echo "  (absent, skipped) $1"; return 0; }
        cp "$1" "${STAGE_DIR}/$2"
        echo "$2" >> "${STAGE_DIR}/artifacts-manifest.txt"
        echo "  staged → $2"
      }
      # AI-BOM (cosign keyless blob signature, Fix #25) — the signed XML plus its
      # detached signature + Fulcio cert: the trio the PreSync hook verify-blobs.
      stage "${SBOM_DIR}/aibom.cyclonedx.xml" "aibom.cyclonedx.xml"
      stage "${SBOM_DIR}/aibom.cyclonedx.sig" "aibom.cyclonedx.sig"
      stage "${SBOM_DIR}/aibom.cyclonedx.pem" "aibom.cyclonedx.pem"
      # Dataset cosign blob signature — normalise to dataset.dat|dataset.sig|dataset.pem
      DATASET_FILE=$(find "${EVIDENCE_DIR}/dataset-input" -maxdepth 1 -type f \
        ! -name "dataset.sig" ! -name "dataset.pem" 2>/dev/null | head -1 || true)
      [ -n "${DATASET_FILE}" ] && stage "${DATASET_FILE}" "dataset.dat"
      stage "${EVIDENCE_DIR}/dataset-input/dataset.sig" "dataset.sig"
      stage "${EVIDENCE_DIR}/dataset-input/dataset.pem" "dataset.pem"
      # Model bundle (model_signing format) — staged only when the actual weights
      # AND their model.sig are both present in MODEL_DIR. Fix #26a: this job
      # `needs` model-fixture-download (which populates MODEL_DIR) and model-sign
      # (which writes **/model.sig), so on the default fixture path BOTH are
      # present and a real bundle is published — it is skipped only when no weights
      # were fetched (a bundle without weights would fail `model_signing verify` at
      # deploy). The PreSync hook verifies this with `model_signing verify`, NOT cosign.
      HAVE_WEIGHTS=0
      for ext in pkl pt safetensors gguf bin h5 onnx; do
        find "${MODEL_DIR}" -type f -name "*.${ext}" -print -quit 2>/dev/null | grep -q . && HAVE_WEIGHTS=1 && break
      done
      if [ "${HAVE_WEIGHTS}" -eq 1 ] && find "${MODEL_DIR}" -name "model.sig" -print -quit 2>/dev/null | grep -q .; then
        tar -C "${MODEL_DIR}" -cf "${STAGE_DIR}/model-bundle.tar" .
        echo "model-bundle.tar" >> "${STAGE_DIR}/artifacts-manifest.txt"
        echo "  staged → model-bundle.tar (model_signing bundle of ${MODEL_DIR})"
      else
        echo "  (no weights+sig in ${MODEL_DIR}, skipped) model-bundle.tar"
      fi
      echo "── will publish ──"; cat "${STAGE_DIR}/artifacts-manifest.txt"
    - |
      STAGE_DIR="${EVIDENCE_DIR}/publish"
      BASE="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${EVIDENCE_PACKAGE_NAME}/${EVIDENCE_PACKAGE_VERSION}"
      RESULT="${STAGE_DIR}/publish-result.json"
      if [ ! -s "${STAGE_DIR}/artifacts-manifest.txt" ]; then
        echo "Nothing signed to publish (no AI-BOM/dataset/model) — skipping upload"
        printf '{"status":"skipped","reason":"nothing to publish","uploaded":0,"failed":0}\n' > "${RESULT}"
        exit 0
      fi
      # Fix #26b — track per-file outcomes. A partial upload must NOT pass green:
      # the deploy gate would fetch some artifacts and 404 on others. Count
      # failures, record a publish-result signal, and exit non-zero if any failed.
      UPLOADED=0; FAILED=0
      while IFS= read -r f; do
        echo "PUT ${BASE}/${f}"
        if curl -sSf --retry 3 \
            --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
            --upload-file "${STAGE_DIR}/${f}" \
            "${BASE}/${f}"; then
          echo "  uploaded ${f}"; UPLOADED=$((UPLOADED + 1))
        else
          echo "  FAILED ${f}"; FAILED=$((FAILED + 1))
        fi
      done < "${STAGE_DIR}/artifacts-manifest.txt"
      STATUS="ok"; [ "${FAILED}" -gt 0 ] && STATUS="partial"
      printf '{"status":"%s","base_url":"%s","uploaded":%s,"failed":%s}\n' \
        "${STATUS}" "${BASE}" "${UPLOADED}" "${FAILED}" > "${RESULT}"
      # Fix #26c — the package version is branch-scoped (EVIDENCE_PACKAGE_VERSION
      # defaults to the ref slug). The PreSync ConfigMap ARTIFACT_BASE_URL must
      # track the DEPLOYED ref: on the default branch this BASE is canonical; on a
      # feature branch it is only a preview. Repoint ARTIFACT_BASE_URL at the
      # default branch's package once merged, or the deploy verifies stale bytes.
      if [ "${CI_COMMIT_BRANCH:-}" = "${CI_DEFAULT_BRANCH:-}" ]; then
        echo "→ Canonical (default-branch) publish. Point the PreSync ConfigMap ARTIFACT_BASE_URL at: ${BASE}"
      else
        echo "→ Branch-scoped PREVIEW publish (${CI_COMMIT_REF_SLUG}). Do NOT repoint the deploy here;"
        echo "  after merge, ARTIFACT_BASE_URL should track the '${CI_DEFAULT_BRANCH}' package version."
      fi
      if [ "${FAILED}" -gt 0 ]; then
        echo "ERROR: ${FAILED} artifact(s) failed to upload — partial publish, refusing to report success"
        exit 1
      fi
      echo "Published ${UPLOADED} signed artifact(s) to ${BASE}"
  artifacts:
    when: always   # persist the publish-result signal even on a partial-upload failure
    paths:
      - "${EVIDENCE_DIR}/publish/artifacts-manifest.txt"
      - "${EVIDENCE_DIR}/publish/publish-result.json"
    expire_in: 90 days

# ─── METRICS DASHBOARD ───────────────────────────────────────────────────────
# evidence-summary records WHICH artifacts were produced; these two jobs record
# what they SAY and render it. metrics-normalize reads every report/, evidence/,
# and sbom/ file (plus the GitLab pipeline/job API) into one normalised JSON; the
# `pages` job turns that JSON into a self-contained static dashboard on GitLab
# Pages. Both run last and never gate — a dashboard must survive partial input.

# Collect every signal into one normalised document. No `needs:` on purpose: as a
# deploy-prep (final-stage) job it downloads artifacts from ALL earlier-stage jobs
# by default, so reports/, evidence/, and sbom/ arrive without a brittle 34-job
# list. The normaliser skips any input that is absent or malformed.
metrics-normalize:
  stage: deploy-prep
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[sigstore-discovery\]/'
      when: never
    - when: on_success
  allow_failure: true   # reporting only — never fail the pipeline on the dashboard
  before_script: []
  script:
    - pip install requests   # only the GitLab-API block needs it; skips cleanly if absent
    - mkdir -p "${REPORTS_DIR}"
    - |
      # GITLAB_API_TOKEN (a project/group access token with read_api) enables the
      # operational block (pipeline/job duration, queue time, status by stage).
      # Unset → that block skips cleanly; the report-derived metrics still render.
      python3 "${GAIPS_MATERIALS_DIR}/scripts/write_operational_metrics.py" \
        --reports "${REPORTS_DIR}" \
        --evidence "${EVIDENCE_DIR}" \
        --sbom "${SBOM_DIR}" \
        --out "${REPORTS_DIR}/operational-metrics.json" \
        --gitlab-token-env "GITLAB_API_TOKEN"
    - cat "${REPORTS_DIR}/operational-metrics.json"
  artifacts:
    paths:
      - "${REPORTS_DIR}/operational-metrics.json"
    expire_in: 90 days

# GitLab Pages: render the normalised JSON into public/index.html. The job MUST be
# named `pages` and publish the `public/` directory for Pages to serve it.
pages:
  stage: deploy-prep
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[sigstore-discovery\]/'
      when: never
    - when: on_success
  needs:
    - job: metrics-normalize
      artifacts: true
  allow_failure: true
  before_script: []
  script:
    - |
      python3 "${GAIPS_MATERIALS_DIR}/scripts/render_metrics_dashboard.py" \
        --metrics "${REPORTS_DIR}/operational-metrics.json" \
        --out-dir public
  artifacts:
    paths:
      - public
    expire_in: 90 days
