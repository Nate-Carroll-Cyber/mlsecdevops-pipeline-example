AWSTemplateFormatVersion: "2010-09-09"
# STALE — Phase 4 architecture mismatch. The analyst console is now server-
# rendered by the gateway (services/gateway/, see Technical/ARCHITECTURE.md).
# This template provisions a static SPA bucket that the analyst console no
# longer needs. Open decision (per infra/cloudformation/dev/README.md):
# delete this stack OR repurpose for the standalone CTF frontend once
# ctf-frontend/ has a production Vite build. Do NOT deploy as-is.
Description: |
  Counter-Spy.ai dev static frontend on private S3 and CloudFront.
  STALE post-Phase-4 — see README.md for the open architectural decision.

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev]
  NetworkStackName:
    Type: String
    Default: counter-spy-network-dev
  DomainName:
    Type: String
    Default: cyber-spy.ai
  AppSubdomain:
    Type: String
    Default: app
  CloudFrontWebAclArn:
    Type: String
    Default: ""

Conditions:
  HasCloudFrontWebAcl: !Not [!Equals [!Ref CloudFrontWebAclArn, ""]]

Resources:
  FrontendBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub "counter-spy-frontend-${Environment}-${AWS::AccountId}-${AWS::Region}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      VersioningConfiguration:
        Status: Enabled

  FrontendOac:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "counter-spy-frontend-oac-${Environment}"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  SpaRewriteFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: !Sub "counter-spy-spa-rewrite-${Environment}"
      AutoPublish: true
      FunctionConfig:
        Comment: Rewrite extensionless SPA routes to index.html
        Runtime: cloudfront-js-2.0
      FunctionCode: |
        function handler(event) {
          var request = event.request;
          if (!request.uri.includes('.')) {
            request.uri = '/index.html';
          }
          return request;
        }

  ResponseHeadersPolicy:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    Properties:
      ResponseHeadersPolicyConfig:
        Name: !Sub "counter-spy-frontend-security-${Environment}"
        SecurityHeadersConfig:
          ContentTypeOptions:
            Override: true
          FrameOptions:
            FrameOption: DENY
            Override: true
          ReferrerPolicy:
            ReferrerPolicy: strict-origin-when-cross-origin
            Override: true
          StrictTransportSecurity:
            AccessControlMaxAgeSec: 31536000
            IncludeSubdomains: true
            Preload: false
            Override: true

  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        WebACLId: !If [HasCloudFrontWebAcl, !Ref CloudFrontWebAclArn, !Ref AWS::NoValue]
        Aliases:
          - !Sub "${AppSubdomain}.${DomainName}"
        ViewerCertificate:
          AcmCertificateArn:
            Fn::ImportValue: !Sub "${NetworkStackName}-AppCertificateArn"
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        DefaultRootObject: index.html
        Origins:
          - Id: FrontendS3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt FrontendOac.Id
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          TargetOriginId: FrontendS3Origin
          ViewerProtocolPolicy: redirect-to-https
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          ResponseHeadersPolicyId: !Ref ResponseHeadersPolicy
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt SpaRewriteFunction.FunctionMetadata.FunctionARN
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: DenyNonTLS
            Effect: Deny
            Principal: "*"
            Action: s3:*
            Resource:
              - !GetAtt FrontendBucket.Arn
              - !Sub "${FrontendBucket.Arn}/*"
            Condition:
              Bool:
                aws:SecureTransport: false
          - Sid: AllowCloudFrontReadOnlyViaOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/${Distribution}"

  AppDnsRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId:
        Fn::ImportValue: !Sub "${NetworkStackName}-HostedZoneId"
      Name: !Sub "${AppSubdomain}.${DomainName}"
      Type: A
      AliasTarget:
        DNSName: !GetAtt Distribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

Outputs:
  FrontendBucketName:
    Value: !Ref FrontendBucket
    Export:
      Name: !Sub "${AWS::StackName}-FrontendBucketName"
  FrontendDistributionId:
    Value: !Ref Distribution
    Export:
      Name: !Sub "${AWS::StackName}-FrontendDistributionId"
  FrontendUrl:
    Value: !Sub "https://${AppSubdomain}.${DomainName}"
