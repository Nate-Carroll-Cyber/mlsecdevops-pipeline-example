apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: weaviate
  labels:
    app: weaviate
spec:
  serviceName: weaviate
  replicas: 1
  selector:
    matchLabels:
      app: weaviate
  template:
    metadata:
      labels:
        app: weaviate
    spec:
      containers:
        - name: weaviate
          image: semitechnologies/weaviate:lab-fixture
          ports:
            - name: rest
              containerPort: 8080
            - name: grpc
              containerPort: 50051
          env:
            - name: AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED
              value: "false"
            - name: AUTHENTICATION_APIKEY_ENABLED
              value: "true"
            - name: ENABLE_MODULES
              value: text2vec-transformers,qna-transformers
            - name: TRANSFORMERS_INFERENCE_API
              value: http://text2vec-transformers:8080
            - name: QNA_INFERENCE_API
              value: http://qna-transformers:8080
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
---
apiVersion: v1
kind: Service
metadata:
  name: weaviate-rest
  labels:
    app: weaviate
spec:
  type: ClusterIP
  selector:
    app: weaviate
  ports:
    - name: rest
      port: 8080
      targetPort: rest
---
apiVersion: v1
kind: Service
metadata:
  name: weaviate-grpc
  labels:
    app: weaviate
    api: grpc
spec:
  type: LoadBalancer
  selector:
    app: weaviate
  ports:
    - name: grpc
      port: 50051
      targetPort: grpc
  # Restrict this to approved lab client IP ranges before live use.
  loadBalancerSourceRanges:
    - 203.0.113.0/24
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: text2vec-transformers
  labels:
    app: text2vec-transformers
spec:
  replicas: 1
  selector:
    matchLabels:
      app: text2vec-transformers
  template:
    metadata:
      labels:
        app: text2vec-transformers
    spec:
      containers:
        - name: text2vec-transformers
          image: semitechnologies/transformers-inference:lab-fixture
          ports:
            - name: http
              containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
---
apiVersion: v1
kind: Service
metadata:
  name: text2vec-transformers
  labels:
    app: text2vec-transformers
spec:
  type: ClusterIP
  selector:
    app: text2vec-transformers
  ports:
    - name: http
      port: 8080
      targetPort: http
---
