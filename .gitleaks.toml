title = "MLSECDEVOPS GitLab Pipeline Gitleaks configuration"

# Load gitleaks' built-in ruleset. WITHOUT this the config has only an allowlist
# and ZERO rules, so `gitleaks detect` matches nothing and always passes (theater).
# useDefault pulls in the maintained default rules; the allowlist below still
# suppresses the known test fixtures.
[extend]
useDefault = true

[[allowlists]]
description = "Known fake secret fixtures used by sanitizer tests"
condition = "AND"
paths = [
]

regexes = [
  '''AKIA[0-9A-Z]{16}''',
  '''sk-[A-Za-z0-9]{20,}''',
]
