apiVersion: apps/v1
kind: Deployment
metadata:
  name: gaips-rag-app
  labels:
    app: gaips-rag-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gaips-rag-app
  template:
    metadata:
      labels:
        app: gaips-rag-app
    spec:
      serviceAccountName: gaips-rag-app
      containers:
        - name: app
          image: ghcr.io/example/gaips-rag-app:fixture
          ports:
            - containerPort: 8080
          env:
            - name: MODEL_PROVIDER
              value: fixture
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
