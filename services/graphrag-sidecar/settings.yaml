### GraphRAG sidecar — Counter-Spy.ai threat intelligence index
### graphrag 3.1.0 schema (verified against installed package)
###
### Model construction: LiteLLM receives model=f"{model_provider}/{model}"
###   model_provider: gemini  +  model: gemini-2.0-flash  →  "gemini/gemini-2.0-flash"
###   model_provider: gemini  +  model: text-embedding-004 →  "gemini/text-embedding-004"
###
### Set GEMINI_API_KEY in the environment before running graphrag index.

completion_models:
  default_completion_model:
    model_provider: gemini
    model: gemini-2.0-flash
    auth_method: api_key
    api_key: ${GEMINI_API_KEY}
    retry:
      type: exponential_backoff

embedding_models:
  default_embedding_model:
    model_provider: gemini
    model: text-embedding-004
    auth_method: api_key
    api_key: ${GEMINI_API_KEY}
    retry:
      type: exponential_backoff

### Document processing settings

input:
  type: text

chunking:
  type: tokens
  # 400-token ceiling covers the longest policy/ATLAS sections without splitting mid-rule.
  # 50-token overlap preserves cross-sentence entity context at section boundaries.
  size: 400
  overlap: 50
  encoding_model: o200k_base

### Storage settings

input_storage:
  type: file
  base_dir: "input"

output_storage:
  type: file
  base_dir: "output"

reporting:
  type: file
  base_dir: "logs"

cache:
  type: json
  storage:
    type: file
    base_dir: "cache"

vector_store:
  type: lancedb
  db_uri: output/lancedb

### Workflow settings

embed_text:
  embedding_model_id: default_embedding_model

extract_graph:
  completion_model_id: default_completion_model
  prompt: "prompts/entity_extraction.txt"
  entity_types:
    - ATTACK_TECHNIQUE
    - TOOL
    - SECURITY_CONTROL
    - PROTOCOL
    - THREAT_ACTOR
    - INDICATOR
  max_gleanings: 1

summarize_descriptions:
  completion_model_id: default_completion_model
  prompt: "prompts/summarize_descriptions.txt"
  max_length: 500

extract_graph_nlp:
  text_analyzer:
    extractor_type: regex_english

cluster_graph:
  max_cluster_size: 10

extract_claims:
  enabled: false

community_reports:
  completion_model_id: default_completion_model
  graph_prompt: "prompts/community_report_graph.txt"
  text_prompt: "prompts/community_report_text.txt"
  max_length: 2000
  max_input_length: 8000

snapshots:
  graphml: false
  embeddings: false

### Query settings
### Only local_search is used on the hot path (entity-centric, ~200ms).
### global_search prompts are included for completeness but not invoked by the sidecar.

local_search:
  completion_model_id: default_completion_model
  embedding_model_id: default_embedding_model
  prompt: "prompts/local_search_system_prompt.txt"

global_search:
  completion_model_id: default_completion_model
  map_prompt: "prompts/global_search_map_system_prompt.txt"
  reduce_prompt: "prompts/global_search_reduce_system_prompt.txt"
  knowledge_prompt: "prompts/global_search_knowledge_system_prompt.txt"

drift_search:
  completion_model_id: default_completion_model
  embedding_model_id: default_embedding_model
  prompt: "prompts/drift_search_system_prompt.txt"
  reduce_prompt: "prompts/drift_search_reduce_prompt.txt"

basic_search:
  completion_model_id: default_completion_model
  embedding_model_id: default_embedding_model
  prompt: "prompts/basic_search_system_prompt.txt"
