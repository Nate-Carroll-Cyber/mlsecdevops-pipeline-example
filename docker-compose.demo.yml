# Minimal local demo stack for Counter-Spy.ai.
# This is meant for laptop demos and smoke testing, not a production deployment.
#
# Topology: postgres + otel-collector(+jaeger) + counter-spy-sam-spade-service
#           + counter-spy-backend (gateway, proxies /v1/ctf/sam-spade/* to the
#           sam-spade service) + counter-spy-frontend.
services:
  counter-spy-backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: counter-spy-backend
    env_file:
      # Local-only demo secrets and provider creds. This file is gitignored.
      - .env.demo.local
    environment:
      # Core backend runtime settings.
      APP_PORT: 8080
      APP_ENV: dev
      LOG_LEVEL: info
      COUNTER_SPY_ROLE: gateway
      # Instruction similarity monitor backed by PostgreSQL + pgvector.
      INSTRUCTION_MONITOR_ENABLED: "true"
      INSTRUCTION_MONITOR_EMBEDDING_DIMENSIONS: "${INSTRUCTION_MONITOR_EMBEDDING_DIMENSIONS:-768}"
      INSTRUCTION_MONITOR_EMBEDDINGS_ENABLED: "${INSTRUCTION_MONITOR_EMBEDDINGS_ENABLED:-true}"
      INSTRUCTION_MONITOR_EMBEDDINGS_API_BASE_URL: "${INSTRUCTION_MONITOR_EMBEDDINGS_API_BASE_URL:-http://192.168.0.183:11434/v1}"
      INSTRUCTION_MONITOR_EMBEDDINGS_MODEL_ID: "${INSTRUCTION_MONITOR_EMBEDDINGS_MODEL_ID:-nomic-embed-text}"
      INSTRUCTION_MONITOR_EMBEDDINGS_MAX_CHUNKS: "${INSTRUCTION_MONITOR_EMBEDDINGS_MAX_CHUNKS:-4}"
      INSTRUCTION_MONITOR_SEED_CORE_ON_START: "${INSTRUCTION_MONITOR_SEED_CORE_ON_START:-true}"
      # Default safeguard judge for local inspector-style review.
      SAFEGUARDS_API_BASE_URL: "http://192.168.0.183:1234/v1/chat/completions"
      SAFEGUARDS_MODEL_ID: "gpt-oss-safeguard-20b"
      SAFEGUARDS_TIMEOUT_MS: "30000"
      # The CTF surface lives in its own container; the gateway just proxies to it.
      SAM_SPADE_ENABLED: "true"
      SAM_SPADE_SERVICE_URL: "http://counter-spy-sam-spade-service:18120"
      # OpenTelemetry: export traces/metrics/logs over OTLP/HTTP to the collector.
      OTEL_SERVICE_NAME: "counter-spy-backend"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
      OTEL_EXPORTER_OTLP_PROTOCOL: "http/json"
      OTEL_TRACES_SAMPLER: "${OTEL_TRACES_SAMPLER:-parentbased_traceidratio}"
      OTEL_TRACES_SAMPLER_ARG: "${OTEL_TRACES_SAMPLER_ARG:-1.0}"
      OTEL_LOG_LEVEL: "${OTEL_LOG_LEVEL:-warn}"
      # Lara Translate credentials come from the local env file above so the
      # demo stack stays stable across rebuilds and restarts.
    ports:
      - "18080:8080"
    depends_on:
      counter-spy-postgres:
        condition: service_healthy
      counter-spy-sam-spade-service:
        condition: service_started
      otel-collector:
        condition: service_started
    restart: unless-stopped

  # Standalone Sam Spade CTF service. Same image as the backend, booted with
  # COUNTER_SPY_ROLE=sam-spade so only /healthz and /v1/ctf/sam-spade/* are served
  # (on SAM_SPADE_SERVICE_PORT). It owns the SQLite session store volume and makes
  # its own safeguard/responder calls.
  counter-spy-sam-spade-service:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: counter-spy-sam-spade-service
    env_file:
      - .env.demo.local
    environment:
      APP_ENV: dev
      LOG_LEVEL: info
      COUNTER_SPY_ROLE: sam-spade
      SAM_SPADE_ENABLED: "true"
      SAM_SPADE_DEFAULT_CASE_ID: "case-067"
      SAM_SPADE_STORE_PATH: "/app/backend/data/sam-spade.db"
      SAM_SPADE_SERVICE_PORT: "18120"
      SAFEGUARDS_API_BASE_URL: "http://192.168.0.183:1234/v1/chat/completions"
      SAFEGUARDS_MODEL_ID: "gpt-oss-safeguard-20b"
      SAFEGUARDS_TIMEOUT_MS: "30000"
      OTEL_SERVICE_NAME: "counter-spy-sam-spade-service"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
      OTEL_EXPORTER_OTLP_PROTOCOL: "http/json"
      OTEL_TRACES_SAMPLER: "${OTEL_TRACES_SAMPLER:-parentbased_traceidratio}"
      OTEL_TRACES_SAMPLER_ARG: "${OTEL_TRACES_SAMPLER_ARG:-1.0}"
      OTEL_LOG_LEVEL: "${OTEL_LOG_LEVEL:-warn}"
    command: ["node", "backend/dist/server.js"]
    ports:
      - "18120:18120"
    volumes:
      # Sam Spade session data lives with the service that owns it now.
      - sam_spade_data:/app/backend/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:18120/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    depends_on:
      otel-collector:
        condition: service_started
    restart: unless-stopped

  counter-spy-frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend-demo
    container_name: counter-spy-frontend
    environment:
      # Frontend uses the backend container by service name through Vite's proxy.
      BACKEND_PROXY_TARGET: "http://counter-spy-backend:8080"
      VITE_BACKEND_BEARER_TOKEN: "${VITE_BACKEND_BEARER_TOKEN:-local-demo-backend-token-123456}"
      # The Sam Spade tab embeds the standalone CTF frontend; the main app polls
      # the gateway's review-artifact feed for CTF activity.
      VITE_CTF_FRONTEND_URL: "http://localhost:3001"
      DISABLE_HMR: "true"
    ports:
      - "3000:3000"
    depends_on:
      - counter-spy-backend
      - counter-spy-ctf-frontend
    restart: unless-stopped

  # Standalone Sam Spade CTF frontend (noir "Case 067" surface). Talks to the
  # Counter-Spy gateway (which proxies /v1/ctf/sam-spade/* to the CTF service and
  # handles /v1/ctf/review-artifacts) and posts each turn's review artifact there.
  counter-spy-ctf-frontend:
    build:
      context: .
      dockerfile: Dockerfile.ctf-frontend
    container_name: counter-spy-ctf-frontend
    environment:
      BACKEND_PROXY_TARGET: "http://counter-spy-backend:8080"
      VITE_BACKEND_BEARER_TOKEN: "${VITE_BACKEND_BEARER_TOKEN:-local-demo-backend-token-123456}"
      DISABLE_HMR: "true"
    ports:
      - "3001:3001"
    depends_on:
      - counter-spy-backend
    restart: unless-stopped

  counter-spy-postgres:
    image: pgvector/pgvector:pg16
    container_name: counter-spy-postgres
    environment:
      POSTGRES_DB: counter_spy
      POSTGRES_USER: counter_spy
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.demo.local and run docker compose with --env-file .env.demo.local}"
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256 --data-checksums"
    command:
      - "postgres"
      - "-c"
      - "password_encryption=scram-sha-256"
      - "-c"
      - "log_connections=on"
      - "-c"
      - "log_disconnections=on"
      - "-c"
      - "log_statement=ddl"
      - "-c"
      - "log_min_duration_statement=250"
      - "-c"
      - "statement_timeout=10s"
      - "-c"
      - "max_connections=100"
    ports:
      - "127.0.0.1:15432:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U counter_spy -d counter_spy"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  # OpenTelemetry Collector: OTLP in (4317 gRPC / 4318 HTTP), out to stdout debug,
  # Prometheus (:8889), and Jaeger. See otel/collector-config.yaml.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.117.0
    container_name: counter-spy-otel-collector
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./otel/collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "127.0.0.1:4317:4317"   # OTLP gRPC
      - "127.0.0.1:4318:4318"   # OTLP HTTP
      - "127.0.0.1:8889:8889"   # Prometheus scrape endpoint (/metrics)
    depends_on:
      - jaeger
    restart: unless-stopped

  # Jaeger all-in-one for viewing traces at http://localhost:16686.
  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    container_name: counter-spy-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "127.0.0.1:16686:16686"  # Jaeger UI
    restart: unless-stopped

volumes:
  # Named volume used by the standalone Sam Spade service's SQLite session store.
  sam_spade_data:
