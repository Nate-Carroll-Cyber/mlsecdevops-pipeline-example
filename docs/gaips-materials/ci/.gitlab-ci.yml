# GitLab CI — AI/ML Security Pipeline
# Stages flow as a DAG: model integrity gates all evaluation stages.

variables:
  MODEL_DIR: "${CI_PROJECT_DIR}/models"
  SBOM_DIR: "${CI_PROJECT_DIR}/sbom"
  EVIDENCE_DIR: "${CI_PROJECT_DIR}/evidence"
  REPORTS_DIR: "${CI_PROJECT_DIR}/reports"
  GAIPS_MATERIALS_DIR: "${CI_PROJECT_DIR}/docs/gaips-materials"
  PIP_CACHE_DIR: "${CI_PROJECT_DIR}/.pip-cache"
  VENV_DIR: "${CI_PROJECT_DIR}/.venv"
  # Vetted package index — swap for your internal Artifactory/Nexus/GitLab PyPI URL
  PIP_INDEX_URL: "https://pypi.org/simple/"
  PIP_TRUSTED_HOST: "pypi.org files.pythonhosted.org"
  # Anaconda: strict channel priority forces all packages to come from conda-forge
  CONDA_CHANNEL: "conda-forge"
  # Override in project CI/CD settings:
  # MODEL_ENDPOINT, MODEL_SIGNING_CERT, SIGSTORE_OIDC_ISSUER
  HF_MODEL_IDS: ""    # comma-separated HF repo IDs to scan, e.g. "org/model-a,org/model-b"
  HF_TOKEN: ""        # HuggingFace token for gated/private repos (mask in CI settings)

# ── Shared secure-install template (extend in Python jobs) ───────────────────
# Applied by default to the python:3.11-slim image; override before_script in
# non-Python image jobs (node, syft, grype, etc.) to skip this block.
.python-secure: &python-secure
  before_script:
    - |
      # PEP 476 — SSL certificate verification is mandatory.
      # Write pip.conf so every subsequent pip call in this job enforces it.
      mkdir -p "${HOME}/.config/pip"
      python3 - <<'PYCFG'
      import os, pathlib
      cfg = pathlib.Path.home() / ".config" / "pip" / "pip.conf"
      cfg.parent.mkdir(parents=True, exist_ok=True)
      cfg.write_text(
          "[global]\n"
          "ssl_verify        = true\n"
          f"index-url         = {os.environ.get('PIP_INDEX_URL','https://pypi.org/simple/')}\n"
          f"trusted-host      = {os.environ.get('PIP_TRUSTED_HOST','pypi.org files.pythonhosted.org')}\n"
          "[install]\n"
          "require-hashes    = false\n"   # flip to true once requirements.txt has hashes
      )
      print("pip.conf written →", cfg)
      PYCFG
    - pip install --quiet --upgrade pip setuptools wheel
    - |
      # Isolated virtualenv — segregates this job's packages from the system
      # Python, preventing cross-job contamination and making pip check reliable.
      python3 -m venv --clear "${VENV_DIR}"
      . "${VENV_DIR}/bin/activate"
      pip install --quiet --upgrade pip setuptools wheel

default:
  image: python:3.11-slim
  before_script:
    - !reference [.python-secure, before_script]
  cache:
    key: pip-${CI_COMMIT_REF_SLUG}
    paths:
      - .pip-cache/

stages:
  - setup
  - sast
  - sbom
  - vuln-scan
  - model-integrity
  - ai-eval
  - guardrail
  - evidence

# ─── SETUP ───────────────────────────────────────────────────────────────────

setup:
  stage: setup
  allow_failure: true
  script:
    - pip install -r requirements.txt
    - mkdir -p "${SBOM_DIR}" "${EVIDENCE_DIR}" "${REPORTS_DIR}"
    - echo "Pipeline ${CI_PIPELINE_ID} @ ${CI_COMMIT_SHORT_SHA}" | tee "${EVIDENCE_DIR}/pipeline.env"
  artifacts:
    paths:
      - "${EVIDENCE_DIR}/pipeline.env"
    expire_in: 1 day

# ─── SAST ────────────────────────────────────────────────────────────────────

semgrep-sast:
  stage: sast
  image: semgrep/semgrep:latest
  needs: ["setup"]
  before_script: []          # semgrep image has no Python — skip .python-secure
  script:
    - mkdir -p "${REPORTS_DIR}"
    - semgrep ci --config=auto --json --output "${REPORTS_DIR}/semgrep.json"
  artifacts:
    reports:
      sast: "${REPORTS_DIR}/semgrep.json"
    paths:
      - "${REPORTS_DIR}/semgrep.json"
    expire_in: 7 days
  allow_failure: true

pip-audit:
  stage: sast
  needs: ["setup"]
  script:
    - pip install pip-audit
    - mkdir -p "${REPORTS_DIR}"
    - pip install -r requirements.txt
    - |
      # Audit installed packages against OSV, PyPI advisory DB, and GitHub Advisory DB
      pip-audit \
        --requirement requirements.txt \
        --format json \
        --output "${REPORTS_DIR}/pip-audit.json" \
        --progress-spinner off || AUDIT_EXIT=$?
      pip-audit \
        --requirement requirements.txt \
        --format cyclonedx-json \
        --output "${REPORTS_DIR}/pip-audit-cyclonedx.json" \
        --progress-spinner off || true
      # Surface the count; let CRITICAL findings fail the job
      python3 - <<'PYEOF'
      import json, sys, os
      data = json.load(open(os.environ["REPORTS_DIR"] + "/pip-audit.json"))
      vulns = data.get("dependencies", [])
      total = sum(len(d.get("vulns", [])) for d in vulns)
      critical = sum(
          1 for d in vulns for v in d.get("vulns", [])
          if any(s.get("type") == "CVSS" and float(s.get("score", 0)) >= 9.0
                 for s in v.get("fix_versions", [{}]))
      )
      print(f"pip-audit: {total} vulnerability/ies across {len(vulns)} package(s)")
      # Non-zero exit from pip-audit already surfaces findings; don't double-fail
      PYEOF
  artifacts:
    paths:
      - "${REPORTS_DIR}/pip-audit.json"
      - "${REPORTS_DIR}/pip-audit-cyclonedx.json"
    expire_in: 7 days
  allow_failure: true

pkg-integrity:
  stage: sast
  needs: ["setup"]
  script:
    - pip install pip-tools
    - mkdir -p "${REPORTS_DIR}"
    - |
      # ── Hash verification (PEP 476 / secure install) ──────────────────────
      if grep -q " --hash=" requirements.txt 2>/dev/null; then
        echo "Hash-pinned requirements detected — installing with --require-hashes"
        pip install --require-hashes -r requirements.txt
        echo "hash_mode=enforced" > "${REPORTS_DIR}/pkg-integrity.env"
      else
        echo "WARNING: requirements.txt lacks hashes — generating hashed lockfile"
        # Compile from .in if present, otherwise hash-pin the existing requirements.txt
        SRC="requirements.in"
        [ -f "${SRC}" ] || SRC="requirements.txt"
        pip-compile --generate-hashes "${SRC}" \
          --output-file requirements.hashed.txt \
          --quiet
        echo "hash_mode=warn_generated" > "${REPORTS_DIR}/pkg-integrity.env"
        echo "Commit requirements.hashed.txt and pin CI to it to enforce hashes."
      fi
    - |
      # ── Isolated environment verification ─────────────────────────────────
      # Install into a throw-away venv to confirm no hidden dependency conflicts.
      python3 -m venv /tmp/verify-venv
      . /tmp/verify-venv/bin/activate
      pip install --quiet --index-url "${PIP_INDEX_URL}" -r requirements.txt
      pip check    # fails if any installed package has broken/missing deps
      deactivate
    - |
      python3 - <<'PYEOF'
      import subprocess, json, pathlib, os
      result = subprocess.run(
          ["pip", "list", "--format", "json"],
          capture_output=True, text=True, check=True,
      )
      packages = json.loads(result.stdout)
      report = {"env": packages, "hash_mode": open(os.environ["REPORTS_DIR"] + "/pkg-integrity.env").read().strip()}
      pathlib.Path(os.environ["REPORTS_DIR"] + "/pkg-integrity-manifest.json").write_text(
          json.dumps(report, indent=2)
      )
      print(f"Verified {len(packages)} package(s) in isolated venv")
      PYEOF
  artifacts:
    paths:
      - "${REPORTS_DIR}/pkg-integrity.env"
      - "${REPORTS_DIR}/pkg-integrity-manifest.json"
      - "requirements.hashed.txt"
    expire_in: 7 days
  allow_failure: true

conda-pkg-verify:
  stage: sast
  image: continuumio/miniconda3:latest
  needs: ["setup"]
  before_script: []          # conda image manages its own Python env
  script:
    - mkdir -p "${REPORTS_DIR}/conda"
    - |
      # ── Secure conda configuration ────────────────────────────────────────
      conda config --set ssl_verify true
      conda config --set channel_priority strict
      # Remove defaults channel — conda-forge has a rigorous vetting process
      conda config --remove channels defaults 2>/dev/null || true
      conda config --add channels "${CONDA_CHANNEL}"
      conda config --show channels
    - |
      # ── Isolated conda environment ────────────────────────────────────────
      conda create -n ci-verify python=3.11 --yes --quiet
      # Attempt to install packages via conda-forge; fall back gracefully for pip-only pkgs
      conda run -n ci-verify conda install --yes --quiet \
        --channel "${CONDA_CHANNEL}" \
        --file requirements.txt 2>/dev/null \
        || echo "NOTE: some packages are pip-only; conda coverage is partial"
      conda run -n ci-verify pip check || true
    - |
      # Export resolved environment as a reproducible manifest
      conda env export -n ci-verify --json > "${REPORTS_DIR}/conda/env-manifest.json"
      conda run -n ci-verify conda list --json > "${REPORTS_DIR}/conda/installed-packages.json"
      python3 - <<'PYEOF'
      import json, os
      pkgs = json.load(open(os.environ["REPORTS_DIR"] + "/conda/installed-packages.json"))
      print(f"conda-forge environment: {len(pkgs)} package(s) resolved")
      PYEOF
  artifacts:
    paths:
      - "${REPORTS_DIR}/conda/"
    expire_in: 7 days
  allow_failure: true   # advisory until a full conda env spec is defined for the project

# ─── SBOM ────────────────────────────────────────────────────────────────────

syft-cyclonedx:
  stage: sbom
  image:
    name: anchore/syft:latest
    entrypoint: [""]
  before_script: []          # syft image has no Python
  needs: ["setup"]
  allow_failure: true
  script:
    - mkdir -p "${SBOM_DIR}"
    - syft dir:. -o cyclonedx-json="${SBOM_DIR}/sbom.cyclonedx.json"
    - syft dir:. -o cyclonedx-xml="${SBOM_DIR}/sbom.cyclonedx.xml"
  artifacts:
    paths:
      - "${SBOM_DIR}/sbom.cyclonedx.json"
      - "${SBOM_DIR}/sbom.cyclonedx.xml"
    expire_in: 30 days

syft-spdx:
  stage: sbom
  image:
    name: anchore/syft:latest
    entrypoint: [""]
  before_script: []          # syft image has no Python
  needs: ["setup"]
  allow_failure: true
  script:
    - mkdir -p "${SBOM_DIR}"
    - syft dir:. -o spdx-json="${SBOM_DIR}/sbom.spdx.json"
    - syft dir:. -o spdx-tag-value="${SBOM_DIR}/sbom.spdx"
  artifacts:
    paths:
      - "${SBOM_DIR}/sbom.spdx.json"
      - "${SBOM_DIR}/sbom.spdx"
    expire_in: 30 days

# ─── VULNERABILITY SCAN ──────────────────────────────────────────────────────

grype-scan:
  stage: vuln-scan
  image:
    name: anchore/grype:latest
    entrypoint: [""]
  before_script: []          # grype image has no Python
  needs: ["syft-cyclonedx"]
  script:
    - mkdir -p "${REPORTS_DIR}"
    - grype sbom:"${SBOM_DIR}/sbom.cyclonedx.json" -o json > "${REPORTS_DIR}/grype.json"
    - grype sbom:"${SBOM_DIR}/sbom.cyclonedx.json" -o table
  artifacts:
    paths:
      - "${REPORTS_DIR}/grype.json"
    expire_in: 7 days
  allow_failure: true

trivy-scan:
  stage: vuln-scan
  image: aquasec/trivy:latest
  before_script: []          # trivy image has no Python
  needs: ["setup"]
  allow_failure: true
  script:
    - mkdir -p "${REPORTS_DIR}"
    - trivy fs . --format json --output "${REPORTS_DIR}/trivy-fs.json" --exit-code 0
    - trivy fs . --format table
    - |
      trivy image \
        --format json \
        --output "${REPORTS_DIR}/trivy-image.json" \
        --exit-code 0 \
        "${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHA}" 2>/dev/null || \
        echo '{"Results":[]}' > "${REPORTS_DIR}/trivy-image.json"
  artifacts:
    reports:
      container_scanning: "${REPORTS_DIR}/trivy-image.json"
    paths:
      - "${REPORTS_DIR}/trivy-fs.json"
      - "${REPORTS_DIR}/trivy-image.json"
    expire_in: 7 days

# ─── MODEL INTEGRITY ─────────────────────────────────────────────────────────

model-signing-install:
  stage: model-integrity
  needs: ["setup"]
  allow_failure: true
  script:
    - pip install model-signing sigstore
    - python -c "import model_signing; print('model-signing', model_signing.__version__)"
    - cosign version 2>/dev/null || pip install cosign 2>/dev/null || echo "cosign not found — bundle signing will be skipped"
  artifacts:
    paths:
      - .pip-cache/
    expire_in: 1 day

model-digest:
  stage: model-integrity
  needs: ["model-signing-install"]
  allow_failure: true
  script:
    - pip install model-signing
    - mkdir -p "${EVIDENCE_DIR}"
    - |
      touch "${EVIDENCE_DIR}/model-digests.txt"
      MODEL_FOUND=0
      for ext in pkl pt safetensors gguf bin h5 onnx; do
        while IFS= read -r -d '' f; do
          MODEL_FOUND=1
          sha256=$(sha256sum "$f" | awk '{print $1}')
          echo "${f}  sha256:${sha256}" | tee -a "${EVIDENCE_DIR}/model-digests.txt"
        done < <(find "${MODEL_DIR}" -type f -name "*.${ext}" -print0 2>/dev/null)
      done
      if [ "${MODEL_FOUND}" -eq 0 ]; then
        echo "WARNING: No model files found under ${MODEL_DIR}" | tee -a "${EVIDENCE_DIR}/model-digests.txt"
      fi
    - cat "${EVIDENCE_DIR}/model-digests.txt"
  artifacts:
    paths:
      - "${EVIDENCE_DIR}/model-digests.txt"
    expire_in: 30 days

signature-verification:
  stage: model-integrity
  needs: ["model-digest"]
  script:
    - pip install model-signing sigstore
    - |
      SIG_COUNT=0
      for sig in $(find "${MODEL_DIR}" -name "*.sig" -o -name "*.sigstore" 2>/dev/null); do
        SIG_COUNT=$((SIG_COUNT + 1))
        model="${sig%.sig}"
        model="${model%.sigstore}"
        echo "Verifying: ${model}"
        python -m model_signing verify \
          --model-path "${model}" \
          --signature "${sig}" \
          ${MODEL_SIGNING_CERT:+--cert "${MODEL_SIGNING_CERT}"}
      done
      if [ "${SIG_COUNT}" -eq 0 ]; then
        echo "No .sig/.sigstore files found — signature verification skipped"
      fi
  allow_failure: true

tamper-verification:
  stage: model-integrity
  needs: ["model-digest"]
  allow_failure: true
  script:
    - mkdir -p "${EVIDENCE_DIR}"
    - |
      BASELINE="${EVIDENCE_DIR}/model-digests-baseline.txt"
      CURRENT="${EVIDENCE_DIR}/model-digests.txt"
      if [ -f "${BASELINE}" ]; then
        echo "Comparing digests against baseline..."
        if ! diff "${BASELINE}" "${CURRENT}"; then
          echo "TAMPER DETECTED: digest mismatch vs baseline"
          exit 1
        fi
        echo "Tamper check PASSED — digests match baseline"
      else
        echo "No baseline present — recording current digests as baseline"
        cp "${CURRENT}" "${BASELINE}"
      fi
    - echo "tamper_check_passed=true" > "${EVIDENCE_DIR}/integrity.env"
  artifacts:
    paths:
      - "${EVIDENCE_DIR}/integrity.env"
      - "${EVIDENCE_DIR}/model-digests-baseline.txt"
    expire_in: 90 days

modelscan:
  stage: model-integrity
  needs: ["model-signing-install"]
  script:
    - pip install modelscan
    - mkdir -p "${REPORTS_DIR}" "${MODEL_DIR}"
    - |
      modelscan scan \
        --path "${MODEL_DIR}" \
        --reporting-format json \
        --output-file "${REPORTS_DIR}/modelscan.json" \
        2>&1 | tee "${REPORTS_DIR}/modelscan.log"; SCAN_EXIT=${PIPESTATUS[0]}
      # Exit >1 means tool error (not just findings); propagate it
      [ "${SCAN_EXIT:-0}" -le 1 ] || exit "${SCAN_EXIT}"
    - |
      python - <<'PYEOF'
      import json, sys, os
      data = json.load(open(os.environ["REPORTS_DIR"] + "/modelscan.json"))
      summary = data.get("summary", {})
      total   = summary.get("total_issues_by_severity", {})
      critical = int(total.get("CRITICAL", 0))
      high     = int(total.get("HIGH", 0))
      print(f"modelscan: CRITICAL={critical} HIGH={high} "
            f"MEDIUM={total.get('MEDIUM',0)} LOW={total.get('LOW',0)}")
      if critical > 0:
          print("CRITICAL issues found — failing pipeline")
          sys.exit(1)
      PYEOF
  artifacts:
    paths:
      - "${REPORTS_DIR}/modelscan.json"
      - "${REPORTS_DIR}/modelscan.log"
    expire_in: 7 days
  allow_failure: true

hf-artifact-scan:
  stage: model-integrity
  needs: ["model-signing-install"]
  script:
    - pip install huggingface_hub modelscan
    - mkdir -p "${REPORTS_DIR}/hf-scan" "${CI_PROJECT_DIR}/.hf-cache"
    - |
      if [ -z "${HF_MODEL_IDS}" ]; then
        echo "HF_MODEL_IDS not set — skipping HuggingFace artifact scan"
        echo '{"skipped":true,"scanned":[]}' > "${REPORTS_DIR}/hf-scan/summary.json"
        exit 0
      fi
    - |
      python - <<'PYEOF'
      import json, os, subprocess, sys
      from huggingface_hub import snapshot_download, model_info
      from pathlib import Path

      model_ids = [m.strip() for m in os.environ["HF_MODEL_IDS"].split(",") if m.strip()]
      cache_dir  = Path(os.environ["CI_PROJECT_DIR"]) / ".hf-cache"
      report_dir = Path(os.environ["REPORTS_DIR"]) / "hf-scan"
      token      = os.environ.get("HF_TOKEN") or None

      results = []
      exit_code = 0

      for model_id in model_ids:
          print(f"\n=== HF scan: {model_id} ===")
          slug   = model_id.replace("/", "--")
          record = {"model_id": model_id, "card_meta": None, "modelscan": None, "error": None}

          try:
              info = model_info(model_id, token=token)
              record["card_meta"] = {
                  "pipeline_tag": getattr(info, "pipeline_tag", None),
                  "tags":         list(getattr(info, "tags", []) or []),
                  "gated":        getattr(info, "gated", False),
                  "downloads":    getattr(info, "downloads", None),
              }

              local_dir = cache_dir / slug
              snapshot_download(
                  repo_id=model_id,
                  local_dir=str(local_dir),
                  ignore_patterns=["*.md", "*.txt", "*.yaml", "tokenizer*", "vocab*"],
                  token=token,
              )

              scan_out = report_dir / f"{slug}-modelscan.json"
              proc = subprocess.run(
                  ["modelscan", "scan", "--path", str(local_dir),
                   "--reporting-format", "json", "--output-file", str(scan_out)],
                  capture_output=True, text=True,
              )
              if scan_out.exists():
                  record["modelscan"] = json.load(open(scan_out))
                  critical = int(
                      record["modelscan"]
                      .get("summary", {})
                      .get("total_issues_by_severity", {})
                      .get("CRITICAL", 0)
                  )
                  if critical:
                      print(f"CRITICAL issues found in {model_id}")
                      exit_code = 1

          except Exception as exc:
              record["error"] = str(exc)
              print(f"ERROR: {exc}")

          results.append(record)

      summary = {"skipped": False, "scanned": results}
      with open(report_dir / "summary.json", "w") as f:
          json.dump(summary, f, indent=2, default=str)

      print(f"\nHF artifact scan complete — {len(results)} model(s) checked")
      sys.exit(exit_code)
      PYEOF
  artifacts:
    paths:
      - "${REPORTS_DIR}/hf-scan/"
    expire_in: 7 days
  allow_failure: true

artifact-signing-gate:
  stage: model-integrity
  needs: ["signature-verification", "tamper-verification", "modelscan", "hf-artifact-scan"]
  allow_failure: true
  script:
    - source "${EVIDENCE_DIR}/integrity.env"
    - |
      if [ "${tamper_check_passed}" != "true" ]; then
        echo "GATE FAILED: integrity check did not pass"
        exit 1
      fi
      echo "Artifact signing gate PASSED — proceeding to evaluation"

# ─── AI EVALUATION ───────────────────────────────────────────────────────────

rag-smoke-eval:
  stage: ai-eval
  needs: ["artifact-signing-gate"]
  allow_failure: true
  script:
    - pip install -r requirements.txt
    - mkdir -p "${REPORTS_DIR}"
    - |
      python "${GAIPS_MATERIALS_DIR}/scripts/rag_smoke_eval.py" \
        --materials "${GAIPS_MATERIALS_DIR}" \
        --output "${REPORTS_DIR}/local-target-results.json"
  artifacts:
    paths:
      - "${REPORTS_DIR}/local-target-results.json"
    expire_in: 7 days

promptfoo-eval:
  stage: ai-eval
  image: node:20-slim
  needs: ["artifact-signing-gate"]
  allow_failure: true
  before_script:
    - npm install -g promptfoo
  script:
    - mkdir -p "${REPORTS_DIR}"
    - promptfoo eval --config "${GAIPS_MATERIALS_DIR}/evals/promptfoo.yaml" --output "${REPORTS_DIR}/promptfoo-results.json" --no-cache
  artifacts:
    paths:
      - "${REPORTS_DIR}/promptfoo-results.json"
    expire_in: 7 days

garak-scan:
  stage: ai-eval
  needs: ["artifact-signing-gate"]
  script:
    - pip install garak
    - mkdir -p "${REPORTS_DIR}"
    - |
      python -m garak \
        --model_type rest \
        --model_name "${MODEL_ENDPOINT:-http://localhost:8080/v1}" \
        --probes all \
        --report_prefix "${REPORTS_DIR}/garak-live" \
        2>&1 | tee "${REPORTS_DIR}/garak.log" || true
    - |
      python "${GAIPS_MATERIALS_DIR}/scripts/collect_garak_report.py" \
        --reports "${REPORTS_DIR}" \
        --out "${REPORTS_DIR}/garak-results.json"
  artifacts:
    paths:
      - "${REPORTS_DIR}/garak.log"
      - "${REPORTS_DIR}/garak*.json"
      - "${REPORTS_DIR}/garak-results.json"
    expire_in: 7 days
  allow_failure: true   # garak findings are advisory; harden to false once baseline is set

giskard-scan:
  stage: ai-eval
  needs: ["artifact-signing-gate"]
  script:
    - pip install "giskard[llm]" requests pandas
    - mkdir -p "${REPORTS_DIR}"
    - python "${GAIPS_MATERIALS_DIR}/scripts/run_giskard_live.py" --reports "${REPORTS_DIR}"
  artifacts:
    paths:
      - "${REPORTS_DIR}/giskard-results.json"
      - "${REPORTS_DIR}/giskard-scan.html"
    expire_in: 7 days
  allow_failure: true   # giskard may attempt external calls; harden to false once a stable endpoint is confirmed

inspect-ai-eval:
  stage: ai-eval
  needs: ["artifact-signing-gate"]
  allow_failure: true
  script:
    - pip install "inspect-ai" "inspect-evals"
    - mkdir -p "${REPORTS_DIR}/inspect-logs"
    - |
      MODEL="${MODEL_ENDPOINT:-openai/gpt-4o-mini}"
      LOG_DIR="${REPORTS_DIR}/inspect-logs"

      run_eval() {
        TASK="$1"; LABEL="$2"; LIMIT="${3:-25}"
        echo "--- inspect eval: ${LABEL} ---"
        inspect eval "${TASK}" \
          --model "${MODEL}" \
          --log-dir "${LOG_DIR}" \
          --limit "${LIMIT}" \
          2>&1 | tee -a "${REPORTS_DIR}/inspect-ai.log" || \
          echo "WARN: ${LABEL} eval returned non-zero (logged, not failing)"
      }

      # Run project task files if they exist
      TASK_COUNT=0
      if [ -d tasks ]; then
        for task_file in tasks/*.py; do
          [ -f "${task_file}" ] || continue
          run_eval "${task_file}" "${task_file}" 50
          TASK_COUNT=$((TASK_COUNT + 1))
        done
      fi

      # Fall back to built-in evals when no project tasks are present
      if [ "${TASK_COUNT}" -eq 0 ]; then
        echo "No project tasks found — running built-in safety evals"
        run_eval "inspect_evals/mmlu"             "mmlu (knowledge)"         25
        run_eval "inspect_evals/truthfulqa"       "truthfulqa (honesty)"     25
        run_eval "inspect_evals/wmdp"             "wmdp (hazard refusal)"    25
        run_eval "inspect_evals/agentic/gdm_capabilities" "gdm (agent safety)" 10
      fi
    - |
      python - <<'PYEOF'
      import json, os, glob, sys
      from pathlib import Path

      log_dir  = Path(os.environ["REPORTS_DIR"]) / "inspect-logs"
      summary  = {"evals": [], "total_pass": 0, "total_fail": 0, "errors": []}
      fail_threshold = float(os.environ.get("INSPECT_PASS_THRESHOLD", "0.60"))

      for log_file in sorted(glob.glob(str(log_dir / "*.json"))):
          try:
              data  = json.load(open(log_file))
              task  = data.get("eval", {}).get("task", log_file)
              scores = data.get("results", {}).get("scores", [])
              entry  = {"task": task, "scores": scores, "status": data.get("status")}

              for s in scores:
                  val = s.get("metrics", {}).get("accuracy", {}).get("value")
                  if val is not None:
                      if float(val) >= fail_threshold:
                          summary["total_pass"] += 1
                      else:
                          summary["total_fail"] += 1
                          entry["below_threshold"] = True

              summary["evals"].append(entry)
          except Exception as exc:
              summary["errors"].append({"file": log_file, "error": str(exc)})

      out = os.environ["REPORTS_DIR"] + "/inspect-summary.json"
      with open(out, "w") as f:
          json.dump(summary, f, indent=2)

      print(f"Inspect AI: {len(summary['evals'])} eval(s) | "
            f"pass={summary['total_pass']} fail={summary['total_fail']}")

      if summary["total_fail"] > 0:
          print(f"Some evals fell below threshold ({fail_threshold}) — review inspect-summary.json")
          sys.exit(1)
      PYEOF
    - |
      python "${GAIPS_MATERIALS_DIR}/scripts/collect_inspect_report.py" \
        --logs "${REPORTS_DIR}/inspect-logs" \
        --out "${REPORTS_DIR}/inspect-ai-results.json"
  artifacts:
    paths:
      - "${REPORTS_DIR}/inspect-logs/"
      - "${REPORTS_DIR}/inspect-ai.log"
      - "${REPORTS_DIR}/inspect-summary.json"
      - "${REPORTS_DIR}/inspect-ai-results.json"
    expire_in: 7 days

markllm-watermark-eval:
  stage: ai-eval
  image: python:3.10-slim
  needs: ["artifact-signing-gate"]
  script:
    - pip install --quiet --upgrade pip setuptools wheel
    - pip install --quiet markllm torch transformers
    - mkdir -p "${REPORTS_DIR}"
    - |
      python "${GAIPS_MATERIALS_DIR}/scripts/run_markllm_watermark_eval.py" \
        --output "${REPORTS_DIR}/markllm-results.json"
  artifacts:
    paths:
      - "${REPORTS_DIR}/markllm-results.json"
    expire_in: 7 days
  allow_failure: true   # advisory until a watermark baseline and model-cache policy are established

pyrit-scan:
  stage: ai-eval
  needs: ["artifact-signing-gate"]
  allow_failure: true
  script:
    - pip install pyrit
    - mkdir -p "${REPORTS_DIR}"
    - |
      python "${GAIPS_MATERIALS_DIR}/scripts/pyrit_scan.py" \
        --materials "${GAIPS_MATERIALS_DIR}" \
        --output "${REPORTS_DIR}/pyrit-results.json"
  artifacts:
    paths:
      - "${REPORTS_DIR}/pyrit-results.json"
    expire_in: 7 days

# ─── GUARDRAIL REGRESSION ────────────────────────────────────────────────────

guardrail-regression:
  stage: guardrail
  needs:
    - promptfoo-eval
    - pyrit-scan
  allow_failure: true
  script:
    - pip install -r requirements.txt
    - mkdir -p "${REPORTS_DIR}"
    - |
      python "${GAIPS_MATERIALS_DIR}/scripts/run_guardrail_regression.py" \
        --materials "${GAIPS_MATERIALS_DIR}" \
        --reports "${REPORTS_DIR}"
  artifacts:
    paths:
      - "${REPORTS_DIR}/guardrail-regression.json"
    expire_in: 7 days

# ─── EVIDENCE ────────────────────────────────────────────────────────────────

evidence-summary:
  stage: evidence
  needs:
    - semgrep-sast
    - pip-audit
    - pkg-integrity
    - conda-pkg-verify
    - syft-cyclonedx
    - syft-spdx
    - grype-scan
    - trivy-scan
    - modelscan
    - hf-artifact-scan
    - model-digest
    - tamper-verification
    - rag-smoke-eval
    - promptfoo-eval
    - garak-scan
    - giskard-scan
    - inspect-ai-eval
    - markllm-watermark-eval
    - pyrit-scan
    - guardrail-regression
  script:
    - pip install jinja2
    - mkdir -p "${EVIDENCE_DIR}"
    - |
      python "${GAIPS_MATERIALS_DIR}/scripts/write_ci_evidence_summary.py" \
        --reports "${REPORTS_DIR}" \
        --out "${EVIDENCE_DIR}/evidence-summary.md"
    - cat "${EVIDENCE_DIR}/evidence-summary.md"
  artifacts:
    paths:
      - "${EVIDENCE_DIR}/evidence-summary.md"
    expire_in: 90 days

model-signing-evidence:
  stage: evidence
  needs:
    - artifact-signing-gate
    - model-digest
    - evidence-summary
  script:
    - pip install model-signing sigstore
    - mkdir -p "${EVIDENCE_DIR}"
    - |
      python - <<'PYEOF'
      import json, os, datetime

      bundle = {
          "schema_version": "1.0",
          "pipeline_id":    os.environ["CI_PIPELINE_ID"],
          "commit_sha":     os.environ["CI_COMMIT_SHA"],
          "ref":            os.environ["CI_COMMIT_REF_NAME"],
          "timestamp":      datetime.datetime.utcnow().isoformat() + "Z",
          "model_digests":  open(os.environ["EVIDENCE_DIR"] + "/model-digests.txt").read().splitlines(),
      }

      out = os.environ["EVIDENCE_DIR"] + "/model-signing-evidence.json"
      with open(out, "w") as f:
          json.dump(bundle, f, indent=2)
      print(json.dumps(bundle, indent=2))
      PYEOF
    - |
      # Sign the evidence bundle via sigstore keyless (OIDC in CI)
      BUNDLE="${EVIDENCE_DIR}/model-signing-evidence.json"
      if command -v cosign &>/dev/null; then
        cosign sign-blob \
          --output-signature "${EVIDENCE_DIR}/model-signing-evidence.sig" \
          --output-certificate "${EVIDENCE_DIR}/model-signing-evidence.pem" \
          "${BUNDLE}"
        echo "Evidence bundle signed with cosign"
      else
        echo "cosign not available — evidence bundle unsigned (install cosign to enable)"
      fi
  artifacts:
    paths:
      - "${EVIDENCE_DIR}/model-signing-evidence.json"
      - "${EVIDENCE_DIR}/model-signing-evidence.sig"
      - "${EVIDENCE_DIR}/model-signing-evidence.pem"
    expire_in: 90 days
