# Kyverno ClusterPolicy — admission-time verification that the MLSECDEVOPS GitLab Pipeline workload
# image is cosign-signed by the expected identity. This complements the Argo CD
# PreSync hook (which verifies the model/dataset/AI-BOM BLOB signatures): Kyverno
# enforces the CONTAINER IMAGE signature on every Pod create/update, so even an
# out-of-band kubectl apply cannot schedule an unsigned image.
#
# ROLLOUT NOTE: the CI `image-sign` job (.gitlab-ci.yml, deploy-prep stage) now
# applies the Cosign keyless signature this policy verifies — so Enforce is finally
# meaningful (before that job existed, flipping to Enforce blocked ALL deploys
# because nothing signed the image). validationFailureAction stays Audit so a
# misconfigured identity regex can't block deploys on day one. Confirm matches
# appear as expected (kubectl get policyreport -A) AND that image-sign has run for
# the deployed digest, then flip to Enforce to make this a hard gate — that is what
# actually closes the verify-at-deploy loop on the image side. mutateDigest pins the
# verified tag to its digest so the running image cannot drift from the signed one.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: gaips-verify-image-signatures
  annotations:
    policies.kyverno.io/title: Verify MLSECDEVOPS GitLab Pipeline Image Signatures (Keyless)
    policies.kyverno.io/category: Software Supply Chain Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Verifies that MLSECDEVOPS GitLab Pipeline workload images are signed with Cosign keyless by the
      expected signer identity and OIDC issuer, with Rekor transparency-log
      inclusion. Mirrors the CI signer (MODEL_SIGNING_IDENTITY / SIGSTORE_OIDC_ISSUER).
spec:
  validationFailureAction: Audit   # ← flip to Enforce once matches are confirmed
  webhookTimeoutSeconds: 30
  failurePolicy: Fail
  background: false
  rules:
    - name: verify-gaips-image
      match:
        any:
          - resources:
              kinds:
                - Pod
      verifyImages:
        - imageReferences:
            # Narrow this to your registry/repo; '*' tag verifies every tag.
            - "ghcr.io/example/gaips-*:*"
          mutateDigest: true
          verifyDigest: true
          required: true
          attestors:
            - count: 1
              entries:
                - keyless:
                    # Match the CI signer. Use exact subject/issuer in production;
                    # the *RegExp forms tolerate the lab placeholders.
                    subjectRegExp: "ci-signer@example\\.invalid|https://gitlab\\.example\\.com/.+"
                    issuerRegExp: "https://oauth2\\.sigstore\\.dev/auth|https://gitlab\\.example\\.com"
                    rekor:
                      url: https://rekor.sigstore.dev
