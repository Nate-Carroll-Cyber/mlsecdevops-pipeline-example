# Standalone Sam Spade CTF service.
#
# This compose file runs the sam-spade-service on its own (e.g. alongside an
# externally managed gateway). The demo stack (docker-compose.demo.yml) already
# wires it up alongside the gateway; this file stays behind the "sam-spade"
# profile.
#
# Topology: the standalone sam-spade-service is directly addressable on :18120
# and the CTF frontend (or any other client) talks to it directly. The gateway
# 404s /v1/ctf/sam-spade/*.
services:
  sam-spade-service:
    build:
      context: .
      dockerfile: services/sam-spade/Dockerfile
    image: counter-spy-sam-spade-service
    container_name: counter-spy-sam-spade-service
    profiles: ["sam-spade"]
    env_file:
      # Provider creds + INTERCEPT_BEARER_TOKEN (must match the gateway's token).
      - .env.demo.local
    environment:
      APP_ENV: "${APP_ENV:-dev}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      SAM_SPADE_ENABLED: "true"
      SAM_SPADE_DEFAULT_CASE_ID: "${SAM_SPADE_DEFAULT_CASE_ID:-case-067}"
      SAM_SPADE_STORE_PATH: "/app/data/sam-spade.db"
      SAM_SPADE_SERVICE_PORT: "18120"
      OTEL_SERVICE_NAME: "counter-spy-sam-spade-service"
      # OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
    ports:
      - "18120:18120"
    volumes:
      - sam_spade_data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:18120/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

volumes:
  sam_spade_data:
